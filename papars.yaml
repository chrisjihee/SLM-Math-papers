papers:
  - title: "Self-Instruct: Aligning Language Models with Self-Generated Instructions"
    venue: "ACL 2023"
    link: "https://arxiv.org/abs/2212.10560"
    abstract: |
      Large "instruction-tuned" language models (i.e., finetuned to respond to instructions) have demonstrated a remarkable ability to generalize zero-shot to new tasks. Nevertheless, they depend heavily on human-written instruction data that is often limited in quantity, diversity, and creativity, therefore hindering the generality of the tuned model. We introduce Self-Instruct, a framework for improving the instruction-following capabilities of pretrained language models by bootstrapping off their own generations. Our pipeline generates instructions, input, and output samples from a language model, then filters invalid or similar ones before using them to finetune the original model. Applying our method to the vanilla GPT3, we demonstrate a 33% absolute improvement over the original model on Super-NaturalInstructions, on par with the performance of InstructGPT-001, which was trained with private user data and human annotations. For further evaluation, we curate a set of expert-written instructions for novel tasks, and show through human evaluation that tuning GPT3 with Self-Instruct outperforms using existing public instruction datasets by a large margin, leaving only a 5% absolute gap behind InstructGPT-001. Self-Instruct provides an almost annotation-free method for aligning pre-trained language models with instructions, and we release our large synthetic dataset to facilitate future studies on instruction tuning. Our code and data are available at this https URL.
    idea: "175개 seed 지시문에서 시작해 pretrained LM이 4단계(지시문 생성→분류 태스크 여부 판별→instance 생성→filtering)를 거쳐 52k instructions/82k instances를 자동 생성. Filtering 규칙: ROUGE-L 유사도 < 0.7, 비-텍스트 keywords(image/picture/graph) 제외, 동일 instances 및 같은 입력-다른 출력 쌍 제거, 길이·반복 기반 무효화. 분류 태스크는 output-first 방식으로 label bias 완화. 생성 데이터로 동일 LM을 재학습시켜 SuperNI에서 +33% 절대 성능 향상, InstructGPT-001과 5%p 격차."
    relevance: "우리 목표는 한국어 MWP의 CG(JSON triples) 생성/추론 능력을 sLLM에 이식하는 것으로, Self-Instruct의 범용 52k scale이 필수는 아님. 핵심은 seed→자동 생성→filtering→재학습 cycle을 도메인 특화하는 것. 논문에서 16k 이후 성능 plateau 발견(Figure 7)하므로, MWP-CG 도메인에서는 수백~수천 규모로도 충분할 가능성. 분류 여부 판별 후 관계/연산 타입 선택 과제에 output-first 적용하여 label bias 완화하고, 동일한 filtering 규칙으로 품질 담보."
    tips: "Self-Instruct 4단계를 MWP-CG 도메인으로 축소 적용: seed 30-50개 CG 생성 지시문 설계→template 변형(문체/슬롯 수)→classification 여부 판별 후 output-first/input-first 선택→filtering(ROUGE-L < 0.7, 비-텍스트 keywords 제외, 중복/충돌 제거, 길이·반복 무효화); 16k 이후 plateau이므로 1-3k 규모로 시작; 한국어 개념/관계 표기 표준화 사전 병행; fine-tuning 시 다양한 prompt formats으로 강건성 확보."

  - title: "Distilling Step-by-Step! Outperforming Larger Language Models with Less Training Data and Smaller Model Sizes"
    venue: "ACL 2023 (Findings)"
    link: "https://arxiv.org/abs/2305.02301"
    abstract: |
      Deploying large language models (LLMs) is challenging because they are memory inefficient and compute-intensive for practical applications. In reaction, researchers train smaller task-specific models by either finetuning with human labels or distilling using LLM-generated labels. However, finetuning and distillation require large amounts of training data to achieve comparable performance to LLMs. We introduce Distilling step-by-step, a new mechanism that (a) trains smaller models that outperform LLMs, and (b) achieves so by leveraging less training data needed by finetuning or distillation. Our method extracts LLM rationales as additional supervision for training small models within a multi-task framework. We present three findings across 4 NLP benchmarks: First, compared to both finetuning and distillation, our mechanism achieves better performance with much fewer labeled/unlabeled training examples. Second, compared to few-shot prompted LLMs, we achieve better performance using substantially smaller model sizes. Third, we reduce both the model size and the amount of data required to outperform LLMs; our finetuned 770M T5 model outperforms the few-shot prompted 540B PaLM model using only 80% of available data on a benchmark, whereas standard finetuning the same T5 model struggles to match even by using 100% of the dataset. We release the code at: this https URL.
    idea: "LLM rationales(CoT) 다중-태스크 감독으로 770 M T5가 PaLM 540 B 능력 초과"   # :contentReference[oaicite:11]{index=11}
    relevance: "§5.3 Rationale Ablation 읽고 '계산식 설명 + triple' 병렬 supervision 설계"
    tips: "CoT 텍스트를 facts/disambiguation triple comment 로 변환해 멀티-태스크 학습"

  - title: "Phased Instruction Fine-Tuning for Large Language Models"
    venue: "ACL 2024 (Findings)"
    link: "https://arxiv.org/abs/2406.04371"
    abstract: |
      Instruction Fine-Tuning enhances pre-trained language models from basic next-word prediction to complex instruction-following. However, existing One-off Instruction Fine-Tuning (One-off IFT) method, applied on a diverse instruction, may not effectively boost models' adherence to instructions due to the simultaneous handling of varying instruction complexities. To improve this, Phased Instruction Fine-Tuning (Phased IFT) is proposed, based on the idea that learning to follow instructions is a gradual process. It assesses instruction difficulty using GPT-4, divides the instruction data into subsets of increasing difficulty, and uptrains the model sequentially on these subsets. Experiments with Llama-2 7B/13B/70B, Llama3 8/70B and Mistral-7B models using Alpaca data show that Phased IFT significantly outperforms One-off IFT, supporting the progressive alignment hypothesis and providing a simple and efficient way to enhance large language models. Codes and datasets from our experiments are freely available at this https URL.
    idea: "GPT-4 난도 평가로 데이터를 쉬운→어려운 순으로 **두 단계 IFT**, 안정적 수렴"   # :contentReference[oaicite:7]{index=7}
    relevance: "Phase-1 단일 triple, Phase-2 복합 CG 문제로 커리큘럼 짜면 작은 모델도 형식 오류↓"
    tips: "Phase 경계 난도는 triple 수(≤3 vs >3) 기준으로 간단히 결정 가능"

  - title: "GraphGPT: Graph Instruction Tuning for Large Language Models"
    venue: "SIGIR 2024"
    link: "https://arxiv.org/abs/2310.13023"
    abstract: |
      Graph Neural Networks (GNNs) have evolved to understand graph structures through recursive exchanges and aggregations among nodes. To enhance robustness, self-supervised learning (SSL) has become a vital tool for data augmentation. Traditional methods often depend on fine-tuning with task-specific labels, limiting their effectiveness when labeled data is scarce. Our research tackles this by advancing graph model generalization in zero-shot learning environments. Inspired by the success of large language models (LLMs), we aim to create a graph-oriented LLM capable of exceptional generalization across various datasets and tasks without relying on downstream graph data. We introduce the GraphGPT framework, which integrates LLMs with graph structural knowledge through graph instruction tuning. This framework includes a text-graph grounding component to link textual and graph structures and a dual-stage instruction tuning approach with a lightweight graph-text alignment projector. These innovations allow LLMs to comprehend complex graph structures and enhance adaptability across diverse datasets and tasks. Our framework demonstrates superior generalization in both supervised and zero-shot graph learning tasks, surpassing existing benchmarks. The open-sourced model implementation of our GraphGPT is available at this https URL.
    idea: "텍스트↔그래프 정렬 + dual-stage projector로 그래프 생성·추론 능력 강화"   # :contentReference[oaicite:8]{index=8}
    relevance: "§3.2 Alignment Projector 로 Llama-8 B의 head 0.5 %만 LoRA-업데이트 → 경량화"
    tips: "프로젝터 레이어를 YAML-triple embedding에 맞춰 재사용"

  - title: "InstructGraph: Boosting Large Language Models via Graph-centric Instruction Tuning and Preference Alignment"
    venue: "ACL 2024 (Findings)"
    link: "https://arxiv.org/abs/2402.08785"
    abstract: |
      Do current large language models (LLMs) better solve graph reasoning and generation tasks with parameter updates? In this paper, we propose InstructGraph, a framework that empowers LLMs with the abilities of graph reasoning and generation by instruction tuning and preference alignment. Specifically, we first propose a structured format verbalizer to unify all graph data into a universal code-like format, which can simply represent the graph without any external graph-specific encoders. Furthermore, a graph instruction tuning stage is introduced to guide LLMs in solving graph reasoning and generation tasks. Finally, we identify potential hallucination problems in graph tasks and sample negative instances for preference alignment, the target of which is to enhance the output's reliability of the model. Extensive experiments across multiple graph-centric tasks exhibit that InstructGraph can achieve the best performance and outperform GPT-4 and LLaMA2 by more than 13\% and 38\%, respectively.
    idea: "그래프 중심 IT + preference alignment 로 그래프 생성·추론 동시 개선"   # :contentReference[oaicite:9]{index=9}
    relevance: "§4 Alignment Loss 식을 참조해 triple 순서·중복 선호도 pair 생성"
    tips: "Human eval 대신 70 B 교사 점수로 preference pair 자동 생성 가능"

  - title: "MAGDi: Structured Distillation of Multi-Agent Interaction Graphs Improves Reasoning in Smaller Language Models"
    venue: "ICLR 2025 (Spotlight)"
    link: "https://arxiv.org/abs/2402.01620"
    abstract: |
      Multi-agent interactions between Large Language Model (LLM) agents have shown major improvements on diverse reasoning tasks. However, these involve long generations from multiple models across several rounds, making them expensive. Moreover, these multi-agent approaches fail to provide a final, single model for efficient inference. To address this, we introduce MAGDi, a new method for structured distillation of the reasoning interactions between multiple LLMs into smaller LMs. MAGDi teaches smaller models by representing multi-agent interactions as graphs, augmenting a base student model with a graph encoder, and distilling knowledge using three objective functions: next-token prediction, a contrastive loss between correct and incorrect reasoning, and a graph-based objective to model the interaction structure. Experiments on seven widely used commonsense and math reasoning benchmarks show that MAGDi improves the reasoning capabilities of smaller models, outperforming several methods that distill from a single teacher and multiple teachers. Moreover, MAGDi also demonstrates an order of magnitude higher efficiency over its teachers. We conduct extensive analyses to show that MAGDi (1) enhances the generalizability to out-of-domain tasks, (2) scales positively with the size and strength of the base student model, and (3) obtains larger improvements (via our multi-teacher training) when applying self-consistency -- an inference technique that relies on model diversity.
    idea: "GPT-4 다중 에이전트 토론을 **논증 그래프**로 변환, graph-encoder 추가·3중 loss 로 7 B 학생 학습 → 수학·상식 7벤치 +5 pt"   # :contentReference[oaicite:1]{index=1}
    relevance: "Beam CoT 로그→그래프 변환 파이프라인( Fig 2 )를 그대로 CG 문제 풀이 로그에 적용"
    tips: "그래프 노드·엣지 라벨을 triple 스키마와 맞춰야 distillation 안정"

  - title: "Mentor-KD: Making Small Language Models Better Multi-step Reasoners"
    venue: "EMNLP 2024 (Main)"
    link: "https://arxiv.org/abs/2410.09037"
    abstract: |
      Large Language Models (LLMs) have displayed remarkable performances across various complex tasks by leveraging Chain-of-Thought (CoT) prompting. Recently, studies have proposed a Knowledge Distillation (KD) approach, reasoning distillation, which transfers such reasoning ability of LLMs through fine-tuning language models of multi-step rationales generated by LLM teachers. However, they have inadequately considered two challenges regarding insufficient distillation sets from the LLM teacher model, in terms of 1) data quality and 2) soft label provision. In this paper, we propose Mentor-KD, which effectively distills the multi-step reasoning capability of LLMs to smaller LMs while addressing the aforementioned challenges. Specifically, we exploit a mentor, intermediate-sized task-specific fine-tuned model, to augment additional CoT annotations and provide soft labels for the student model during reasoning distillation. We conduct extensive experiments and confirm Mentor-KD's effectiveness across various models and complex reasoning tasks.
    idea: "70 B 교사 → 13 B Mentor → 7 B 학생 **2단계 KD**·soft label 제공, multi-step reasoning 성능 대폭 향상"   # :contentReference[oaicite:2]{index=2}
    relevance: "데이터 적을 때 Mentor stage가 효과적 – §4 Mentor Generation 참조"
    tips: "13 B '교정용' 중간 모델로 CG·정답 풀이 둘 다 distill 후 최종 8 B에 압축"

  - title: "SWITCH: Studying WItH TeaCHer for Knowledge Distillation of Large Language Models"
    venue: "EMNLP 2024"
    link: "https://arxiv.org/abs/2410.19503"
    abstract: |
      Despite the success of Large Language Models (LLMs), they still face challenges related to high inference costs and memory requirements. To address these issues, Knowledge Distillation (KD) has emerged as a popular method for model compression, with student-generated outputs (SGOs) as training data being particularly notable for reducing the mismatch between training and inference. However, SGOs often produce noisy and biased sequences, which can lead to misguidance from the teacher model, especially in long sequences. To mitigate these challenges, we propose SWITCH (Studying WIth TeaCHer for Knowledge Distillation), a novel approach that strategically incorporates the teacher model during the student's sequence generation. SWITCH identifies discrepancies between the token probabilities of the teacher and student models, allowing the teacher to intervene selectively, particularly in long sequences that are more prone to teacher misguidance. Extensive experimental results across three model families and five instruction-following datasets show that SWITCH surpasses traditional KD methods, particularly excelling in the generation of long sequential data.
    idea: "긴 시퀀스에서 **오차 토큰만 선택적 교사介入** KD, 장문 생성·형식 오류 감소"   # :contentReference[oaicite:10]{index=10}
    relevance: "JSON 포맷 위반 토큰에만 teacher prob 사용 – Algorithm 2 채택"
    tips: "CG 출력 길이 600+ 토큰 문제에서 SWITCH KD로 schema 불일치 rate↓"

  - title: "DRAG: Distilling RAG for SLMs from LLMs to Transfer Knowledge and Mitigate Hallucination via Evidence and Graph-based Distillation"
    venue: "ACL 2025 (Long Paper)"
    link: "https://arxiv.org/abs/2506.01954"
    abstract: |
      Retrieval-Augmented Generation (RAG) methods have proven highly effective for tasks requiring factual consistency and robust knowledge retrieval. However, large-scale RAG systems consume significant computational resources and are prone to generating hallucinated content from Humans. In this work, we introduce \texttt{DRAG}, a novel framework for distilling RAG knowledge from large-scale Language Models (LLMs) into small LMs (SLMs). Our approach leverages evidence- and knowledge graph-based distillation, ensuring that the distilled model retains critical factual knowledge while significantly reducing model size and computational cost. By aligning the smaller model's predictions with a structured knowledge graph and ranked evidence, \texttt{DRAG} effectively mitigates hallucinations and improves factual accuracy. We further present a case demonstrating how our framework mitigates user privacy risks and introduce a corresponding benchmark. Experimental evaluations on multiple benchmarks demonstrate that our method outperforms the prior competitive RAG methods like MiniRAG for SLMs by up to 27.7% using the same models, preserving high-level efficiency and reliability. With \texttt{DRAG}, we provide a practical and resource-efficient roadmap to deploying enhanced retrieval and generation capabilities in small-sized LLMs.
    idea: "70 B 교사 RAG가 생성한 **증거 순위 + 지식 그래프**를 KL·contrastive 다중 loss 로 7 B 학생에 증류, 사실 일관성 유지·환각 감소"   # :contentReference[oaicite:0]{index=0}
    relevance: "CG(JSON) 후보와 근거 문장을 함께 loss 항목(L_graph)으로 넣는 설계 참고 – §3 Method, Table 3 (Ablation) 우선 읽기"
    tips: "문제별 top-k(≤10) triple과 supporting sentence 를 저장해 증류 코퍼스 구축"

  - title: "Contextualization Distillation from Large Language Model for Knowledge Graph Completion"
    venue: "Findings of EACL 2024"
    link: "https://arxiv.org/abs/2402.01729v3"
    abstract: |
      While textual information significantly enhances the performance of pre-trained language models (PLMs) in knowledge graph completion (KGC), the static and noisy nature of existing corpora collected from Wikipedia articles or synsets definitions often limits the potential of PLM-based KGC models. To surmount these challenges, we introduce the Contextualization Distillation strategy, a versatile plug-in-and-play approach compatible with both discriminative and generative KGC frameworks. Our method begins by instructing large language models (LLMs) to transform compact, structural triplets into context-rich segments. Subsequently, we introduce two tailored auxiliary tasks, reconstruction and contextualization, allowing smaller KGC models to assimilate insights from these enriched triplets. Comprehensive evaluations across diverse datasets and KGC techniques highlight the efficacy and adaptability of our approach, revealing consistent performance enhancements irrespective of underlying pipelines or architectures. Moreover, our analysis makes our method more explainable and provides insight into generating path selection, as well as the choosing of suitable distillation tasks. All the code and data in this work will be released at this https URL.
    idea: "교사 LLM이 triple을 **자연어 문맥**으로 재작성, 학생이 triple+문맥 reconstruction 듀얼-태스크 학습"   # :contentReference[oaicite:4]{index=4}
    relevance: "BG section 문장화 할 때 문맥 생성·필터 규칙(Algorithm 1) 바로 응용"
    tips: "CG triple ↔ 설명 문장 세트 생성 스크립트 작성해 데이터 3× 증폭"

  - title: "Improving Recall of Large Language Models: A Model Collaboration Approach for Relational Triple Extraction"
    venue: "LREC-COLING 2024"
    link: "https://arxiv.org/abs/2404.09593v1"
    abstract: |
      Relation triple extraction, which outputs a set of triples from long sentences, plays a vital role in knowledge acquisition. Large language models can accurately extract triples from simple sentences through few-shot learning or fine-tuning when given appropriate instructions. However, they often miss out when extracting from complex sentences. In this paper, we design an evaluation-filtering framework that integrates large language models with small models for relational triple extraction tasks. The framework includes an evaluation model that can extract related entity pairs with high precision. We propose a simple labeling principle and a deep neural network to build the model, embedding the outputs as prompts into the extraction process of the large model. We conduct extensive experiments to demonstrate that the proposed method can assist large language models in obtaining more accurate extraction results, especially from complex sentences containing multiple relational triples. Our evaluation model can also be embedded into traditional extraction models to enhance their extraction precision from complex sentences.
    idea: "65 B 평가-교사 + 7 B 추출-학생 협업·re-rank로 복합 문장 triple recall ↑"   # :contentReference[oaicite:5]{index=5}
    relevance: "Inference-time에 70 B 교사가 학생 Beam 후보 평가·재정렬하는 실험 설계 참고"
    tips: "GPU 비용 낮추려면 평가-교사를 13 B로 교체하고 score threshold 튜닝"
