  - title: "Self-Instruct: Aligning Language Models with Self-Generated Instructions"
    venue: "ACL 2023"
    link: "https://aclanthology.org/2023.acl-long.754/"
    abstract: |
      Large "instruction-tuned" language models (i.e., finetuned to respond to instructions) have demonstrated a remarkable ability to generalize zero-shot to new tasks. Nevertheless, they depend heavily on human-written instruction data that is often limited in quantity, diversity, and creativity, therefore hindering the generality of the tuned model. We introduce Self-Instruct, a framework for improving the instruction-following capabilities of pretrained language models by bootstrapping off their own generations. Our pipeline generates instructions, input, and output samples from a language model, then filters invalid or similar ones before using them to finetune the original model. Applying our method to the vanilla GPT3, we demonstrate a 33% absolute improvement over the original model on Super-NaturalInstructions, on par with the performance of InstructGPT-001, which was trained with private user data and human annotations. For further evaluation, we curate a set of expert-written instructions for novel tasks, and show through human evaluation that tuning GPT3 with Self-Instruct outperforms using existing public instruction datasets by a large margin, leaving only a 5% absolute gap behind InstructGPT-001. Self-Instruct provides an almost annotation-free method for aligning pre-trained language models with instructions, and we release our large synthetic dataset to facilitate future studies on instruction tuning. Our code and data are available at this https URL.
    idea: "175개 seed instruction에서 시작하여 LM이 스스로 4단계 pipeline을 통해 52k instructions를 자동 생성: (1) 기존 instruction pool에서 새로운 instruction 생성, (2) classification task 여부 판별, (3) input-output instance 생성, (4) 품질 filtering. 핵심 기법은 output-first 방식으로 label bias 완화, ROUGE-L < 0.7 유사도 기준 중복 제거, 비-텍스트 keywords 필터링. 16k 이후 성능 plateau 발견으로 데이터 효율성 입증. SuperNI에서 vanilla GPT3 대비 +33% 절대 성능 향상, InstructGPT-001과 5%p 격차까지 도달."
    relevance: "한국어 MWP CG 생성/추론을 위한 도메인 특화 instruction 데이터 자동 생성 프레임워크로 직접 활용 가능. 52k 범용 규모가 아닌 MWP-CG 특화 1-3k 규모로 축소하여 교사 LLM(Llama-4-Maveric)의 데이터 생성 비용 절감. Self-Instruct의 16k plateau 발견은 우리 도메인에서 소규모 고품질 데이터로도 충분한 성능 달성 가능성을 시사. CG triple 생성 과제의 구조적 특성(관계/연산 타입 선택)에 output-first 기법 적용으로 형식 준수율 향상 기대."
    tips: "구현 전략: (1) Seed 설계: 한국어 MWP의 대표적 CG 생성 패턴 30-50개 수작업 작성 (단순 관계 추출→복합 추론→다단계 연산), (2) Template 확장: 문체 변형(존댓말/반말), 슬롯 수 조정(1-5개 entity), 난이도 조절(직접/간접 관계), (3) Classification 최적화: CG 생성 vs 추론 vs 검증 태스크 판별 후 output-first 적용, (4) Filtering 강화: ROUGE-L < 0.7, JSON format 검증, 한국어 개념/관계 표기 표준화, (5) 규모 최적화: 1k→2k→3k 점진적 확장하며 성능 saturation 지점 탐지, (6) 품질 검증: 생성된 instruction의 CG triple 정확성을 교사 LLM으로 재검증."

  - title: "Distilling Step-by-Step! Outperforming Larger Language Models with Less Training Data and Smaller Model Sizes"
    venue: "ACL 2023 (Findings)"
    link: "https://aclanthology.org/2023.findings-acl.507/"
    abstract: |
      Deploying large language models (LLMs) is challenging because they are memory inefficient and compute-intensive for practical applications. In reaction, researchers train smaller task-specific models by either finetuning with human labels or distilling using LLM-generated labels. However, finetuning and distillation require large amounts of training data to achieve comparable performance to LLMs. We introduce Distilling step-by-step, a new mechanism that (a) trains smaller models that outperform LLMs, and (b) achieves so by leveraging less training data needed by finetuning or distillation. Our method extracts LLM rationales as additional supervision for training small models within a multi-task framework. We present three findings across 4 NLP benchmarks: First, compared to both finetuning and distillation, our mechanism achieves better performance with much fewer labeled/unlabeled training examples. Second, compared to few-shot prompted LLMs, we achieve better performance using substantially smaller model sizes. Third, we reduce both the model size and the amount of data required to outperform LLMs; our finetuned 770M T5 model outperforms the few-shot prompted 540B PaLM model using only 80% of available data on a benchmark, whereas standard finetuning the same T5 model struggles to match even by using 100% of the dataset. We release the code at: this https URL.
    idea: "LLM이 생성한 rationale(추론 과정)을 추가 감독 신호로 활용하여 작은 모델을 멀티태스크로 학습시키는 새로운 증류 방법. 핵심은 L = L_label + λ L_rationale 손실 함수로 정답 예측과 rationale 생성을 동시 학습. [label]/[rationale] 프리픽스로 작업 분리하여 같은 모델이 두 태스크를 수행. 770M T5가 540B PaLM Few-shot CoT를 초과하는 성능을 보이며, 표준 finetuning/distillation 대비 데이터 사용량과 모델 크기를 동시에 절약. 4개 NLP 벤치마크에서 더 적은 데이터와 더 작은 모델로 더 나은 성능 달성."
    relevance: "한국어 MWP의 CG(JSON triples) 생성이 rationale 역할을 하므로 직접 적용 가능한 핵심 방법론. 교사 LLM(Llama-4-Maveric)이 생성한 7K 학습셋에서 '정답 + CG'를 동시 감독하여 sLLM(≤10B)이 추론 과정을 내재화하도록 유도. Self-Instruct로 생성한 1-2k 보강 데이터와 결합하여 데이터 효율성 극대화. 논문의 데이터/모델 효율성 결과는 우리 목표인 'LLM 수준 성능을 작은 모델로 재현'에 직접 부합하며, CG 생성 과정 자체가 수학적 추론의 중간 단계를 구조화한 rationale 형태."
    tips: "구현 방법: (1) 데이터 구성: 입력=한국어 MWP, 출력1([label])=최종 정답, 출력2([rationale])=CG facts+disambiguation JSON, (2) 손실 균형: λ∈{0.3,0.5,0.7} 스윕하여 CG 품질과 정답 정확도 균형점 탐지, (3) 커리큘럼 연계: Phased IFT와 결합하여 Phase-1(단순 CG, triple≤3)→Phase-2(복합 CG, >3) 순차 학습, (4) 품질 검증: 교사 LLM별(GPT-4, Llama-4-Maveric) rationale 품질 비교 실험, (5) 평가 지표: MR 정확도, 스키마 준수율, triple F1, 형식 오류율, 추론 일관성, (6) 어블레이션: no-rationale vs single-task vs multi-task, 프리픽스 유무, CG 길이 제한 효과 분석."

  - title: "Phased Instruction Fine-Tuning for Large Language Models"
    venue: "ACL 2024 (Findings)"
    link: "https://aclanthology.org/2024.findings-acl.341/"
    abstract: |
      Instruction Fine-Tuning enhances pre-trained language models from basic next-word prediction to complex instruction-following. However, existing One-off Instruction Fine-Tuning (One-off IFT) method, applied on a diverse instruction, may not effectively boost models' adherence to instructions due to the simultaneous handling of varying instruction complexities. To improve this, Phased Instruction Fine-Tuning (Phased IFT) is proposed, based on the idea that learning to follow instructions is a gradual process. It assesses instruction difficulty using GPT-4, divides the instruction data into subsets of increasing difficulty, and uptrains the model sequentially on these subsets. Experiments with Llama-2 7B/13B/70B, Llama3 8/70B and Mistral-7B models using Alpaca data show that Phased IFT significantly outperforms One-off IFT, supporting the progressive alignment hypothesis and providing a simple and efficient way to enhance large language models. Codes and datasets from our experiments are freely available at this https URL.
    idea: "Progressive Alignment Hypothesis에 기반한 단계적 instruction fine-tuning 방법. GPT-4를 활용해 instruction 난이도를 1-5점으로 평가하고, 누적 확률 분포를 통해 데이터셋을 쉬운(Stage 1)→중간(Stage 2)→어려운(Stage 3) 3단계로 분할. 각 단계를 순차적으로 uptraining하여 모델이 점진적으로 복잡한 instruction을 학습하도록 유도. Llama2/3, Mistral 등 다양한 모델에서 One-off IFT 대비 일관된 성능 향상. 6가지 permutation 실험을 통해 '쉬운→어려운' 순서가 최적임을 증명하고, ablation study로 각 단계의 기여도 분석."
    relevance: "한국어 MWP CG 생성에서 형식 준수와 안정적 수렴을 달성하는 핵심 방법론. JSON triple 수(≤3 vs >3)를 난이도 기준으로 설정하여 Phase-1(단순 CG)→Phase-2(복합 CG) 커리큘럼 구성 가능. Distilling Step-by-Step과 결합 시 rationale 품질이 단계별로 향상되어 최종 성능 극대화. 논문의 Progressive Alignment Hypothesis는 sLLM이 복잡한 CG 생성을 점진적으로 학습해야 한다는 우리 가설과 부합하며, permutation 실험 결과는 커리큘럼 설계의 중요성을 입증."
    tips: "다차원적 난이도 평가 체계: (1) 추론 깊이 평가: 1-step 직접 연산(Stage1) → 2-3step 중간 추론(Stage2) → 4+step 복합 추론(Stage3), MWP 텍스트에서 최종 답까지의 논리적 단계 수 측정. (2) 개념 복잡성 평가: 기본 사칙연산(Stage1) → 비율/분수/소수 조합(Stage2) → 다변수 연립/추상적 관계(Stage3), 관련 수학 개념의 추상화 레벨 분석. (3) 혼동 요소 민감성: 단순 정보 추출(Stage1) → 부분적 misleading 정보(Stage2) → 복잡한 distractor 패턴(Stage3), 문제 텍스트의 cognitive load 측정. (4) GPT-4 기반 종합 평가: '이 문제를 풀기 위해 필요한 추론 단계, 수학적 개념 복잡도, 혼동 가능성을 1-5점으로 평가'하는 다차원 프롬프트 설계. (5) 자동 분할 규칙: 3개 차원 점수의 가중 평균(α*추론깊이 + β*개념복잡성 + γ*혼동민감성)으로 최종 난이도 산출, 1.5/3.5 임계값으로 3단계 분할. (6) 검증 메커니즘: 각 stage 내 난이도 분산 최소화, stage 간 명확한 구분성 확보, 인간 전문가 샘플 검증."

