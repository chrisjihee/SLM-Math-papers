papers:
  - venue: "한국소프트웨어종합학술대회 2024"
    title: "복합 추론을 위한 한국어 중심의 소형 생성 언어모델 구축"
    link: null
    keywords:
      - 생성 언어 모델
      - 산술추론
      - 복합추론
      - 소형 언어모델
      - STEM
      - 지속적 배포
    md_file: "md-related/복합 추론을위한 한국어 중심의소형생성언어모델 구축.md"
    
    abstract: |
      최근 가중치에 자유롭게 접근 가능한 대형 언어모델이 공개되고, 다양한 하위태스크에서 과거와 비교하기 어려운 성능과 편의를 제공하고 있지만 여전히 실용성이 좋은 작은 생성 언어모델에 대한 연구와 공개 모델이 부족하다. 본 논문을 통해 한국어 중심의 7B 미만의 생성 언어모델 모델 3종(1.3B, 3.1B, 6.7B)을 구축하는 연구를 소개하고, 구축 중인 모델의 학습과 배포를 위한 접근 전략과 신경망 기초정보를 제공한다. 이들 중 현재 공개된 1.3B 급의 모델에 대한 문맥 내 학습 성능을 유사 규모의 공개 모델과 비교하고, 산술 연산을 수행하는 소규모의 하위 태스크를 통해서 응용 성능을 살펴본 뒤 해결해야 할 문제와 방향을 논의한다. 본 연구를 통해서 구축 중인 모델은 STEM 분야의 복합 추론을 최종 목표로 삼아 발전시키고자 한다.
    
    contents:
      서론: |
        생성 언어모델은 자연어 처리 분야에서 질의응답, 대화시스템을 포함해 데이터 합성 영역에서 과거와 비교할 수 없는 개선을 가져왔다. 그럼에도 불구하고, 아직 다중 추론(Multi-hop Reasoning) 및 수학 추론을 포함한 복합 추론 영역에서는 많은 도전이 필요하다. 소형 언어모델에 대한 요구는 초대형 모델의 추론 비용 감소와 맥을 같이할 것이나, 응용 시스템의 차별화나 영업비밀이나 개인정보와 같은 민감 정보 처리가 필요한 경우 등 그 수요는 여전히 존재할 것으로 여겨진다.
        
        최근에는 Bllossom, KULLM과 같이 가중치에 자유롭게 접근 가능한 LLaMA 3, Mistral 모델에 기반, 한국어 어휘 사전 영역을 기존 사전에 더하는 사전 확장 기법을 적용하고 대용량의 한국어 말뭉치를 사용해 다양한 한국어 대상 태스크를 다룰 수 있는 고성능 모델이 공개되고 있다. 하지만 이들 모델은 그 근본이 되는 기초 모델의 크기가 8B 이상으로 커짐에 따라, 파라미터 효율적 미세조정 기법의 접근성이 우수함에도 불구하고 여전히 학습과 추론에 많은 시간과 비용을 요구한다. 또한, 이들은 지도 미세조정(Supervised Fine-Tuning; SFT) 및 선호도 정렬(Preference Alignment) 과정을 통해 추가학습 된 모델로, 정렬되지 않은 기초 모델에 비해 추가 미세조정에서 약간의 성능 상 페널티를 감수해야 한다.
        
        생성 언어모델의 파라미터 수는 창발적 능력(Emergent Abilities)의 출현 뿐만 아니라 지식 도메인 다양성에 막대한 영향을 미치기 때문에, 본 연구에서 다루고자하는 7B 이하의 모델들은 앞서 언급된 공개 모델의 역할과 달리 범용 질의응답 및 지시 이행 용도에서 뚜렷한 한계를 지니고 있다고 봐도 무방하다. 이러한 바탕을 감안해, 본 연구에서는 수십B 이상의 대형 언어모델에서 기대하는 범용 추론능력을 단순히 작은 모델에서 유사하게 재현하는 것을 목표로하는 대신, 제한된 도메인 내에서 복잡한 추론을 수행할 수 있는 모델로 이어지기 위한 기초 모델을 만드는데 집중하고자 한다.

      복합_추론을_위한_생성_언어모델_구축: |
        본 연구에서 활용하고 있는 사전학습 목적의 학습 데이터는 다양한 경로를 통해 공개된 비영리 목적 활용 데이터와 함께, 자체적으로 수집, 합성한 데이터를 혼합하여 사용한다. AIHUB에서 공개된 대화/MRC/요약/번역/RAW 데이터 등의 텍스트 데이터, KISTI 논문 전문 데이터셋, 국립국어원의 모두의 말뭉치, 한국어 위키피디어 데이터셋(2020년 덤프), KcBERT 데이터셋 등을 포함한 한국어 데이터셋과 함께, 공개된 영미권 데이터셋인 SlimPajama-627B, 그리고 STEM 분야를 위해 Proof-pile-2 데이터셋, autoMathText 등 약 800B급 토큰으로 구성된 데이터를 샘플링하여 사용한다.
        
        1.3B 모델에서는 토큰 수 기준으로 한국어의 비중이 1/3 정도를 차지하는 250B 토큰 규모의 데이터, 3B 이상 모델에서는 한국어의 비중이 1/5로 구성되어있는 550B 토큰 규모의 데이터를 사용한다. 여기에 수학 분야를 위해 산술 연산 데이터를 합성하여 사전학습에 활용한다. 이 때 각 숫자 토큰의 통계적 분포가 비슷하게 유지되도록 구성하는 것이 핵심이며, 약 9B 토큰 규모로 이루어져있다.
        
        본 연구에서는 보유하고 있는 인적, 물적 자원의 한계를 인정하고 기존의 생명 주기 대신 SW 개발과 유사하게 가중치를 점진적으로 변화시켜나가는 지속적 배포(Continuous Release) 전략을 사용한다. 또한, 향후 지속적 가중치 변화를 통해 발생할 수 있는 성능 저하 문제를 마주하고, 이들을 극복할 수 있는 연구를 시도할 수 있는 기회로 삼고자 한다.
        
        토크나이저는 서브워드 토크나이저 모델을 별도로 구성하였다. 첫째, 숫자 토큰이 서브워드로 묶이는 것을 방지하기 위해 아라비아 숫자 영역을 모두 사전 토큰화(Pre-tokenize)하였다. 여러 숫자가 하나의 토큰으로 묶이는 것으로, 숫자 토큰의 통계적 특성 왜곡이 산술 연산 단계의 실수를 크게 증가시킬 것으로 판단했기 때문이다. 둘째, 한국어가 가급적 개념 단위로 처리될 수 있도록 형태소를 고려한 서브워드 토큰화 전략을 사용하였다.
        
        모델의 아키텍쳐는 1.3B 모델과 6.7B 모델에 GPT-NeoX 호환 아키텍처를 사용하였으며, 3.1B 모델은 LLaMA 아키텍처를 사용한다. 1.3B 모델의 경우에는, 2,048 토큰 길이로 구성된 샘플을 약 500B tokens 사전학습하였고, 이후 RoPE base를 500k로 증가시키고, 같은 학습 데이터를 샘플 당 16,384 토큰 길이로 구성해 약 134B tokens를 추가 학습하는 방법으로 긴 문맥을 처리할 수 있게 확장하였다.

      실험_평가: |
        사전학습 후 정렬 과정을 거치지 않은 기초모델의 평가를 위해, KOBEST 벤치마크 데이터셋을 사용한 0/5/10-shot 문맥 내 학습(In-Context Learning; ICL)을 사용하였다. 벤치마크 데이터셋의 도메인이 목표 도메인에 부합하지 않기 때문에, 절대적 성능 수치와 함께 예시의 수에 따라 점증적으로 성능이 향상되는지를 함께 살펴보았다. 
        
        비교군 모델로 polyglot-ko-1.3b, tinyllama-v1.1, gemma-2-2b 등 연구 초기 단계의 모델과 최신 모델을 사용해 본 연구의 구축 결과물이 갖는 경쟁력을 확인하였다. 본 연구를 통해 구축한 모델이 성능 수치와 샘플-성능 상승 능력을 더 잘 유지하고 있음을 확인할 수 있으며, 그 중 장기 문맥을 지원하는 모델에서 상대적으로 더 좋은 샘플-성능 관계를 가지는 것을 확인할 수 있다.
        
        산술 능력 평가를 위해 Math401 데이터셋을 사용하여 정확도를 평가하였다. 미세조정 목적의 한국어 산술 데이터셋을 별도로 구축, 활용하였다. 구축된 10만 개의 샘플 중 8천 개를 샘플링 후 이를 학습/검증 셋트로 나누어 미세조정을 실시하였다. 실험 결과, 소량의 데이터를 사용한 미세조정 실험 및 평가를 통해서 사전학습 된 모델의 전이학습 능력을 평가하였으나, 초기/최대 학습률, epoch 수와 같이 각 기초 모델에 맞는 하이퍼파라미터 구성이 제각기 다를 것임을 확인하였다.
        
        소형 생성 언어모델이 어려움을 겪는 산술 연산 영역은 다음과 같았다: ±10^10 이상 큰 수에 대한 사칙 연산식, 괄호에 의한 우선순위 처리를 요하는 연산식, (소수점이 포함된 수들의) 제곱 연산 및 나누기, 로그 및 삼각함수의 연산. 이러한 취약 연산 영역의 특징은 Chain-of-Thought 스타일의 긴 풀이가 적고, 사전학습 단계에서 쉽게 노출되지 않는 토큰 시퀀스에 해당한다.

      관련연구_및_논의: |
        본 연구에서 사용하고 있는 사전학습 모델 전략과 관련하여, 대형 사전학습 언어모델의 지속 학습 문제를 연관지을 수 있다. 사전학습 언어모델의 지속학습은 신규 도메인 적응을 위해 이루어지는 경우가 많은데, Task drifting이 일어나는 많은 지속 학습 연구에서 다룬 문제와 다른 점이 존재한다. 지속학습이 단순히 기존 지식의 망각 형태로 이어지는 것이 아니라, 기존 학습된 지식과 신규 지식 사이의 의미적 연관성에 따라 다른 양상을 보인다는 연구가 있다.
        
        본 연구에서는 기초 모델의 성능 평가 방법으로 Few-shot ICL을 사용하였다. 대안적 평가 방안으로 T0-Eval과 같이, 사전학습된 모델에 고정된 집합의 프롬프트 튜닝 데이터셋을 사용해 학습 후 Unseen task의 일반화 성능을 평가하는 방법을 생각해 볼 수 있다. 하지만, 현재의 생성 모델 평가에서는 지시 이행 능력 평가, Multi-choice 선택 등 대부분의 성능 평가용 데이터셋은 정렬이 완료된 모델에 대한 지식 인출 능력 평가에 집중되어 있는데, 이들은 파라미터 크기와 선형적 비례관계에 놓여있기에, 제한적 도메인과 태스크를 목표로 두는 소형 모델의 성능을 평가하기에는 다소 미흡한 점이 있다.

      결론: |
        지금까지 현재 진행중인 소형 생성 언어모델의 구축에 관련된 상세한 내용을 살펴보고, 약간의 실험을 통해 공개된 모델의 기초 성능을 문맥 내 학습 평가를 통해 확인해보았다. 또한, 소량의 한국어 중심 산술 연산 데이터를 통해 모델을 튜닝하고, 산술 연산 수식의 예측 성능을 확인하였다. 같은 조건의 미세조정 데이터를 사용하여 경쟁력이 있음을 확인하였으나, 정렬 후 배포된 공개 모델의 성능은 더욱 좋아, 고품질의 지시 이행을 위한 정렬 데이터와 학습 과정을 적용하여 개선해야 할 여지가 많음도 확인할 수 있었다. 향후에는 아직 공개되지 못한 기초 모델의 학습, 성능 개선을 통해 연구 활동에 활용할 수 있는 추가 모델을 공개하고, 복합 추론을 위한 지시 이행 능력 향상 연구를 지속할 예정이다.
    
    relevance: |
      1. **소형 언어모델의 실용성 연구**: 7B 미만의 소형 생성 언어모델(1.3B, 3.1B, 6.7B)을 구축하며, 대형 모델의 추론 비용 문제를 해결하고 민감 정보 처리가 필요한 응용 시스템에 활용 가능한 모델을 제시한다.
      2. **한국어 중심의 모델 구축 전략**: 한국어와 영어 데이터를 적절한 비율로 혼합(1.3B 모델: 1/3 한국어, 3B 이상: 1/5 한국어)하고, 형태소를 고려한 서브워드 토큰화 전략을 사용하여 한국어 처리 능력을 최적화한다.
      3. **지속적 배포(Continuous Release) 전략**: 기존의 일회성 학습 방식 대신 SW 개발처럼 가중치를 점진적으로 변화시켜나가는 접근 방식을 채택하여, 제한된 자원을 가진 조직에서도 모델 구축이 가능함을 보여준다.
      4. **산술 연산을 위한 특별한 데이터 처리**: 숫자 토큰이 서브워드로 묶이지 않도록 사전 토큰화를 수행하고, 약 9B 토큰 규모의 합성 산술 연산 데이터를 생성하여 각 숫자 토큰의 통계적 분포를 유지한다.
      5. **복합 추론을 위한 STEM 도메인 특화**: 범용 추론능력보다는 STEM 분야의 복합 추론에 집중하여, 제한된 도메인 내에서 높은 성능을 달성하는 전략을 취한다.
      6. **장기 문맥 확장 기법**: RoPE base를 500k로 증가시키고 16,384 토큰 길이로 추가 학습하여 긴 문맥 처리 능력을 확장하는 방법을 제시한다.
    
    tips: |
      1. **토크나이저 설계 시 숫자 토큰 처리**: 수학 추론 모델을 구축할 때 아라비아 숫자 영역을 사전 토큰화하여 숫자 토큰의 통계적 특성 왜곡을 방지하라. 여러 숫자가 하나의 토큰으로 묶이면 산술 연산 단계에서 실수가 크게 증가한다.
      2. **한국어를 위한 형태소 기반 토큰화**: 한국어는 교착어이기 때문에 접사가 다채롭게 변할 수 있으므로, 형태소를 고려한 서브워드 토큰화 전략을 사용하여 개념 단위로 처리되도록 설계하라.
      3. **데이터 혼합 비율 전략**: 1.3B 모델에는 한국어 1/3, 3B 이상 모델에는 한국어 1/5의 비율로 구성하여, 모델 크기에 따라 다국어 균형을 조정하라.
      4. **합성 데이터 생성 시 통계적 분포 유지**: 산술 연산 데이터를 합성할 때 각 숫자 토큰의 통계적 분포가 비슷하게 유지되도록 구성하는 것이 핵심이다. 약 9B 토큰 규모로 구성하라.
      5. **ICL 성능 평가 방법**: 기초 모델의 성능을 평가할 때 0/5/10-shot ICL을 사용하여 예시의 수에 따라 점증적으로 성능이 향상되는지 확인하라. 이는 모델의 문맥 학습 능력을 측정하는 좋은 지표이다.
      6. **장기 문맥 확장 전략**: 초기 학습은 2,048 토큰 길이로 진행하고, 이후 RoPE base를 500k로 증가시킨 후 16,384 토큰 길이로 추가 학습하여 문맥 확장을 수행하라.
      7. **취약 연산 영역 파악**: ±10^10 이상 큰 수, 괄호 우선순위, 소수점 제곱 연산, 로그/삼각함수 등 CoT 스타일의 긴 풀이가 적은 영역을 파악하고, 해당 영역의 학습 데이터를 보강하라.
      8. **지속적 배포 전략 채택**: 일회성 대규모 학습 대신 가중치를 점진적으로 변화시켜나가는 Continuous Release 전략을 사용하여, 최신 지식을 보유하고 자원 한계를 극복하라.
      9. **아키텍처 선택 시 FP16 안정성 고려**: FP16 정밀도에서 학습 불안정성이 관측되면 GPT-NeoX 아키텍처를, BFloat16 지원 환경에서는 LLaMA 아키텍처(SwiGLU, RMSNorm)를 고려하라.
      10. **Cooldown Stage 도입**: 추가 사전학습 시 배치 크기를 늘리고 학습률을 낮추며 Weight Decay Rate를 0에 가깝게 만드는 Cooldown Stage를 도입하여 성능 저하를 방지하라.
      11. **평가 데이터 다양화**: 학습에 사용된 유형뿐만 아니라 학습시키지 않은 유형도 포함한 실제 문제집 데이터로 평가하여 과적합 여부를 판별하라.
      12. **STEM 데이터 통합**: Proof-pile-2, autoMathText 등 STEM 분야 특화 데이터를 통합하여 복합 추론 능력을 향상시키되, 전체 학습 데이터의 균형을 유지하라.

