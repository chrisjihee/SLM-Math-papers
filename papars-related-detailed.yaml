    abstract: |
      본 논문에서는 한국어 문장형 수학 문제 풀이를 위한 데이터 세트를 생성하고 기계 번역 모델 구조 기반의 문제 풀이모델을 학습시켜 성능과 데이터의 유효성을 확인한다. 문장형 수학 문제란 수학적 논리 관계가 함축된 자연어 문장을 가리키며 이러한 문제를 풀기 위해서는 학습 모델은 언어의 이해와 추론 능력이 요구된다. 해외에서는 해당 연구를 위한 데이터 세트가 마련되어 있지만, 국내에서는 해당 한국어 데이터 세트에 대한 공개가 부족하다. 본 논문에서는 이러한 문제를 해결하기 위해 한국어 데이터 생성기를 구현한다. 데이터 생성기는 크게는 네 가지 유형으로 구성되며, 구체적으로는 42가지의 세부 유형을 포함한다. 모델 학습을 위해서 총 15만 개의 데이터를 생성 및 사용하며, 학습된 모델의 평가를 위해서는 학습 문제 유형과 상관없이 실제 수학 문제집에서 등장하는 문제 311개를 사용한다. 이를 통하여 모델 성능 측정과 모델이 생성 데이터의 형식에만 과적합 되진 않았는지 확인한다. 실험 결과 본 데이터 생성기가 기계 번역 구조 기반의 수학 문제 풀이모델에 적용 가능함을 확인하였다.
    
    contents:
      서론: |
        문장형 수학 문제(Math Word Problem, MWP)는 수학적 논리와 수, 그리고 자연어로 구성된 문제이다. 문장형 수학 문제 풀이모델은 이러한 문제를 입력받으면 주어진 상황을 이해하고 문장 내의 필요한 정보를 추출하여 새로운 정보인 수식을 도출해야 한다. 이를 위해서 모델은 인간처럼 다양한 도메인 지식을 습득할 수 있어야 하며, 학습한 기반 지식을 사용하여 맥락 파악과 합리적인 수식을 추론하는 및 생성하는 능력이 요구된다.
        
        언어 능력과 추론 능력을 확인할 수 있기에 최근에는 튜링 테스트(Turing test)보다 수학, 과학의 문제를 풀게 하는 것이 인공지능의 실제 지식을 평가하는 데에 더 적합하다는 연구도 보고 되었다. 이런 평가와 학습에는 주로 문장형 수학 데이터 세트가 활용될 수 있다. 하지만 기존의 연구들은 영어와 중국어 기반의 연구가 주를 이뤘고, 한국어 데이터의 경우 연구를 위한 공개 사례가 다소 부족한 실정이다. 본 연구에서는 한국어 기반의 문장형 수학 문제 풀이모델의 학습을 위해 데이터를 만들고 그 성능과 유효성을 확인한다.

      한국어_데이터_생성기_구현: |
        본 논문에서는 한국어 기반의 문장형 수학 문제 풀이모델을 학습시키기 위해 한국어 데이터 생성기를 직접 구현한다. 이전까지의 연구들은 주로 국외에서 이루어지고 ASDiv-A, Math23, HMWP, Dolphin18K, MAWPs 등의 영어 또는 중국어 기반의 데이터를 이용한 문제 풀이모델에 관한 연구이다. 한국어 기반으로 진행하기 위해서는 앞선 형태의 데이터 세트들을 일차적으로 한국어로 번역한 후, 영미권 단위 표현, 고유명사, 문화적 차이나 익숙하지 않은 상황들을 대체 표현으로 바꾸는 등의 과정이 요구된다.
        
        본 연구에서는 해당 데이터 세트를 번역하는 대신, 데이터 생성기를 통해 원하는 양의 데이터를 얻고 그 데이터를 기반으로 모델을 학습시킨 후 모델의 성능과 생성 데이터의 유효성 평가를 수행한다. 생성기가 만들어 내는 문제 지문과 난이도는 초등학생 수준의 학생이 이해하고 풀 수 있는 난이도로 설정하였으며, 데이터 생성기는 산술 연산(12), 순서 정하기(7), 수 찾기(11), 도형(12) 등 크게 네 가지 유형으로 구성되며, 구체적으로는 42가지의 세부 유형을 포함한다.
        
        데이터를 만들 때 생성기는 서술형 문장을 변형한다. 문장형 수학 문제는 유형이 같더라도 지문의 표현은 다양하다. 특히 한국어는 교착어이기 때문에 접사가 다채롭게 변할 수 있는데, 이로 인해 의미는 같지만, 표현이 달라진다. 강건한 수학 문제 풀이모델을 만들기 위해서는 모델에 가능한 많은 표현을 학습시키는 것이 중요하다. 이러한 이유로 생성기는 예시 문제에서 명사, 고유명사, 문장의 순서, 접사, 산술 연산자, 피연산자를 변형하여 문제를 생성할 수 있도록 한다.

      실험_방법: |
        실험에 쓰인 모델은 vanilla Seq2Seq 모델, attention을 추가한 Seq2Seq 모델과 트랜스포머를 사용한다. 두 Seq2Seq 모델들의 인코더와 디코더에는 게이트 순환 유닛(Gated Recurrent Unit, GRU)이 사용된다. 최적화에는 Adam을 사용한다. 모든 모델은 400회의 Epoch를 수행하고 early stopping을 적용하여 20회 동안 검증 손실 값의 감소가 없으면 도중에 학습을 멈추도록 한다.
        
        모델의 학습에는 15만 개의 생성된 수학 문제와 수식을 사용하며, 검증에는 3만 개의 데이터가 사용된다. 모델의 평가는 311개의 데이터로 이루어진다. 평가 데이터는 실제 문제집에서 등장하는 문제들로만 구성한다. 평가 데이터를 뽑을 때 문제 유형을 가리지 않았기에 모델 학습에 사용된 유형뿐만 아니라 학습시키지 않은 유형도 포함되어 있다. 이는 성능 평가뿐 아니라 모델이 생성 데이터 세트에 과적합 된 상태인지를 판별 및 모르는 유형이라도 얼마나 정답에 근접할 수 있는지 확인하기 위함이다.

      실험_결과: |
        각 모델의 실험 결과, 평가 지표로는 정확도를 사용하였으며, 예측 수식으로 얻어낸 값이 실제 값과 일치하는지를 의미한다. 평가 데이터 세트에서 가장 높은 성능을 보인 것은 트랜스포머 모델이다. 311개 중 108개를 맞추며 34.71%의 정확도를 보여주었다. Attention을 적용한 Seq2Seq 모델은 트랜스포머 모델보다 검증 데이터 세트에서는 정확도가 0.51% 더 높은 결과를 보였지만, 평가 데이터 세트에서 64개를 맞추며 트랜스포머 모델 성능보다 정확도가 14.15% 낮은 20.57%를 기록하였다. Seq2Seq 모델은 평가 데이터 세트에서 51개를 맞추어 16.39%의 정확도를 보였으며 검증과 평가 두 데이터 세트에서 가장 낮은 수치를 기록하였다.
        
        해당 실험 결과를 통해 트랜스포머 모델이 다른 두 모델보다 표현의 변화에 비교적 강건함을 확인하였다. 본 데이터 생성기 또한 모델을 생성 데이터에 과적합 시키지 않아 실제 문제에서도 유효함을 확인할 수 있었다. 하지만 더 많은 문제 유형과 언어 표현에 대한 보충이 필요할 것으로 보인다. 실험을 통해서 여전히 학습 데이터와 실제 문제 사이의 성능 차이가 있음을 또한 확인하였다.

      결론: |
        본 논문은 생성한 데이터 세트와 기계 번역 모델을 이용하여 한국어 기반의 문장형 수학 문제 풀이에 적용할 수 있을지에 대한 실험을 진행하였다. 한국어 기반 수학 문제 풀이모델을 만들기 위해 직접 데이터 생성기를 구현하여 서술형 문제와 수식을 생성하였다. 모델은 Seq2Seq 모델과 attention을 적용한 Seq2Seq, 트랜스포머를 사용하였으며, 평가 결과 트랜스포머에서 34.72%로 실험한 모델 중 가장 높은 정확도를 기록하였다. 이는 데이터 생성기가 유효하며 학습된 모델이 실제 문제에서도 적용 가능한 것으로 보인다. 하지만 실험을 통해서 여전히 학습 데이터와 실제 문제 사이의 성능 차이가 있음을 확인하였다. 이를 해결하기 위해서는 더욱 많은 데이터의 유형과 변형을 추가하고 보다 일반화된 풀이모델 학습이 필요하겠다.
    
    relevance: |
      1. **한국어 특화 데이터 생성기 구축**: 영어/중국어 데이터를 번역하는 대신, 한국어 문화와 표현에 맞는 데이터 생성기를 직접 구현하여 42가지 세부 유형을 포함한 15만 개의 학습 데이터를 생성한다.
      2. **교착어 특성을 고려한 데이터 다양화**: 한국어는 교착어로 접사가 다채롭게 변할 수 있으므로, 명사, 고유명사, 문장의 순서, 접사, 산술 연산자, 피연산자를 변형하여 강건한 모델을 학습시킨다.
      3. **실제 문제집 기반 평가**: 학습 문제 유형과 상관없이 실제 수학 문제집에서 등장하는 문제 311개를 사용하여 모델의 일반화 능력과 과적합 여부를 검증한다.
      4. **Transformer의 우수성 입증**: Vanilla Seq2Seq, Attention-based Seq2Seq, Transformer 모델을 비교한 결과, Transformer가 34.71%의 정확도로 표현 변화에 가장 강건함을 확인한다.
      5. **초등학생 수준의 난이도 설정**: 데이터 생성기가 만드는 문제의 난이도를 초등학생이 이해하고 풀 수 있는 수준으로 설정하여, 기초적인 수학 추론 능력을 평가한다.
    
    tips: |
      1. **한국어 데이터 직접 생성 권장**: 영어 데이터를 번역하는 대신 한국어 문화와 표현에 맞는 데이터 생성기를 구현하라. 이는 영미권 단위 표현, 고유명사, 문화적 차이 등의 문제를 원천적으로 해결한다.
      2. **교착어 특성 활용**: 한국어 문장형 수학 문제 데이터를 생성할 때 접사, 조사, 어미 등을 다양하게 변형하여 같은 의미를 다르게 표현하는 데이터를 대량으로 생성하라.
      3. **문제 유형 다각화**: 산술 연산(12), 순서 정하기(7), 수 찾기(11), 도형(12) 등 다양한 문제 유형을 포함하되, 각 유형 내에서도 세부 유형을 세분화하라. 본 연구에서는 42가지 세부 유형을 구현했다.
      4. **실제 문제집으로 평가**: 생성 데이터로 학습한 모델을 평가할 때는 반드시 실제 문제집의 문제를 사용하라. 학습 유형에 없는 문제도 포함하여 모델의 일반화 능력과 과적합 여부를 판별하라.
      5. **Transformer 모델 우선 고려**: Seq2Seq 구조를 선택할 때 Transformer를 우선적으로 고려하라. 본 연구에서 Transformer가 Attention-based Seq2Seq보다 14.15% 높은 성능을 보였다.
      6. **Early Stopping 적용**: 400 Epoch를 목표로 하되, 20회 동안 검증 손실 값의 감소가 없으면 학습을 중단하는 early stopping을 적용하여 과적합을 방지하라.
      7. **학습/검증/평가 데이터 분리**: 15만 개 학습, 3만 개 검증, 311개 평가 데이터로 구성하되, 평가 데이터는 생성 데이터가 아닌 실제 문제집에서 추출하라.
      8. **문장 변형 자동화**: 예시 문제에서 명사, 고유명사, 문장의 순서, 접사, 산술 연산자, 피연산자를 자동으로 변형하는 시스템을 구축하여 데이터 다양성을 확보하라.
      9. **정확도 기반 평가**: 예측 수식으로 얻어낸 값이 실제 값과 정확히 일치하는지를 평가 지표로 사용하라. 근사값이 아닌 정확한 일치를 기준으로 삼아야 한다.
      10. **GRU 기반 Seq2Seq**: Seq2Seq 모델의 인코더와 디코더에는 게이트 순환 유닛(GRU)을 사용하고, 최적화에는 Adam optimizer를 사용하라.

  - venue: "한국전자통신연구원"
    title: "KoGSM: 한국어 초등학교 수학추론 벤치마크"
    link: null
    keywords:
      - KoGSM
      - 수학추론 벤치마크
      - GSM8k
      - MetaMathQA
      - Mistral
      - Llama3
      - CoT
      - LoRA
    md_file: "md-related/KoGSM 한국어 초등학교 수학추론 벤치마크.md"
    
    abstract: |
      본 논문에서는 한국의 교육수준과 환경에 맞는 수학문제추론 벤치마크인 KoGSM에 대해서 소개한다. 자동번역 후 번역검수한 한국어 GSM8k 데이터와 비교 실험을 수행하였고, KoGSM 벤치마크가 문제의 다양성과 난이도가 높은 것을 확인하였다. 그리고, Mistral-7B와 Llama3-8B 모델에 기반하여 한국어 MetaMathQA 데이터와 KoGSM 데이터의 다양한 조합에 따른 학습 모델군을 비교평가 하였고, Llama3-8B에 기반한 모델군이 성능이 우수함을 확인하였다.
    
    contents:
      서론: |
        초거대 언어모델의 발전으로 인공지능에 대한 기대와 함께 초거대 언어모델이 논리적 추론이 가능하지, 아니면 단지 패턴에 따른 결과 생성인지에 대한 논란이 있다. 이와 같은 의문을 해소하기 위해, 언어이해 능력과 수리적 논리추론이 요구되는 수학문제추론(math word problem) 태스크에 대한 관심이 늘어나면서, 다양한 수학문제추론 벤치마크가 구축되어 초거대 언어모델의 능력을 평가하고 있다.
        
        그러나, 한국어로 된 수학문제추론 벤치마크는 아직 존재하지 않고, 단지 영어로 구성된 GSM8k, MATH 벤치마크 등을 자동 번역하여 벤치마크로 사용하고 있다. 이렇게 자동 번역된 데이터는 번역오류와 함께 문화적 차이(수치단위, 문화적 상식 등)가 존재하여 한국어 초거대 언어모델에 대한 수학문제추론 평가에 한계가 있다. 본 논문에서는 언급된 문제를 해결하기 위해 국내 초등학교 5학년~6학년 학습수준의 수학문제추론 벤치마크인 KoGSM(Korean Grade School Math) 벤치마크를 소개한다.
        
        KoGSM 벤치마크는 상용 초거대 언어모델로부터 지식증류한 합성데이터이다. 그리고, KoGSM과 MetaMathQA 데이터를 이용하여 Mistral-7B와 Llama3-8B 모델을 학습하고 평가한 결과, GSM8k 보다 KoGSM 데이터의 문제 난이도가 높은 것을 확인하였다. 또한 전반적인 성능이 낮아서 초거대언어모델과 달리 소형언어모델은 아직 수학문제추론에 한계가 있고, 많은 연구가 진행되어야 함을 확인하는 결과이다.

      관련연구: |
        GSM8k는 초등학교 수준의 수학문제 벤치마크이다. 작업자가 기본산술연산 (덧셈, 뺄셈, 곱셈, 나눗셈)을 사용하여 최종적인 답에 도달할 수 있는 문제와 단계별 추론 솔루션을 구축한 벤치마크로 8.5k개 train데이터와 1k의 test데이터로 구성되어 있다. 최근 GSM8k 데이터들이 초거대 언어모델의 사전학습 데이터에 포함되어 데이터오염 문제가 있다는 의구심으로 인해 평가에 대한 신뢰도 문제가 있다.
        
        MATH는 도전적인 수학경시대회 문제(competition mathematics problems) 12.5k로 구성된 벤치마크이다. MATH는 각 문제에 대해서 모델이 정답을 도출하기 위해 필요한 풀이과정의 설명을 가르치도록 단계별 솔루션을 제공하고 있다.
        
        MetaMathQA 데이터셋은 질문을 세가지 방식의 부트스트래핑 방법으로 확장하고, 정답 솔루션을 증강하는 방식으로 GSM8k와 MATH 데이터를 증강하여 395k로 구성한 수학문제추론 데이터셋이다. 앞서 언급된 데이터들은 영어로 된 수학문제 데이터로 영어권의 수치단위나 상식이 포함된 경우가 많아 한국어 언어모델의 평가에는 부적절하다.

      KoGSM_벤치마크_구축: |
        KoGSM 벤치마크는 N차 반복 프롬프팅을 통해 초거대언어모델로부터 구축되었다. 벤치마크 구축에 사용된 초거대언어모델은 ChatGPT4o, Claude3.5 sonnet, Gemini, Gemini_adv이다. 구축된 데이터는 총 50,156개로 Train 데이터와 Test 데이터를 9:1의 비율로 구성하였다.
        
        Grade(학년-학기) 별로 5-1학년부터 6-2학년까지 고르게 분포되어 있으며, 생성 LLM 별로는 ChatGPT4o, Claude3.5 sonnet, Gemini, Gemini_adv가 각각 다른 비율로 기여하였다. 이렇게 다양한 모델로부터 생성된 데이터를 통합함으로써 데이터의 다양성과 품질을 확보하였다.

      수학문제추론모델_학습과_평가: |
        본 논문에서는 KoGSM 벤치마크의 수학문제를 해결하기 위해서 베이스모델로 Mistral-7B와 Llama3-8B 모델에 기반한 6개의 모델을 학습하였다. 모델학습을 위한 학습데이터는 KoGSM 데이터와 한국어 MetaMathQA 데이터를 이용하였다. 한국어 MetaMathQA 데이터는 DeepL 자동번역 도구를 이용한 데이터로 번역오류를 포함하고 있다.
        
        모델은 학습에 사용된 데이터의 조합에 따라 구분하였다: Mistral_MetaMath, Mistral_KoGSM, Mistral_AllMath, Llama_MetaMath, Llama_KoGSM, Llama_AllMath. 학습은 LoRA 어댑터를 이용하였으며, 학습 파라미터는 epoch 5, lr 2e-4, weight-decay 0.01, warmup_ratio 0.03, lr-scheduler linear, peft-lora-r 256, peft-lora-alpha 128, target_module [q_proj, k_proj, v_proj, o_proj, gate_proj]로 설정하였다.
        
        평가는 lm-evaluation-harness를 이용하였고, 평가데이터는 한국어 GSM8k 데이터와 KoGSM test 데이터를 이용하였다. 한국어 GSM8k 데이터는 DeepL을 통해 자동번역된 데이터에 대해서 번역검수를 통해 오류를 수정하였다. 특히, 수치단위와 문화적 상식에 따른 차이는 한국의 수치단위와 문화적 상식으로 수정하였다.

      실험결과_및_분석: |
        추론평가는 5-shot과 8-shot CoT에 대해서 수행하였다. 정답만을 생성하는 5-shot 실험에서는 GSM8k와 KoGSM의 성능이 매우 낮았다. 이는 단순히 소형언어모델에서는 5개의 예제(examples)만을 제시하는 ICL(In-Context Learning)로 논리적인 추론이 필요한 수학문제 추론에는 한계가 있음을 확인할 수 있다.
        
        반면, 생각의 사슬(chain-of-thought)을 생성하면서 수학적 논리추론을 할 수 있도록 CoT 프롬프트를 적용하였을 때, 성능이 크게 개선되었다. GSM8k에서는 LlamaAllMath 모델이 0.5221의 성능을 보여, MistralAllMath 모델의 0.4511보다 0.0710만큼 높고, KoGSM에서는 LlamaAllMath 모델이 0.3120이고, MistralAllMath 모델의 0.2680보다 0.0440만큼 높다. Base모델로 Mistral-7B모델보다는 Llama3-8B 모델 성능이 전반적으로 우수하였다.
        
        45k 데이터를 학습한 KoGSM 모델이 395k 데이터를 학습한 MetaMath 모델과 비교하여 데이터 크기에 비해 일정한 성능수준을 보였다. 또한 CoT의 경우, KoGSM 데이터와 MetaMath 데이터를 함께 학습한 경우, GSM8k와 KoGSM 평가 대부분에서 성능이 개선됨을 확인하였다.
        
        GSM8k CoT 평가의 경우, 최고성능이 0.5221 (LlamaAllMath 모델)이고, KoGSM의 경우, 최고성능이 0.3240(LlamaMetaMath 모델)로 성능차이가 크다. 이는 GSM8k 데이터의 경우, 정답유형으로 정수가 대부분이지만, KoGSM 데이터는 분수, 소수, 비율도 포함되어 있다. 정답유형별 성능을 보면, 분수와 비율에 대한 문제의 경우 성능이 낮다. 그리고, Grade 별 성능분석에서는 고학년 문제일수록 학습된 모델의 성능이 낮아지는 것을 확인할 수 있다. 보다 고차원적인 논리적 추론을 요구하는 질문일수록 추론에 어려움을 겪는 것이다.

      결론: |
        본 논문에서는 한국어 교육환경에 맞는 수학문제추론 벤치마크인 KoGSM에 대해서 소개하였다. 그리고, 한국어 GSM8k 데이터와 비교 실험을 수행하였고, KoGSM 벤치마크가 문제의 난이도가 높은 것을 확인하였다. 그리고, Mistral-7B와 Llama3-8B 모델에 기반하여 한국어 MetaMathQA 데이터와 KoGSM 데이터의 다양한 조합에 따른 학습 모델을 비교평가 하였고, Llama3-8B에 기반한 모델군이 성능이 우수함을 확인하였다.
        
        앞으로 KoGSM 데이터를 중학교 저학년 수학문제까지 포함할 수 있도록 확장하여 구축할 것이고, 그림과 함께 제시되는 수학문제를 위한 멀티모달 수학문제추론 벤치마크로 확장할 것이다.
    
    relevance: |
      1. **한국 교육환경 특화 벤치마크**: GSM8k를 단순 번역하는 대신, 한국의 교육수준과 환경에 맞는 초등학교 5~6학년 수준의 수학문제추론 벤치마크 KoGSM을 구축하여 문화적 차이와 번역오류 문제를 해결한다.
      2. **지식증류를 통한 합성데이터 생성**: ChatGPT4o, Claude3.5 sonnet, Gemini, Gemini_adv 등 4개의 상용 초거대 언어모델로부터 N차 반복 프롬프팅을 통해 총 50,156개의 고품질 합성데이터를 생성한다.
      3. **다양한 정답 유형 포함**: GSM8k는 정답유형으로 정수가 대부분이지만, KoGSM은 분수, 소수, 비율도 포함하여 더 높은 난이도와 다양성을 제공한다.
      4. **LoRA 기반 효율적 학습**: Mistral-7B와 Llama3-8B 모델에 LoRA 어댑터를 이용하여 효율적으로 미세조정하며, peft-lora-r 256, peft-lora-alpha 128 등의 하이퍼파라미터를 제시한다.
      5. **CoT의 중요성 입증**: 5-shot 실험에서는 성능이 매우 낮았으나, 8-shot CoT 적용 시 성능이 크게 개선되어, 소형 언어모델에서는 CoT가 필수적임을 확인한다.
      6. **데이터오염 문제 해결**: 기존 GSM8k는 초거대 언어모델의 사전학습 데이터에 포함되어 평가 신뢰도 문제가 있으나, KoGSM은 새롭게 생성된 데이터로 이 문제를 해결한다.
    
    tips: |
      1. **자동번역 데이터의 한계 인식**: 영어 벤치마크를 단순 자동번역하면 번역오류와 문화적 차이(수치단위, 문화적 상식)가 발생한다. 한국어 모델 평가 시 한국 교육환경에 맞는 벤치마크를 구축하라.
      2. **다양한 LLM으로 데이터 생성**: 한 가지 모델에 의존하지 말고 ChatGPT4o, Claude3.5 sonnet, Gemini, Gemini_adv 등 여러 초거대 언어모델을 활용하여 데이터 다양성을 확보하라.
      3. **N차 반복 프롬프팅 활용**: 단순 일회성 생성이 아닌 N차 반복 프롬프팅을 통해 고품질의 수학문제를 생성하라. 이는 데이터 품질을 크게 향상시킨다.
      4. **Grade별 균형 있는 구성**: 5-1학년부터 6-2학년까지 학년-학기별로 고르게 분포시켜 특정 난이도에 편향되지 않도록 하라. Train과 Test는 9:1 비율로 구성하라.
      5. **LoRA 하이퍼파라미터 설정**: epoch 5, lr 2e-4, weight-decay 0.01, warmup_ratio 0.03, lr-scheduler linear, peft-lora-r 256, peft-lora-alpha 128을 기본값으로 시작하라.
      6. **CoT 프롬프트 필수 적용**: 소형 언어모델에서 단순 5-shot ICL은 수학문제 추론에 한계가 있다. 8-shot CoT를 적용하여 생각의 사슬을 통한 논리추론을 유도하라.
      7. **Llama3-8B 모델 우선 선택**: 실험 결과 Llama3-8B 모델이 Mistral-7B보다 전반적으로 우수한 성능을 보였다. 베이스 모델 선택 시 Llama3를 우선적으로 고려하라.
      8. **복합 데이터 학습 전략**: KoGSM 데이터(45k)와 MetaMathQA 데이터(395k)를 함께 학습하면 단일 데이터 학습보다 성능이 개선된다. AllMath 방식을 고려하라.
      9. **다양한 정답 유형 포함**: 정수뿐만 아니라 분수, 소수, 비율 등 다양한 정답 유형을 포함하여 모델의 수학적 표현 능력을 종합적으로 평가하라.
      10. **취약 영역 파악**: 분수와 비율 문제, 고학년 문제에서 성능이 낮아진다. 이러한 취약 영역에 대한 추가 학습 데이터를 보강하라.
      11. **번역 데이터 검수 필수**: 자동번역 데이터를 사용할 때는 번역검수를 통해 오류를 수정하고, 특히 수치단위와 문화적 상식은 한국 환경에 맞게 수정하라.
      12. **멀티모달 확장 계획**: 향후 그림과 함께 제시되는 수학문제를 위한 멀티모달 벤치마크로 확장을 고려하라. 이는 더 실제적인 수학 문제 해결 능력을 평가할 수 있다.

  - venue: "Electronics and Telecommunications Trends (ETRI)"
    title: "초거대 언어모델과 수학추론 연구 동향"
    link: null
    keywords:
      - 초거대 언어모델
      - 수학 추론
      - 소형 거대언어모델
      - Chain-of-Thought
      - In-Context Learning
      - sLLM
    md_file: "md-related/초거대 언어모델과 수학추론 연구 동향.md"
    
    abstract: |
      Large language models seem promising for handling reasoning problems, but their underlying solving mechanisms remain unclear. Large language models will establish a new paradigm in artificial intelligence and the society as a whole. However, a major challenge of large language models is the massive resources required for training and operation. To address this issue, researchers are actively exploring compact large language models that retain the capabilities of large language models while notably reducing the model size. These research efforts are mainly focused on improving pretraining, instruction tuning, and alignment. On the other hand, chain-of-thought prompting is a technique aimed at enhancing the reasoning ability of large language models. It provides an answer through a series of intermediate reasoning steps when given a problem. By guiding the model through a multi-step problem-solving process, chain-of-thought prompting may improve the model reasoning skills. Mathematical reasoning, which is a fundamental aspect of human intelligence, has played a crucial role in advancing large language models toward human-level performance. As a result, mathematical reasoning is being widely explored in the context of large language models. This type of research extends to various domains such as geometry problem solving, tabular mathematical reasoning, visual question answering, and other areas.
    
    contents:
      초거대_언어모델_개발_동향: |
        OpenAI의 GPT-3 언어모델의 성능은 모델의 구조보다는 매개변수, 데이터, 컴퓨팅 파워에 좌우된다는 Scaling Law를 근거로 175B개 매개변수를 갖는 초거대 생성모델을 학습하여 2020년에 공개하였고, 이에 바탕을 둔 ChatGPT를 2022년 말에 공개하여 일반인에게 그 유용성을 인정받아 많은 기업 및 연구소에서 초거대모델 개발 경쟁에 뛰어들게 하는 계기가 되었다. 구글은 매개변수를 늘려가면서 학습했을 때 상대적으로 작은 개수(8B)의 매개변수 언어모델에 비해 초거대에 해당하는 언어모델(540B)에 갑자기 많은 태스크를 수행할 수 있다는 Emergent Abilities라는 개념을 근거로 거대 모델의 유용성을 주장하였다.

      소형_거대언어모델_기술_연구_동향: |
        LLM의 한계는 역설적으로 그 파라미터 규모와 계산 요구량에 있다. 메타에서 공개한 LLaMA 언어모델의 경우, 65B 파라미터 규모의 모델을 1회 학습하는 데 약 1백만 GPU 시간이 필요한데, 클라우드 대여 시 미화 490만 달러가 소요될 것으로 추산된다. '소형(화된) 거대언어모델(sLLM: Small(er) Large Language Model)'이라 불리는 sLLM은 상대적으로 적은 비용의 컴퓨팅 자원으로 접근할 수 있는 3B~30B 파라미터 규모의 모델로 정의할 수 있다. sLLM 사전학습 연구는 Common Crawl과 같이 대중에게 개방된 웹 스크래핑 데이터 집합을 사용 및 정련하여, 사용된 데이터셋이 공개되지 않는 상용 LLM 성능에 근접하려는 범용 언어모델 학습 연구가 활발하게 진행되고 있다. sLLM 인스트럭션 조정 연구에서는 지도학습을 통한 미세조정 데이터셋을 구축하여, 비지도 학습된 LLM의 성능에 준하는 작은 모델을 학습할 수 있다는 사실에 기초한 연구들이 나타나고 있다. sLLM의 정렬 연구에서는 사용자가 선호하는 형식의 응답을 생성하거나 요구하는 추론 능력을 개선하도록 생성 정책을 최적화하는 RLHF, RLAIF 등의 방법이 연구되고 있다.

      수학_추론_연구_동향: |
        수학은 인간 지능의 핵심 능력으로, 세상 경험과 지식에 기반하여 공리와 정의를 이해하고 학습, 추론, 규칙적용, 풀이과정 및 풀이계획, 공간 및 물리적 규칙을 이해 및 활용, 지식을 기호화하는 능력 등의 인간의 복합적 지적 영역을 모두 포함한다. 또한 수학추론은 상식 및 지식 추론과는 달리, 정확한 답과 동의할 수 있는 풀이과정, 즉 추론과정을 가진다. 그렇기에 인공지능의 추론 능력을 검증하기에 매우 좋은 태스크이다. 전통적 수학추론에는 서술형 수학 문제 풀이(MWP), 정리 증명(Theorem Proving), 기하 문제 풀이(GPS), 수학 질의 응답(MathQA) 등이 있다.

      LLM_기반_MWP_연구_동향: |
        GPT, PaLM 같은 LLM의 등장은 MWP 연구에 새로운 장을 열었다. 기존 언어모델이 초대형화되면서 작은 언어모델에서는 보이지 않던 추론 능력이 발현되어 획기적인 성능 개선이 이루어졌기 때문이다. LLM은 모델의 파라미터를 직접 업데이트시키는 미세조정을 대신하여 ICL 기법을 이용하여 모델을 목적 태스크에 최적화시킨다. 통상의 ICL은 몇 개의 입력과 출력의 쌍을 예제로 제공하여 여러 분야에서 좋은 성능을 보였으나 MWP에서는 별다른 성능 향상을 보이지 못했다. CoT 기법이라 불리는 일련의 중간 추론 단계들을 few-shot 프롬프트로 제공하는 기법의 ICL을 이용하여 LLM의 추론 능력을 본격적으로 끌어올린 연구의 시발점이라 할 수 있다.
    
    relevance: |
      1. **Scaling Law와 Emergent Abilities**: GPT-3는 매개변수, 데이터, 컴퓨팅 파워에 좌우되는 Scaling Law를 근거로 구축되었고, 구글은 540B 규모에서 갑자기 많은 태스크를 수행할 수 있는 Emergent Abilities를 주장하여 거대 모델의 유용성을 입증했다.
      2. **sLLM의 필요성과 정의**: 65B 파라미터 모델 1회 학습에 약 $4.9M가 소요되는 비용 문제를 해결하기 위해, 3B~30B 파라미터 규모의 sLLM이 연구되고 있으며, 단일 GPU(12~80GB)로 학습과 추론이 가능하다.
      3. **sLLM 파이프라인**: (1) 사전학습, (2) 인스트럭션 조정, (3) 정렬 개선, (4) 검증 및 서비스의 4단계로 구성되며, 각 단계에서 다양한 연구가 진행되고 있다.
      4. **데이터 정련과 합성**: LLM 자체가 데이터 원천으로 활용되어 하위 태스크에 대응하는 텍스트 데이터의 합성을 수행하거나, 정련되지 않은 데이터에서 학습에 필요한 데이터를 가려내는 정련 도구로의 역할을 담당한다.
      5. **CoT의 혁신성**: 통상의 ICL은 MWP에서 별다른 성능 향상을 보이지 못했으나, 일련의 중간 추론 단계들을 few-shot 프롬프트로 제공하는 CoT 기법이 LLM의 추론 능력을 본격적으로 끌어올렸다.
      6. **수학추론의 중요성**: 수학추론은 상식 및 지식 추론과 달리 정확한 답과 동의할 수 있는 풀이과정을 가지므로, 인공지능의 추론 능력을 검증하기에 매우 좋은 태스크이다.
    
    tips: |
      1. **Scaling Law 활용**: 모델 성능을 향상시키려면 구조보다는 매개변수, 데이터, 컴퓨팅 파워를 증가시키는 Scaling Law를 고려하라. 175B급 모델이 8B급 모델보다 훨씬 많은 태스크를 수행할 수 있다.
      2. **sLLM 규모 설정**: 제한된 자원 환경에서는 3B~30B 파라미터 규모의 sLLM을 고려하라. 12~80GB 메모리의 단일 GPU로 학습과 추론이 가능하다.
      3. **웹 스크래핑 데이터 활용**: Common Crawl 등 대중에게 개방된 웹 스크래핑 데이터를 정련하여 사용하면, 데이터셋이 공개되지 않는 상용 LLM 성능에 근접할 수 있다.
      4. **LLM을 데이터 생성 도구로 활용**: LLM을 단순 추론 모델이 아닌 데이터 원천으로 활용하여, 하위 태스크에 대응하는 텍스트 데이터를 합성하거나 데이터를 정련하는 도구로 사용하라.
      5. **인스트럭션 조정의 중요성**: 사용자의 의도를 잘 이해하도록 지도학습을 통한 미세조정 데이터셋을 구축하라. 이를 통해 비지도 학습된 LLM의 성능에 준하는 작은 모델을 학습할 수 있다.
      6. **RLHF/RLAIF 정렬**: 사용자가 선호하는 형식의 응답을 생성하도록 RLHF(Reinforced Learning from Human Feedback) 또는 RLAIF(Reinforced Learning from AI Feedback)를 사용하여 정렬하라.
      7. **경량화 기법 적용**: 8비트 양자화(Quantization), LoRA(Low-Rank Adaptation), IA^3, QLoRA 등의 기법을 사용하여 메모리 사용량과 속도를 절감하라.
      8. **CoT 프롬프팅 필수**: MWP 문제에서는 단순 입출력 쌍 ICL보다 일련의 중간 추론 단계들을 제공하는 CoT 프롬프트가 훨씬 효과적이다. 풀이과정을 단계별로 제시하라.
      9. **수학추론 태스크 활용**: 인공지능의 추론 능력을 검증하려면 상식 추론보다 정확한 답과 풀이과정을 가진 수학추론 태스크(MWP, Theorem Proving, GPS, MathQA)를 사용하라.
      10. **Prefix-tuning 기법**: 언어모델의 파라미터가 고정된 상태에서 소규모 학습 데이터를 사용해 성능을 최적화하는 프롬프트 벡터 표현을 학습하는 prefix-tuning 기법을 고려하라.

  - venue: "AAAI 2023"
    title: "Learning by Applying: A General Framework for Mathematical Reasoning via Enhancing Explicit Knowledge Learning"
    link: null
    keywords:
      - Mathematical Reasoning
      - Knowledge Learning
      - Knowledge Application
      - LeAp Framework
      - VAE
      - Knowledge Graph
    md_file: "md-related/Learning by Applying; A General Framework for Mathematical Reasoning via Enhancing Explicit Knowledge Learning.md"
    
    abstract: |
      Mathematical reasoning is one of the crucial abilities of general artificial intelligence, which requires machines to master mathematical logic and knowledge from solving problems. However, existing approaches are not transparent (thus not interpretable) in terms of what knowledge has been learned and applied in the reasoning process. In this paper, we propose a general Learning by Applying (LeAp) framework to enhance existing models (backbones) in a principled way by explicit knowledge learning. In LeAp, we perform knowledge learning in a novel problem-knowledge-expression paradigm, with a Knowledge Encoder to acquire knowledge from problem data and a Knowledge Decoder to apply knowledge for expression reasoning. The learned mathematical knowledge, including word-word relations and word-operator relations, forms an explicit knowledge graph, which bridges the knowledge "learning" and "applying" organically. Moreover, for problem solving, we design a semantics-enhanced module and a reasoning-enhanced module that apply knowledge to improve the problem comprehension and symbol reasoning abilities of any backbone, respectively. We theoretically prove the superiority of LeAp's autonomous learning mechanism. Experiments on three real-world datasets show that LeAp improves all backbones' performances, learns accurate knowledge, and achieves a more interpretable reasoning process.
    
    contents:
      Introduction: |
        Mathematical reasoning is one of the core abilities and signs of the intelligence level of general artificial intelligence. It requires machines to grasp mathematical knowledge and logical thinking from solving several mathematical problems. Among them, we specifically study math word problems (MWP) in this paper, which is a fundamental reasoning task. A math word problem is represented as a problem sentence that poses a question requesting an unknown quantity. To solve it, the machine needs to understand the verbal description that contains words and quantities, and then reason a mathematical expression, based on which finally get the answer. However, such a problem-expression paradigm is still far from encompassing human-like mathematical reasoning capacity, because it lacks the processes of learning and applying explicit knowledge.

      LeAp_Architecture: |
        Intuitively, the educational theory of cognitivism indicates that a learner fosters a strong connection to the knowledge by directly applying it. Drawing this insight, we construct our LeAp framework with a novel problem-knowledge-expression architecture to achieve the mechanism of "learning knowledge by applying it". We formalize LeAp as a Variational AutoEncoder (VAE). It consists of three main parts: (1) a Knowledge Encoder P_φ(Z|X) that acquires knowledge Z from problem sentences X (problem-knowledge); (2) a Knowledge Decoder P_θ(Y|Z, X) that reasons the expressions Y based on X and Z (knowledge-expression); (3) a knowledge prior P(Z) of Z.
        
        The knowledge Z we consider is explicitly represented as a mathematical knowledge graph. Its vertices include words and operators, and the knowledge we focus on is the existence of its edges. Specifically, we formalize Z as word-word relation wwi,j and word-operator relation woi,c. wwi,j describes the relationship between words wi and wj (e.g., "apples" belongs to "fruits"), while woi,c captures the one between word wi and operator oc (e.g., "times" is related to "×").

      Knowledge_Application: |
        For MWP solving, we propose a semantics-enhanced module and a reasoning-enhanced module in LeAp to apply knowledge for MWP solving, which bring better answer accuracy and reasoning interpretability. Semantics-enhanced Module improves problem comprehension with a semantics-enhanced module for application of word-word knowledge wwi,j ∈ Z. Specifically, we construct a graph SEP by taking the words in problem P as vertices and their knowledge as edges. Thus, SEP can be seen as a subgraph of our overall explicit knowledge Z. Reasoning-enhanced Module applies word-operator knowledge woi,c ∈ Z to enhance reasoning ability of the backbone solver. We design a knowledge-aware attention mechanism to incorporate knowledge into the reasoning process.
    
    relevance: |
      1. **명시적 지식 학습의 중요성**: 기존 MWP 솔버는 학습된 지식이 파라미터와 네트워크 구조에 암묵적으로 포함되어 투명하지 않다. LeAp은 word-word relations와 word-operator relations로 구성된 명시적 지식 그래프를 학습한다.
      2. **Problem-Knowledge-Expression 패러다임**: 기존의 problem-expression 패러다임과 달리, LeAp은 problem-knowledge와 knowledge-expression의 두 단계를 통해 인간처럼 지식을 학습하고 적용한다.
      3. **VAE 기반 프레임워크**: LeAp은 Variational AutoEncoder로 형식화되어, Knowledge Encoder가 문제에서 지식을 획득하고 Knowledge Decoder가 지식을 적용하여 표현식을 추론한다.
      4. **범용 프레임워크**: LeAp은 기존의 다양한 MWP 솔버를 백본으로 사용할 수 있는 범용 프레임워크로, 모든 백본의 성능을 향상시킨다.
      5. **이중 모듈 설계**: Semantics-enhanced Module은 word-word 지식을 활용하여 문제 이해를 향상시키고, Reasoning-enhanced Module은 word-operator 지식을 활용하여 기호 추론 능력을 향상시킨다.
      6. **해석 가능성 향상**: 명시적 지식 그래프를 사용함으로써 모델이 어떤 지식을 학습하고 적용했는지 투명하게 확인할 수 있어 해석 가능성이 크게 향상된다.
    
    tips: |
      1. **명시적 지식 그래프 구축**: 암묵적 파라미터 대신 word-word relations(단어 간 관계)와 word-operator relations(단어-연산자 관계)로 구성된 명시적 지식 그래프를 구축하라.
      2. **VAE 프레임워크 활용**: Knowledge Encoder와 Knowledge Decoder로 구성된 VAE 프레임워크를 사용하여 지식 학습과 적용을 유기적으로 연결하라.
      3. **Bernoulli 분포 모델링**: wwi,j와 woi,c는 이진 변수이므로 Bernoulli 분포로 모델링하되, 역전파를 위해 continuous approximation을 사용하라.
      4. **Semantics-enhanced Module 설계**: 문제 P의 단어들을 정점으로 하고 지식을 간선으로 하는 서브그래프 SEP를 구성한 후, GCN을 사용하여 관계 지식을 융합하라.
      5. **Reasoning-enhanced Module 설계**: word-operator 지식을 추론 과정에 통합하기 위해 knowledge-aware attention mechanism을 설계하라.
      6. **범용 백본 지원**: Seq2Seq, Seq2Tree, Graph2Tree 등 다양한 백본 솔버를 지원하도록 설계하여, 기존 모델들의 성능을 향상시키라.
      7. **ELBO 최적화**: L = E[log P_θ(Y|Z,X)] - KL(P_φ(Z|X)||P(Z)) 형태의 Evidence Lower Bound를 최적화하되, 첫 번째 항은 MWP 성능을, 두 번째 항은 지식 학습을 정규화한다.
      8. **지식 그래프 해석**: 학습된 지식 그래프를 시각화하여 모델이 어떤 지식을 학습했는지 확인하고, 잘못된 지식을 수정하라.
      9. **교육 이론 적용**: Cognitivism 이론에 따라 "learning knowledge by applying it" 메커니즘을 구현하여, 직접 적용함으로써 지식과의 강한 연결을 형성하라.
      10. **다중 데이터셋 검증**: Math23K, MAWPS, SVAMP 등 다양한 실제 데이터셋에서 성능을 검증하여 일반화 능력을 확보하라.

  - venue: "ACL 2023"
    title: "A Survey of Deep Learning for Mathematical Reasoning"
    link: null
    keywords:
      - Mathematical Reasoning
      - Deep Learning
      - Survey
      - Math Word Problems
      - Theorem Proving
      - Neural Networks
      - Pre-trained Language Models
      - Large Language Models
    md_file: "md-related/A Survey of Deep Learning for Mathematical Reasoning.md"
    
    abstract: |
      Mathematical reasoning is a fundamental aspect of human intelligence and is applicable in various fields, including science, engineering, finance, and everyday life. The development of artificial intelligence (AI) systems capable of solving math problems and proving theorems in language has garnered significant interest in the fields of machine learning and natural language processing. For example, mathematics serves as a testbed for aspects of reasoning that are challenging for powerful deep learning models, driving new algorithmic and modeling advances. On the other hand, recent advances in large-scale neural language models have opened up new benchmarks and opportunities to use deep learning for mathematical reasoning. In this survey paper, we review the key tasks, datasets, and methods at the intersection of mathematical reasoning and deep learning over the past decade. We also evaluate existing benchmarks and methods, and discuss future research directions in this domain.
    
    contents:
      Mathematical_Reasoning_Tasks: |
        We introduce different tasks for mathematical reasoning. Math Word Problem Solving involves developing algorithms to automatically solve math word problems, which has been of interest to NLP researchers for decades. A question involves four basic arithmetic operations with single or multiple operation steps. The challenge posed by MWPs lies in the need for language comprehension, semantic parsing, and the application of multiple mathematical reasoning skills.
        
        Theorem Proving is automating theorem proving, a long-standing challenge in AI. The problem is to demonstrate the truth of a mathematical claim (a theorem) through a sequence of logical arguments (a proof). Theorem proving tests various skills, such as choosing effective multi-step strategies, using background knowledge, and performing symbolic manipulations.
        
        Geometry Problem Solving involves automated geometry problem solving, which consists of a textual description and a diagram. The multimodal inputs describe the entities, attributes, and relationships of geometric elements, and the goal is to find the numeric solution to an unknown variable.
        
        Math Question Answering encompasses a wide range of QA benchmarks that center around mathematical reasoning. For example, DROP is a MathQA dataset that requires discrete reasoning to answer questions over the content of paragraphs.

      Neural_Networks_for_Math: |
        Seq2Seq-based Networks have been successfully applied to mathematical reasoning tasks, such as math word problem solving, theorem proving, geometry problem solving, and math question answering. A Seq2Seq model uses an encoder-decoder architecture and usually formalizes mathematical reasoning as a sequence generation task. Common encoders and decoders include LSTM, GRU, and their bidirectional variants.
        
        Graph-based Networks explicitly model the structure within expressions. Mathematical expressions can be represented as tree-based structures, such as abstract syntax trees (ASTs) and graph-based structures. Seq2Tree models explicitly model the tree structure when encoding the output sequences. Seq2DAG applies a sequence-to-graph framework when generating the equations since the graph decoder is able to extract complex relationships among multiple variables.
        
        Attention-based Networks have been exploring its usefulness in mathematical reasoning tasks, as it can be used to identify the most important relationships between mathematical concepts. Various attention mechanisms have been studied to extract better representations, such as Group-ATT which uses different multi-head attention to extract various types of MWP features.

      Pre-trained_Language_Models_for_Math: |
        Pre-trained language models have demonstrated remarkable performance gains on a wide range of NLP tasks. By pre-training on a large corpus of text, the models learn valuable world knowledge, which could be applied to downstream tasks. However, though large language models excel in modeling natural language, there are several challenges to using them for mathematical reasoning. First, pre-trained language models are not specifically trained on mathematical data. Second, the size of pre-trained models continues to grow, making it expensive to train the entire model from scratch for specific downstream tasks.
        
        Self-supervised learning for math includes pre-training language models with MLM (Masked Language Modeling) and CLM (Causal Language Modeling) tasks on mathematical or scientific corpora. Some work designs customized tasks to inject mathematical reasoning capabilities into language models. Task-specific fine-tuning is a technique to improve the performance of a pre-trained language model on a specific task, which is a common practice when there is not enough data for training large models from scratch.

      In-context_Learning_for_Math: |
        Large language models, such as GPT-3, have recently revolutionized the field of NLP, especially on account of their powerful few-shot in-context learning capabilities. ICL enables LLMs to perform target tasks by providing some task examples as conditions at inference time, without updating model parameters. However, such standard few-shot promptings have not yet proved sufficient to achieve high performance on challenging tasks such as mathematical reasoning.
        
        Chain-of-thought prompting (CoT) leverages intermediate natural language rationales as prompts to enable LLMs to first generate reasoning chains and then predict an answer for an input question. Recent work has focused on how to improve chain-of-thought reasoning under the few-shot setting, mainly divided into two parts: (i) selecting better in-context examples and (ii) creating better reasoning chains. In-context Example Selection involves methods to optimize the in-context examples selection process. High-quality Reasoning Chains addresses the limitation of manually creating reasoning chains by exploring methods such as self-consistency, least-to-most prompting, and ensemble methods.
    
    relevance: |
      1. **포괄적인 서베이**: 수학추론과 딥러닝의 교차점에서 지난 10년간의 주요 태스크, 데이터셋, 방법론을 체계적으로 리뷰하여, 연구자들이 전체 분야를 빠르게 파악할 수 있게 한다.
      2. **다양한 태스크 분류**: Math Word Problems, Theorem Proving, Geometry Problem Solving, Math Question Answering 등 다양한 수학추론 태스크를 명확히 정의하고 분류한다.
      3. **신경망 아키텍처 분류**: Seq2Seq, Graph-based Networks, Attention-based Networks 등 수학추론을 위한 다양한 신경망 아키텍처를 체계적으로 정리한다.
      4. **사전학습 모델의 진화**: BERT(110M)부터 Minerva(540B)까지 모델 크기의 증가 추세와, 수학 데이터에 특화된 사전학습 방법(AMPS, synthetic pre-training)을 소개한다.
      5. **CoT의 중요성 강조**: Chain-of-thought prompting이 수학추론에서 표준 few-shot prompting보다 훨씬 효과적임을 강조하고, in-context example selection과 reasoning chain 생성 방법을 제시한다.
      6. **미래 연구 방향 제시**: Generalization and robustness, trustworthy reasoning, learning from feedback, multimodal mathematical reasoning 등 향후 연구 방향을 명확히 제시한다.
    
    tips: |
      1. **태스크별 접근법 선택**: MWP는 Seq2Seq, Theorem Proving은 neural-symbolic methods, Geometry는 multimodal networks를 우선적으로 고려하라.
      2. **Graph-based Networks 활용**: 수학 표현식은 AST나 그래프 구조로 표현 가능하므로, Seq2Tree나 Seq2DAG를 사용하여 구조 정보를 명시적으로 모델링하라.
      3. **수학 특화 사전학습**: Khan Academy, arXiv 논문, GitHub 코드 등 수학 및 과학 데이터로 사전학습하라. AMPS(Auxiliary Mathematics Problems and Solutions) 데이터셋을 활용할 수 있다.
      4. **Synthetic Pre-training**: 완전히 합성된 데이터(SQL queries, Isabelle lemmas 등)로 사전학습하면 상당한 성능 향상을 얻을 수 있다.
      5. **모델 크기와 성능**: 50B 파라미터 이상의 모델이 head-to-head 비교에서 우수한 성능을 보인다. 가능하면 대형 모델을 선택하라.
      6. **CoT 프롬프팅 필수**: 수학추론에서는 단순 입출력 쌍보다 중간 추론 단계를 포함한 CoT 프롬프트가 필수적이다. "Let's think step by step!" 프롬프트도 zero-shot에서 효과적이다.
      7. **In-context Example Selection 최적화**: 무작위 선택 대신 semantically similar examples를 검색하거나, complexity-based prompting(복잡한 추론 체인 선택)을 사용하라.
      8. **Self-consistency 적용**: 단일 추론 경로 대신 여러 추론 경로를 생성하고 투표(voting)를 통해 최종 답을 선택하여 정확도를 향상시키라.
      9. **Multimodal 접근**: Geometry 문제나 다이어그램 기반 추론에서는 ResNet/Faster-RCNN으로 시각 정보를 인코딩하고, BAN/FiLM/DAFA로 멀티모달 융합을 수행하라.
      10. **벤치마크 다양화**: GSM8K, MATH, DROP, Geometry3K 등 다양한 벤치마크에서 평가하여 일반화 능력을 검증하라. 특히 low-resource와 multimodal 설정에 주목하라.
      11. **Numeracy Representation 개선**: 기존 numeracy representations는 불충분하므로, 숫자를 별도로 처리하는 메커니즘을 개발하라.
      12. **Least-to-most Prompting**: 복잡한 문제를 하위 문제로 분해하고 순차적으로 해결하는 least-to-most prompting을 고려하라. 이는 compositional generalization에 효과적이다.


