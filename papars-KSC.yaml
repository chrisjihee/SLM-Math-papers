papers:
  - venue: "KSC 2024"
    title: "한국어 수학 튜터링 대화 데이터셋"
    link: "https://www.dbpia.co.kr/journal/articleDetail?nodeId=NODE12041963"
    keywords: ["대화 데이터셋", "수학 추론", "튜터링", "LLM"]
    md_file: "md-KSC/한국어 수학 튜터링 대화 데이터셋.md"
    abstract: |
      딥러닝 기반 기계학습 기술의 발달과 함께 대형 언어모델의 개발은 언어처리를 포함한 많은 분야에서 큰 진전을 가져왔다. 
      본 논문에서는 수학 추론 능력에 기반한 대화를 통한 수학 튜터링 능력을 함께 평가할 수 있는 수학 튜터링 데이터셋을 제안한다.
      초등학교 수준의 수학 추론 및 이에 기반한 수학 튜터링을 위한 한국어 대화를 모두 포함하는 데이터셋(3,949개 대화)을 구축하였다.
    contents: |
      - 데이터셋 구성: 서술형 수학 문제, 정답/오답 풀이과정, 튜터링 대화
      - 튜터링 화행(speech act) 부착: 질문, 설명, 피드백, 힌트 등 4가지 분류
      - 튜터링 상태 부착: 학생의 이해도를 바이너리 값('O', 'X')으로 표현
      - 평균 대화 길이: 10.1턴
      - 활용: AI 튜터 모델 개발, 교육용 대화 시스템
    relevance: |
      - 대화형 데이터셋 구축 방법론 참고 가능
      - 구조화된 주석(annotation) 체계 설계 참고
      - 교육 도메인 데이터 구축 프로세스
    tips: |
      - 대화 데이터 구축 시 화행 분류와 상태 추적이 중요
      - 휴먼 구축자의 역할 분담(튜터/학생)을 통한 자연스러운 대화 생성
      - 목적 지향적 대화 설계에 활용 가능

  - venue: "KSC 2024"
    title: "한국어 생성문서의 사실성 평가에 대한 연구"
    link: "https://www.dbpia.co.kr/journal/articleDetail?nodeId=NODE12042006"
    keywords: ["사실성 평가", "생성 문서", "LLM", "신뢰성"]
    md_file: "md-KSC/한국어 생성문서의 사실성 평가에 대한 연구.md"
    abstract: |
      대형 언어모델이 생성한 한국어 문서의 사실성을 평가하는 연구이다.
      생성형 AI의 출력물이 사실에 기반하고 있는지를 검증하는 방법론과 평가 체계를 제안한다.
      할루시네이션(hallucination) 문제를 완화하고 신뢰할 수 있는 생성 결과를 보장하기 위한 접근법을 다룬다.
    contents: |
      - 사실성 평가 프레임워크 설계
      - 한국어 생성 문서의 사실 검증 방법론
      - 외부 지식 베이스와의 대조 검증
      - 평가 지표: Accuracy, F1-score 등
      - 할루시네이션 탐지 및 완화 방법
    relevance: |
      - 생성형 AI의 신뢰성 향상 방법
      - 사실 검증 시스템 구축
      - 지식 베이스 기반 검증 방법론
    tips: |
      - 외부 지식 소스와의 교차 검증 필수
      - 다양한 도메인별 사실성 평가 기준 필요
      - 자동 평가와 인간 평가의 균형 중요

  - venue: "KSC 2024"
    title: "세분화된 LLM 피드백을 활용한 요약문 평가 모델 학습"
    link: "https://www.dbpia.co.kr/journal/articleDetail?nodeId=NODE12041959"
    keywords: ["LLM 피드백", "요약 평가", "모델 학습", "품질 평가"]
    md_file: "md-KSC/세분화된 LLM 피드백을 활용한 요약문 평가 모델 학습.md"
    abstract: |
      LLM의 세밀한 피드백을 활용하여 요약문의 품질을 평가하는 모델을 학습한다.
      기존의 단순 점수 평가 대신 세분화된 평가 기준(정확성, 일관성, 간결성 등)을 제시하여
      더 정교한 요약문 평가 모델 개발을 목표로 한다.
    contents: |
      - LLM 피드백 기반 요약문 평가 프레임워크
      - 세분화된 평가 기준 설계 및 적용
      - 평가 지표: ROUGE, BERTScore 등
      - 실험 결과: 기존 방법 대비 성능 향상
    relevance: |
      - LLM을 평가 도구로 활용하는 방법론
      - 세분화된 피드백 체계 설계
      - 자동 평가 시스템 구축 참고
    tips: |
      - LLM의 피드백을 학습 신호로 활용
      - 다차원적 평가 기준 설계가 중요
      - 인간 평가와의 상관관계 분석 필요

  - venue: "KSC 2024"
    title: "생성형 AI의 암묵적 편향 완화를 위한 LLM 기반 학습데이터 자동 구축 방안"
    link: "https://www.dbpia.co.kr/journal/articleDetail?nodeId=NODE12041972"
    keywords: ["편향 완화", "학습데이터", "윤리적 AI", "CoT"]
    md_file: "md-KSC/생성형 AI의 암묵적 편향 완화를 위한 LLM 기반 학습데이터 자동 구축 방안.md"
    abstract: |
      생성형 AI에서 해소되지 않는 암묵적 편향에 대한 이해, 추론 능력 향상을 위한 학습데이터를 구축한다.
      공개된 다종의 LLM을 통해 암묵적 편향 문장을 식별하고 CoT 형태의 학습데이터 생성을 통해
      암묵적 편향 판단 능력이 24% 향상되었으며, 보편적 편향에 대해서도 20% 향상되었다.
    contents: |
      - 암묵적 편향 후보 데이터셋 구축: 다종 LLM 활용한 편향 식별
      - CoT(Chain-of-Thought) 기반 학습데이터 생성
      - Teacher 모델을 통한 편향 판단 및 근거 생성
      - 실험: Qwen2-7B 모델 학습, KoSBi 데이터셋 평가
      - 결과: 암묵적 편향 24%, 보편적 편향 20% 성능 향상
    relevance: |
      - 윤리적 AI 연구에 필수적인 편향 완화 방법론
      - 다종 LLM을 활용한 데이터 품질 검증
      - CoT 기반 추론 데이터 구축 방법
    tips: |
      - 다종 모델의 합의를 통한 어려운 샘플 식별
      - CoT 형태로 설명 가능한 학습데이터 구축
      - 윤리성 평가 벤치마크 활용 중요

  - venue: "KSC 2024"
    title: "고품질 인스트럭션 데이터 구축을 위한 피드백 기반 합성데이터 생성 방법"
    link: "https://www.dbpia.co.kr/journal/articleDetail?nodeId=NODE12041976"
    keywords: ["인스트럭션 튜닝", "합성 데이터", "피드백", "데이터 품질"]
    md_file: "md-KSC/고품질 인스트럭션 데이터 구축을 위한 피드백 기반 합성데이터 생성 방법.md"
    abstract: |
      SFT에 필요한 인스트럭션 데이터셋의 품질 문제를 해결하기 위한 프레임워크를 제안한다.
      오픈 인스트럭션 데이터셋의 컴플리션을 검증하고, 검증 단계에서 확보한 피드백을 활용하여 
      고품질 합성 데이터셋을 생성한다. RAGEval에서 36%, MT-Bench에서 26% 성능 향상을 달성했다.
    contents: |
      - 오픈 데이터셋의 품질 검증 및 재생성 프레임워크
      - 피드백 기반 답변 재생성 (최대 3회 재시도)
      - 평가: RAGEval, MT-Bench 활용
      - 결과: RAGEval 36%, MT-Bench 26% 향상
    relevance: |
      - 인스트럭션 튜닝 데이터 품질 향상 방법
      - 피드백 루프를 활용한 데이터 개선
      - 합성 데이터 생성 파이프라인 설계
    tips: |
      - 오픈 데이터셋 활용 시 품질 검증 필수
      - 반복적 피드백을 통한 점진적 개선
      - 다양한 평가 벤치마크로 효과 검증

  - venue: "KSC 2023"
    title: "ChatGPT 기반 독해 튜터링 대화 데이터의 구축 타당성 조사"
    link: "https://www.dbpia.co.kr/journal/articleDetail?nodeId=NODE11705087"
    keywords: ["ChatGPT", "독해 튜터링", "데이터 구축", "타당성"]
    md_file: "md-KSC/ChatGPT 기반 독해 튜터링 대화 데이터의 구축 타당성 조사.md"
    abstract: |
      ChatGPT를 활용하여 독해 튜터링 대화 데이터를 구축하고 그 타당성을 검증한다.
      LLM을 활용한 교육용 대화 데이터 구축의 가능성과 한계를 실험적으로 분석한다.
    contents: |
      - ChatGPT를 활용한 독해 튜터링 대화 데이터 자동 생성
      - 인간 평가를 통한 타당성 검증
      - 교육적 품질 평가 기준 제시
      - LLM 기반 데이터 구축의 장단점 분석
    relevance: |
      - LLM을 활용한 데이터 구축 방법론
      - 교육 도메인 데이터의 품질 검증
      - 자동 생성 데이터의 타당성 평가
    tips: |
      - LLM 생성 데이터의 품질 검증 필수
      - 교육적 목적에 맞는 평가 기준 설계
      - 인간 평가와 자동 평가의 조합 활용

  - venue: "KSC 2023"
    title: "대형 언어 모델을 활용한 퓨샷 추론 문제의 데이터 증강"
    link: "https://www.dbpia.co.kr/journal/articleDetail?nodeId=NODE11705093"
    keywords: ["퓨샷 학습", "데이터 증강", "ARC", "추론"]
    md_file: "md-KSC/대형 언어 모델을 활용한 퓨샷 추론 문제의 데이터 증강.md"
    abstract: |
      ARC 문제는 예제를 이용하여 문제 입출력 간의 논리적 관계를 추론하는 문제이다.
      예제의 양이 적은 상황에서 논리적 관계 추론의 바탕이 되는 예제를 추가로 생성하기 위해
      대형 언어 모델의 추론 능력을 활용한다. ConceptARC 데이터셋으로 실험을 진행했다.
    contents: |
      - ARC 문제 유형 분류: ConceptARC 16가지 유형 활용
      - 출력에서 입력 예측 방식의 데이터 증강 (역변환)
      - 유형별 프롬프트 설계 및 GPT 모델 활용
      - 증강된 예제의 품질 검증 및 평가
    relevance: |
      - 퓨샷 학습을 위한 데이터 증강 방법
      - LLM을 활용한 추론 문제 해결
      - 프롬프트 엔지니어링 전략
    tips: |
      - 문제 유형별 맞춤형 프롬프트 작성
      - 역변환 방식으로 다양한 예제 생성 가능
      - 관대한 평가 기준 적용으로 LLM 활용도 향상

  - venue: "KSC 2023"
    title: "비한글 발음열 변환을 위한 통합 프레임워크: 숫자 및 영어단어 처리의 최적화"
    link: "https://www.dbpia.co.kr/journal/articleDetail?nodeId=NODE11705000"
    keywords: ["발음 변환", "TTS", "전처리", "한국어"]
    md_file: "md-KSC/비한글 발음열 변환을 위한 통합 프레임워크 숫자 및 영어단어 처리의 최적화.md"
    abstract: |
      한국어 TTS 시스템에서 숫자와 영어 단어의 발음 변환을 최적화하는 통합 프레임워크를 제안한다.
      다양한 문맥에서의 발음 규칙을 처리하여 자연스러운 음성 합성을 가능하게 한다.
    contents: |
      - 비한글 텍스트의 발음 변환 규칙 체계화
      - 숫자 읽기 규칙: 문맥에 따른 다양한 읽기 방식
      - 영어 단어 처리: 음차 표기와 발음 사전 활용
      - 통합 프레임워크 구현 및 성능 평가
    relevance: |
      - 한국어 NLP 전처리 기술
      - 규칙 기반 시스템 설계
      - TTS를 위한 텍스트 정규화
    tips: |
      - 문맥 의존적 규칙 처리가 중요
      - 다양한 예외 상황 고려 필요
      - 규칙 기반과 학습 기반의 결합 고려

  - venue: "KSC 2023"
    title: "한국어 대규모언어모델을 활용한 MMR기반 자가생성 In-Context Learning"
    link: "https://www.dbpia.co.kr/journal/articleDetail?nodeId=NODE11705103"
    keywords: ["In-Context Learning", "MMR", "자가생성", "한국어 LLM"]
    md_file: "md-KSC/한국어 대규모언어모델을 활용한 MMR기반 자가생성 In-Context Learning.md"
    abstract: |
      In-context learning을 활용한 성능 향상 연구에서 사용자가 예제를 제공하지 않아도
      모델이 스스로 예제를 생성하고, MMR 알고리즘으로 다양성이 높은 예제를 선택하여
      모델 성능을 향상시키는 방법을 제안한다. KULLM v2 모델로 한국어 데이터셋에서 실험했다.
    contents: |
      - 자가생성 In-Context Learning 프레임워크
      - MMR(Maximal Marginal Relevance) 알고리즘으로 예제 선택
      - 입력과의 다양성을 고려한 예제 순위 재설정
      - KULLM v2 모델 활용, 한국어 벤치마크 평가
      - 일부 데이터셋에서 Baseline 대비 성능 향상
    relevance: |
      - In-Context Learning 최적화 방법
      - 예제 선택 전략 (MMR 활용)
      - 자동화된 프롬프트 엔지니어링
    tips: |
      - 예제의 다양성과 관련성 균형 중요
      - 자가생성 예제의 품질 관리 필요
      - 한국어 LLM에 특화된 전략 고려

  - venue: "KSC 2023"
    title: "ARCLE: 추상화 및 추론을 위한 강화학습 환경"
    link: "https://www.dbpia.co.kr/journal/articleDetail?nodeId=NODE11705128"
    keywords: ["강화학습", "ARC", "추상적 추론", "환경 구축"]
    md_file: "md-KSC/ARCLE 추상화 및 추론을 위한 강화학습 환경.md"
    abstract: |
      ARC(Abstraction and Reasoning Corpus) 문제를 위한 강화학습 환경인 ARCLE을 소개한다.
      Gymnasium 프레임워크로 구현되었으며, ARC의 모든 문제를 풀 수 있는 행동 공간과 상태 공간을 제공한다.
      O2ARC 인터페이스에서 영감을 받아 인간의 문제 해결 방식을 모방하는 강화학습 에이전트 훈련이 가능하다.
    contents: |
