    abstract: |
      본 논문에서는 ChatGPT를 이용하여 독해 튜터링 대화 데이터를 구축하고 학습용 데이터로 활용하는 것이 타당한지에 대한 타당성 조사를 목표로 한다. 이를 위해 수동으로 구축한 독해 튜터링 대화 데이터 5,708개 지문 중 임의로 50개 지문을 추출한 후, zero-shot과 few-shot prompting, chatgpt-3.5-turbo와 chatgpt-4.0 엔진의 조합으로 대화 데이터를 자동 구축하고 수동 구축 대화 데이터와 비교 평가하였다. 자동 평가는 코사인 유사도(cosine similarity), TF-IDF, Sentence Transformer를 이용하였다. 코사인 유사도는 문장 간의 유사도를 고려한 것이며 TF-IDF는 문단(Paragraph) 간의 유사도를 고려한 것이며 Sentence Transformer는 대화 간의 의미적 유사도를 고려한 것이다. 그 결과 문단 간의 유사도를 위한 TF-IDF와 대화 간의 의미적 유사도를 위한 Sentence Transformer 비교에 따르면 few-shot prompting과 gpt-4.0 엔진의 조합이 수동 구축과 가장 유사한 것으로 측정되었다. 따라서 독해 지문과 연습문제가 주어졌을 때, gpt-4.0 엔진에서 few-shot prompting을 이용하여 독해 튜터링 대화 코퍼스를 자동으로 구축하여 학습용으로 활용하는 것이 유의미하다는 것을 알 수 있다.
    contents: |
      ## 서론
      인공지능 기술의 발전과 더불어 학습자가 영어 지문(passage)을 얼마나 정확하게 독해하는지를 평가하는 딥러닝 기반 독해 시스템이 개발되고 있다. 그 중에서도 읽기/말하기를 동시에 교육하려는 대화기반 영어 독해 튜터링 시스템이 최근에 개발되었다. 대화기반 영어 독해 튜터링 시스템에서 대화 학습은 Tutor 질문, Student 대답으로 구성된 대화 데이터인 'DIRECT 데이터셋'으로 학습되었다. 이 DIRECT 데이터셋은 수동으로만 구축되었기 때문에 학습 데이터로써 높은 품질을 가지지만 비싼 구축 비용, 적은 데이터양, 긴 구축기간이 해결해야 할 문제였다.

      본 논문에서는 ChatGPT를 이용하여 독해 튜터링 대화 데이터를 자동으로 구축하여 학습 데이터로 활용하고자 할 때, 수동으로 구축한 DIRECT 데이터셋과 비교하여 얼마나 유사한지, 어떤 Prompting 방식이 적절한지에 대한 타당성 검증을 목표로 한다.

      ## 수동 구축된 독해 튜터링 대화 데이터
      독해 튜터링 시스템을 위해 사용되는 독해 교육 데이터셋으로 RACE, DREAM, OpenBookQA 등이 있다. 이 독해 교육 데이터셋은 사지선다형 연습문제의 읽기 중심의 데이터이며 대화 데이터는 아니다.

      기존의 독해 교육 데이터와 달리 독해 튜터링 대화 데이터인 DIRECT 데이터셋은 독해 읽기/말하기 교육을 위한 대화 중심의 데이터이다. DIRECT 데이터셋은 학습자의 영어 지문 이해와 영어 대화 능력 향상을 목표로 RACE의 중학교 버전을 토대로 구축되었다. 이 DIRECT 데이터셋은 텍스트로 된 읽기 지문과 연습문제가 주어지면, 대화 형식으로 질문하고 사용자 응답을 입력 받아 의미적으로 정확한지 평가하며 정확하면 다음 연습문제에 대하여 질문하고 오답이면 한 번 더 응답할 수 있도록 피드백을 출력하거나 정답을 알려주는 방식으로 구축되었다.

      수동 구축된 DIRECT 데이터셋의 통계는 다음과 같다: Train 5,099개, Dev 302개, Test 307개로 총 5,708개 대화셋. Question턴 23,982개, Feedback턴 10,430개, Chat턴 11,688개로 전체 46,102턴. 평균 턴수 8.08턴. DIRECT 데이터셋은 5,708개 지문을 대상으로 4명의 구축자가 3.5개월에 걸쳐 수동으로 구축하였다. 4명의 구축자는 오프라인 영어 교육 경험이 있는 인력으로 2명이 Tutor와 Student 역할을 하였으며 1개 지문은 평균 8.08개의 턴으로 이루어졌다.

      ## ChatGPT 기반 독해 튜터링 대화 데이터 구축 방법
      기존의 수동으로 구축하는 방법과 ChatGPT를 활용하여 자동으로 구축하는 방법을 비교한다. 기존의 방식은 3단계: 1) RACE 데이터와 같은 독해 교육용 데이터로부터 지문 및 문제 수집, 2) 영어 전문가에 의한 수동 대화 구축, 3) 영어 전문가에 의한 수동 검증 및 평가. ChatGPT를 이용한 방식은 4단계로 구성된다: 1) RACE 데이터와 같은 독해 교육용 데이터로부터 지문 및 문제 수집, 2) Prompt 구축, 3) ChatGPT에 의한 대화 데이터의 자동 구축, 4) 코사인 유사도(cosine similarity)와 같은 자동 평가.

      ## ChatGPT 기반 독해 튜터링 대화 데이터 구축 타당성 분석

      ### Zero-Shot Prompt vs. Few-Shot Prompt 구축
      ChatGPT를 이용하여 독해 튜터링 대화 데이터를 생성하기 위해 독해지문, 연습문제, 정답을 토대로 ChatGPT에 프롬프트를 입력하고 대화 생성 성능을 확인하며 최적의 prompt를 찾고자 하였다. 그 결과 zero-shot prompting은 일관성 있는 대화 생성의 장점이 있었으며 few-shot prompting은 정확도가 높다는 장점이 있었다. few-shot prompt에는 zero-shot prompt에 tutor와 student 대화 예제를 추가하였다.

      ### 자동 대화 데이터 구축
      zero-shot prompt와 few-shot prompt를 이용하여 독해 튜터링 대화 데이터를 자동으로 구축하였다. 사용한 API는 gpt-3.5-turbo와 gpt-4였다. 생성된 결과를 수동 구축 대화 데이터와 비교 분석하기 위해 50개의 수동 대화 데이터를 임의로 추출하였다.

      수동 구축 대화 데이터 vs. ChatGPT에 의해 자동 구축된 50개의 대화 데이터 비교: 수동 구축된 전체턴 수(821개)와 ChatGPT에 의해 자동으로 구축된 전체턴 수는 prompting 방식이나 API의 종류에 따라 차이가 크게 나지 않았지만 전체 토큰수는 ChatGPT에 의해 자동으로 구축된 토큰수가 거의 2배에 달했다. 즉, ChatGPT가 더 많은 단어를 사용하여 대화를 생성하였다.

      ### 자동 평가
      수동 구축 대화턴과 ChatGPT에 의해 자동 구축된 대화턴을 자동 평가하여 비교하였다. 자동 평가는 코사인 유사도(cosine similarity), TF-IDF, Sentence Transformer로 측정되었다. 코사인 유사도는 문장 간의 유사도를 고려한 것이며 TF-IDF는 문단(Paragraph) 간의 유사도를 고려한 것이며 Sentence Transformer는 대화 간의 의미적 유사도를 고려한 것이다.

      문단 간의 유사도를 위한 TF-IDF와 대화 간의 의미적 유사도를 위한 Sentence Transformer 비교에 따르면 few-shot prompting과 gpt-4.0 엔진의 조합이 수동 구축과 가장 유사한 것으로 측정되었다. TF-IDF: few-shot + gpt-4.0 = 0.49 (가장 높음). Sentence Transformer: few-shot + gpt-4.0 = 0.83 (가장 높음).

      few-shot prompting과 gpt-4.0 엔진의 조합에 의해 생성된 대화턴은 독해지문, 연습문제, 정답을 모두 포함하고 있어서 교육적으로도 활용가치가 높았다.

      ## 결론
      대화기반 영어 독해 튜터링 시스템을 위한 학습용 데이터로 수동으로 구축된 대화 데이터를 사용하였으나 비싼 구축 비용, 적은 데이터양, 긴 구축기간이 해결해야 할 문제였다. 이런 점에서 본 논문에서는 ChatGPT를 이용하여 독해 튜터링 대화 데이터를 자동으로 구축하기 위해 ChatGPT 기반 독해 튜터링 대화 데이터 구축 프로세스를 수립하고 prompting 방식을 검증하고자 하였다. 자동 평가 결과 현재 시점에서는 few-shot prompting과 gpt-4.0 엔진의 조합으로 독해 튜터링 대화 데이터를 자동으로 구축하고 인간의 감수에 의한 학습 데이터 구축이 바람직하다는 것을 확인하였다.
    relevance: |
      - **데이터 구축 비용 절감**: 수동 구축(4명 × 3.5개월 = 5,708개)의 비용을 ChatGPT로 대폭 절감할 수 있다. 특히 Few-shot + GPT-4 조합이 효과적이다.
      - **다층 평가 체계**: Cosine similarity(문장), TF-IDF(문단), Sentence Transformer(의미)를 함께 사용한 다각도 평가가 체계적이다.
      - **교육 데이터의 특수성**: 독해 튜터링은 일반 대화와 달리 지문, 문제, 정답을 모두 포함해야 한다. Few-shot이 이를 더 잘 반영한다.
      - **인간 감수 필요성**: GPT-4로 자동 생성해도 인간 검증이 필요하다는 결론은 현실적이다. 완전 자동화는 아직 어렵다.
      - **50개 샘플링**: 5,708개 중 50개를 평가한 것은 비용과 신뢰도의 균형점이다. 통계적으로 유의미한 샘플 크기다.
    tips: |
      - **Few-shot vs Zero-shot**: Few-shot은 정확도가 높고, Zero-shot은 일관성이 높다. 튜터링 대화는 정확도가 더 중요하므로 Few-shot을 선택하라.
      - **GPT-4 vs GPT-3.5**: 교육 데이터는 품질이 매우 중요하므로 GPT-4를 사용하라. 비용이 더 들지만 결과물이 훨씬 낫다.
      - **TF-IDF 0.49 기준**: TF-IDF 유사도 0.49는 문단 수준에서 "적당히 유사"한 수준이다. 0.3 이하면 너무 다르고, 0.7 이상이면 거의 복사본이다.
      - **Sentence Transformer 0.83**: 의미 유사도 0.83은 "매우 유사"한 수준이다. 0.7 이상이면 학습 데이터로 활용 가능하다.
      - **토큰 수 2배 문제**: ChatGPT가 더 장황하게 생성한다. 이를 제어하려면 프롬프트에 "간결하게", "3문장 이내" 같은 제약을 추가하라.
      - **50개 평가 전략**: 전체 데이터에 자동 구축 전 50개로 파일럿 테스트하라. 비용을 아끼고 프롬프트를 개선할 수 있다.
      - **RACE 데이터 활용**: RACE는 독해 교육의 표준 벤치마크다. 중학교 버전이 가장 적절한 난이도다.
      - **DIRECT 데이터셋 구조**: Question턴 + Feedback턴 + Chat턴의 3가지 턴 타입을 명확히 구분하라. Few-shot 예제에도 이 구조를 포함시켜라.
      - **인간 감수 프로세스**: 자동 생성 후 영어 교육 전문가가 10~20% 샘플링 검증하는 것이 현실적이다. 100% 검증은 비효율적이다.
      - **논문 작성 팁**: Zero-shot vs Few-shot, GPT-3.5 vs GPT-4를 2×2 매트릭스로 비교하고, 각각 Cosine/TF-IDF/Sentence Transformer 점수를 표로 제시하라. 시각적으로 명확하다.

  - venue: "KSC 2023"
    title: "ARCLE: 추상화 및 추론을 위한 강화학습 환경"
    link: "https://www.dbpia.co.kr/journal/articleDetail?nodeId=NODE11705346"
    keywords: ["ARC", "강화학습", "Gymnasium", "O2ARC", "MDP", "DSL", "추상화"]
    md_file: "md-KSC/ARCLE 추상화 및 추론을 위한 강화학습 환경.md"
    abstract: |
      본 논문에서는 추상화 및 추론(Abstraction and Reasoning Corpus; ARC) 문제를 위한 강화학습 환경인 ARCLE을 소개한다. ARCLE은 인간의 ARC 문제 해결 기록을 수집하는 웹 인터페이스인 O2ARC에서 영감을 받아 제작되었다. ARCLE은 Gymnasium 프레임워크에서 구현되었으며, ARC의 모든 문제를 풀 수 있는 행동 공간과 상태 공간이 탑재되어 있다. 본 논문에서는 ARCLE의 구조 및 작동 원리, 사용 방법을 상세히 소개한다. ARCLE은 PyPI를 통해 쉽게 설치할 수 있으며 (pip install arcle), 인간의 풀이법을 본떠 문제를 해결해 나가는 강화학습 에이전트를 훈련하는 테스트베드로 활용되고 있다.
    contents: |
      ## 서론
      Abstraction and Reasoning Corpus (ARC)는 인공 지능의 추상화와 추론 능력을 평가하는 데이터셋이다. ARC의 각 문제에는 3~5개의 예시 입출력 쌍과 문제 입력 배열이 주어지며, 인공지능은 입출력 관계에서 일정한 규칙을 찾아 이를 문제 입력 배열에 적용하여 출력 배열을 생성해야 한다. 모든 입출력 쌍은 최대 30x30 크기의 배열이며 배열의 요소(픽셀)는 10가지 색깔에 대응되는 0~9의 정수이다. ARC의 각 문항을 해결하기 위해선 물체 구분, 정렬, 셈법, 기초적인 기하 등을 활용해야 한다.

      인간은 주어진 문제를 풀 때 하늘색 픽셀의 위치와 오브젝트를 구분 정보, 오브젝트의 잘라내기를 조합해 쉽게 정답을 도출할 수 있다. 이처럼 인간은 다양한 사전 지식을 조합하여 평균적으로 83.8%의 정확도를 낸다. 그러나, ARC의 모든 문제에 포함된 사전지식을 정리하여 도메인 특화 언어(DSL)를 제작한 후 DSL조합을 탐색하더라도 최대 30%의 정확도를 낸다. 인간에 비해 크게 낮은 정확도는 DSL의 설계 과정이나 DSL 조합 과정 중 적어도 하나에 성능 저하의 요인이 있다는 것을 암시한다.

      DSL 조합 과정에 초점을 맞추어 보면, DSL을 합성하는 과정은 강화학습 문제로 생각할 수 있다. 행동 공간은 DSL로, 상태 공간의 초기 상태를 문제 입력 배열로 설정하여 강화학습 환경을 구성할 수 있다. 강화학습 알고리즘을 실행하기 위해선 적절한 강화학습 환경이 주어져야 한다. gym-arc라는 환경이 존재했으나 오랜 기간 유지보수되지 않았으며, 기본적인 색칠, 크기 조절, 플러드 필만을 사용하여 구현되었다. 본 논문에선 더 많은 DSL 지원을 위해 ARCLE(ARC Learning Environment)을 제안한다. ARCLE은 이동, 회전 등 오브젝트 기반 DSL을 추가한 O2ARC 인터페이스에 착안해 구현되었으며, O2ARC에 정의된 모든 DSL을 구현하는 강화학습 환경이다. 사용자는 사용자 정의 환경을 만들기 위해 자유롭게 행동 및 상태 공간, 보상 메커니즘을 수정할 수 있다. ARCLE은 PyPI를 통해 설치 가능하다 (pip install arcle).

      ## ARCLE의 구현

      ### ARCLE의 기본 구조
      ARCLE은 Python 3과 Gymnasium 프레임워크에서 구현한 강화학습 환경 패키지이다. ARCLE의 환경은 마르코프 결정 과정(MDP) 형태이다. 특정 상태에 있는 환경에 에이전트가 행동을 취하면 환경의 상태가 전이하며 에이전트에게 보상이 주어진다. ARCLE의 환경은 에이전트가 편집 중인 배열(상태)에 색을 칠하거나 크기를 바꾸는 등의 행동을 취하는 MDP의 형태를 띈다.

      ARCLE의 패키지 구조는 loaders, actions, envs의 세 모듈로 이루어져 있다. 데이터셋을 강화학습 환경에 공급하기 위한 loaders 모듈, 픽셀 이동이나 복사-붙여넣기 등 다양한 행동을 정의한 actions 모듈, 그리고 강화학습 환경을 정의한 envs 모듈이다.

      ### loaders 모듈
      ARCLE의 loaders 모듈에는 ARCLE의 환경에 ARC 데이터셋을 공급하는 로더가 구현되어 있으며 Mini-ARC와 같이 파생 데이터셋 또한 환경에 공급할 수 있도록 설계되었다. 데이터셋을 공급하기 위해선 ARCLE의 'Loader' 추상 클래스를 상속받고 get_path 메서드와 parse 메서드를 구현하여 사용할 수 있다. 현재 ARCLE에는 ARC와 Mini-ARC 데이터셋 로더가 구현되어 있다.

      ### envs 및 actions 모듈
      ARCLE의 envs 모듈에는 ARC 강화학습 환경 구현을 위한 'AbstractARCEnv' 추상 클래스가 존재한다. 이 클래스를 상속받아 상태 공간과 행동 공간을 정의하여 새로운 강화학습 환경을 제작할 수 있다. 기본적인 상태 공간은 에이전트가 현재 편집 중인 색깔 행렬 'grid'와 그 행렬의 크기를 나타내는 'grid_dim'으로 구성된다.

      행동 공간은 다음과 같이 정의할 수 있다. 우선, actions 모듈에 구현된 다양한 함수를 불러오거나 직접 구현해 리스트로 저장한다. 행동 공간을 함수 리스트의 인덱스 'operation'과 함수의 적용 위치를 나타내는 이진 배열 'selection'으로 구성된다. 그러면 'operation'과 'selection'을 이용해 상태가 전이된다.

      ARCLE에는 ARCEnv와 O2ARCv2Env, 두 개의 부속 강화학습 환경이 AbstractARCEnv를 상속받아 미리 구현되어 있다. 두 환경 모두 gym.make()로 불러온 후 타 Gymnasium의 환경과 동일한 방식으로 사용할 수 있다.

      ### ARCEnv의 상태 공간 및 행동 공간
      ARCEnv는 ARC의 모든 문제를 풀 수 있는 최소한의 상태 공간과 행동 공간이 탑재되어 있다. 상태 공간은 0~9의 정수로 이루어진 색깔 배열인 'grid', 그리고 배열의 크기를 나타내는 'grid_dim'이 있다. 행동 공간의 'operation'은 0~11의 정수이다. 0~9는 'selection'으로 선택된 픽셀을 0~9의 색으로 칠하는 것이며, 10은 정답 그리드 크기로 'grid_dim'을 변경, 11은 정답 제출을 의미한다.

      ### O2ARCv2Env의 state와 action 공간
      O2ARCv2Env는 사람이 ARC를 푸는 과정을 수집하기 위한 웹 인터페이스인 O2ARC를 보완하여 강화학습 환경 형태로 구현한 것이다. O2ARC는 본래 ARC 데이터셋과 함께 배포된 기본 인터페이스에서 오브젝트 기반 행동을 강화한 것으로, 픽셀을 선택한 이후 이동, 회전, 반전을 자유롭게 할 수 있다. 따라서 행동 공간은 선택된 픽셀들의 위치를 나타내는 이진 배열 'selected'와 이동, 회전, 반전을 보조하기 위한 딕셔너리인 'object_states'를 포함한다. 또한, 복사-붙여넣기 기능을 위한 클립보드 배열인 'clip', 'clip_dim' 역시 포함된다.

      행동 공간은 ARCEnv와 유사하게 'selection'과 'operation'으로 이루어져 있으나, 'operation'의 범위가 0~34로 총 35개의 함수가 할당되어 있다. 0~9는 색칠, 10~19는 플러드 필이다. 20~27은 오브젝트 기반 행동으로, 상하좌우 이동, 회전 그리고 반전으로 이루어져 있다. 28과 29는 각각 문제 입력 배열 또는 편집 중인 'grid'로부터 'selection'이 가리키는 픽셀을 클립보드로 복사하며 30은 붙여넣기이다. 31은 문제 입력 배열을 'grid'로 복사, 32는 'grid'를 0(검은색)으로 초기화, 33은 'grid'의 잘라내기, 34는 제출이다. 특히, 20~27번 오브젝트 관련 행동은 선택된 오브젝트가 다른 픽셀을 일시적으로 가리며 지나가는 경우가 발생할 수 있으므로, 'object_states'에 각종 상태를 저장하여 픽셀이 사라지지 않도록 일관성을 유지하였다.

      ### ARCLE의 시각화
      ARCLE은 터미널상에서 시각화된다. ARC의 모든 입력과 출력은 기본적으로 10가지 색상을 이용한 배열로 나타나므로 ANSI Escape Code를 사용하여 시각화할 수 있다. 터미널 창의 최상단에는 문제 ID, 최하단에는 'grid_dim'과 마지막에 취한 행동, 그리고 마지막으로 얻은 보상을 표시한다. O2ARCv2Env를 시각화할 때는 왼쪽 'grid'와 함께 클립보드를 나타내는 'clip' 배열이 오른쪽에 표시된다. 오브젝트 관련 행동을 취할 때('operation' 20~27)에는 에이전트가 선택한 픽셀들 ('selected')이 대괄호('[]')로 강조된다.

      ### O2ARCv2Env의 테스트
      ARCEnv에 비해 행동 및 상태 공간 모두 상대적으로 복잡한 O2ARCv2Env는 O2ARC 인터페이스를 통해 사람으로부터 수집한 풀이과정 (ARC를 풀기 위해 사용한 행동 및 편집 중인 색깔 배열의 시퀀스)를 변환하여 환경의 동작을 검증했다. 사람의 풀이과정으로부터 행동을 순차적으로 추출하여 환경에서 실행했을 때 기록된 색깔 배열과 강화학습 환경의 'grid' 및 'grid_dim'이 일치하는지 확인하는 방식으로 동작을 검증하였다. O2ARC 인터페이스에서 수집한 1953개의 기록에 대해 테스트하였고, 풀이과정에 기록된 배열이 환경의 'grid'와 모두 일치함을 확인하였다.

      ## 결론 및 향후 연구

      ### 결론 및 기대 효과
      ARCLE은 Gymnasium에 기반한 강화학습 환경 패키지로, 사용자가 고안한 강화학습 알고리즘을 테스트할 수 있는 환경을 제공한다. ARCLE은 ARC 기본 테스팅 인터페이스의 확장인 O2ARC의 상태 공간과 행동 공간을 명확히 구조화하여 확장성을 높였다. 따라서, 사용자의 ARC 해법에 필요한 환경 상태와 행동을 자유롭게 추가 및 제거하여 파생 강화학습 환경을 제작할 수 있다. 궁극적으로는 ARC의 강화학습 해법 연구의 기반으로 ARCLE이 활용되어 강화학습 기반 인공일반지능 개발에 도움이 되기를 기대한다.

      ARCLE에 그래픽 인터페이스를 추가하여 사람의 ARC 해결 과정을 수집하는 데에도 사용 가능하다. 수집한 풀이 기록을 사용하여 강화학습 알고리즘을 학습시키거나, 풀이과정에 나타나는 공통적인 행동의 조합을 DSL로 추가하여 인간의 핵심 사전지식을 분석하는 데에 사용 가능하다.

      ### 향후 개선 방향
      현재 actions 모듈의 동작 테스트는 O2ARC로부터 얻어진 인간의 ARC 풀이과정과의 일치 여부로 진행하고 있다. 오픈소스 프로젝트로써 다양한 행동을 추가해 나가기 위해 action마다 단위 테스트를 할당해야 한다. 이는 사용자가 강화학습 알고리즘을 ARCLE에 적용할 때 불필요한 디버깅을 줄여주어 사용자 편의성을 증진한다.

      더 나아가, 현재 환경에서 주어지는 보상은 정답 제출 행동 직후의 'grid'와 정답이 완전히 일치할 경우 1, 아니면 0을 반환하는 형태이다. 이러한 방식은 강화학습 에이전트의 보상 총합이 0이 되어 에이전트 학습에 큰 걸림돌이 된다. 이를 방지하기 위해 보상 메커니즘을 개선하여 많은 강화학습 알고리즘이 ARCLE 위에서 성공적으로 최적화될 수 있도록 개선할 것이다.
    relevance: |
      - **표준화된 환경의 중요성**: Gymnasium 프레임워크를 사용한 것은 강화학습 커뮤니티의 표준을 따른 것이다. 다른 연구자들이 쉽게 사용할 수 있다.
      - **모듈화 설계**: loaders, actions, envs로 명확히 분리한 구조는 확장성과 유지보수성을 높인다. 새로운 행동이나 데이터셋 추가가 쉽다.
      - **인간 풀이 검증**: O2ARC의 1953개 인간 풀이 기록으로 검증한 것은 환경의 정확성을 보장한다. 실제 사용 시나리오로 테스트한 것이 중요하다.
      - **PyPI 배포**: `pip install arcle`로 설치 가능하게 한 것은 접근성을 크게 높인다. 연구 재현성과 확산에 필수적이다.
      - **35개 행동 공간**: O2ARCv2Env의 35개 행동(색칠, 플러드 필, 오브젝트 조작, 복붙 등)은 ARC의 다양한 문제를 해결할 수 있는 충분한 표현력을 제공한다.
    tips: |
      - **Gymnasium 프레임워크**: OpenAI Gym의 후속인 Gymnasium을 사용하라. `gym.make()`, `step()`, `reset()` 인터페이스가 표준이다.
      - **MDP 설계**: 상태(grid, grid_dim), 행동(operation, selection), 보상(정답 여부)을 명확히 정의하라. 이것이 강화학습 환경의 핵심이다.
      - **ARCEnv vs O2ARCv2Env**: 간단한 연구는 ARCEnv(12개 행동), 복잡한 연구는 O2ARCv2Env(35개 행동)를 사용하라. 목적에 맞게 선택하라.
      - **ANSI Escape Code**: 터미널 시각화에는 ANSI 코드가 효과적이다. 그래픽 라이브러리보다 빠르고 의존성이 적다.
      - **Loader 추상 클래스**: 새 데이터셋(ConceptARC, Mini-ARC 등)을 추가하려면 Loader를 상속받아 get_path와 parse를 구현하라.
      - **Action 추가**: actions 모듈에 함수를 추가하고 operation 번호를 할당하면 새 행동을 쉽게 추가할 수 있다. 모듈화의 장점이다.
      - **보상 설계 개선**: 현재의 0/1 보상은 sparse reward 문제가 있다. 부분 일치도(픽셀 일치 비율)나 단계별 보상을 추가하는 것이 향후 과제다.
      - **단위 테스트**: 각 action에 대해 입력→예상 출력 테스트를 작성하라. 오픈소스 프로젝트의 신뢰도를 높이는 핵심이다.
      - **O2ARC 연계**: O2ARC 웹 인터페이스로 인간 풀이를 수집하고, ARCLE로 에이전트를 훈련시키는 것이 시너지가 있다.
      - **논문 작성 팁**: 패키지 구조도(loaders/actions/envs), 행동 공간 표(0-34번 행동 설명), 1953개 검증 통과를 명확히 제시하라. 오픈소스 링크(GitHub, PyPI)는 필수다.

