papers:
  - venue: "KSC 2024"
    title: "한국어 수학 튜터링 대화 데이터셋"
    link: "https://www.dbpia.co.kr/journal/articleDetail?nodeId=NODE12041963"
    keywords: ["대화 데이터셋", "수학 추론", "튜터링", "LLM", "화행", "교육 AI"]
    md_file: "md-KSC/한국어 수학 튜터링 대화 데이터셋.md"
    abstract: |
      딥러닝 기반 기계학습 기술의 발달과 함께 대형 언어모델의 개발은 언어처리를 포함한 많은 분야에서 큰 진전을 가져왔다. 
      특히 사전학습된 언어모델을 특정 태스크에 맞게 소규모 데이터로 파인튜닝하는 것만으로도 향상된 성능을 확인할 수 있었다. 
      이와 같은 이유로 데이터셋의 중요성과 함께 다양한 언어처리 태스크를 목적으로 하는 데이터셋들이 개발되고 발표되었다. 
      본 논문에서는 수학 추론 능력에 기반한 대화(dialogue)를 통한 수학 튜터링(tutoring) 능력을 함께 평가할 수 있는 수학 튜터링 데이터셋을 제안한다.
    contents: |
      ## 1. 서론
      최근 대형 언어모델의 추론 능력에 기반한 수학 문제 풀이 및 수학 튜터링 등에 대한 관심이 증가하고 있다. 이와 관련하여 초등학교 및 중등학교 수준의 수학 문제 풀이를 내용으로 하는 수학 추론 데이터셋이 개발 및 발표되었다. 하지만 기존의 수학 튜터링(tutoring)을 위한 튜터링 대화 데이터셋은 영어권 일부 데이터셋을 제외하고는 없는 실정이다. 우리는 초등학교 수준의 수학 추론 및 이에 기반한 수학 튜터링을 위한 한국어 대화를 모두 포함하는 데이터셋을 구축하였다.

      ## 2. 관련 연구
      수학 추론 태스크에는 서술형 수학 문제 풀이(Math Word Problem Solving), 정리 증명(Theorem Proving), 기하 문제 풀이(Geometry Problem Solving), 수학 질의 응답(Math Question Answering) 등이 있다. 서술형 수학 문제는 단계별 사칙연산 과정을 거쳐 해결하는 문제이며, 서술형 수학 문제를 풀기 위해서는 수학 추론 능력과 언어 이해 능력이 함께 요구된다. GSM8K는 영어권 대표적인 서술형 수학 문제 풀이 데이터셋이다. 대화 데이터셋으로는 다중 도메인 목적지향 대화로 구성된 MultiWOZ가 있으며, 수학 튜터링 대화와 관련된 영어권 데이터로는 MathDial이 있다.

      ## 3. 한국어 수학 튜터링 대화 데이터셋
      한국어 수학 튜터링 대화 데이터셋의 구축 목적은 수학 문제와 해당 문제에 대한 학생의 오답 풀이과정이 주어졌을 때 AI 튜터와의 대화를 통해 학생이 자신의 오류를 수정해서 최종 정답까지 유도할 수 있는 튜터링 모델의 개발을 위해서이다. 데이터셋은 수학 추론부분 및 수학 추론부분과 연관된 튜터링 대화부분으로 구성되어 있다.

      ### 3.1 데이터셋 구성
      한국어 수학 튜터링 대화 데이터셋은 크게 두 부분으로 구성되어 있다. 첫 번째 구성요소는 서술형 수학 문제와 그 풀이과정이고 두 번째 구성요소는 튜터링 대화이다. 수학 문제의 수준은 GSM8k 수준으로 초등학교 수학 문제에 해당하며, 문제 유형은 서술형 문제로 한정하였다. 정답 풀이과정(correct_solution)이 주어지며 학생의 오답 풀이과정(error_solution)도 함께 주어진다. 학생의 오답 풀이과정은 휴먼 구축자가 문제의 수준을 파악하고 비슷한 수준의 학생이 해당 문제를 푸는 과정을 고려하여 발생할 수 있는 오류를 임의로 가정하여 구축하였다.

      튜터링 대화(dialogue) 구축을 위해서 우리는 휴먼 구축자 두 명으로 하여금 한 명은 튜터 역할, 한 명은 학생 역할을 맡도록 하였다. 대화 이전에 튜터는 학생의 오류를 알고 있으며, 학생은 튜터가 알려주기 전까지 자신의 오류를 모르고 있는 상황을 설정하여 대화를 수행하도록 하였다. 튜터는 대화를 통해 학생의 오류를 지적하고 학생이 특정 풀이 과정을 이해하고 있는지를 파악하며, 최종적으로 학생이 정답을 이끌어 낼 수 있도록 대화를 진행하였다.

      ### 3.2 대화 부착 정보
      한국어 수학 튜터링 대화 데이터셋은 궁극적으로 AI 튜터 모델의 개발을 목적으로 하고 있기 때문에 튜터의 최종 발화를 생성하기 위한 다양한 정보들을 튜터와 학생의 발화에 대해 부착하였다.

      튜터링 화행(Speech Act): 튜터의 튜터링 발화 생성을 위한 화행은 teacher move를 사용하여 부착하도록 하였다. 튜터링을 위한 튜터의 발화를 4가지로 분류하였다: (1) Probing - 학생의 이해도를 확인하는 질문, (2) Telling - 직접적인 설명 제공, (3) Confirming - 학생 답변의 정확성 확인, (4) Correcting - 오류 지적 및 수정.

      튜터링 상태(Tutoring State): 튜터링 상태는 일종의 대화 상태와 같이 대화의 진행상황과 관련된 정보이다. 튜터링 상태는 튜터의 질문에 답하는 학생의 발화에 부착되며 학생이 튜터의 질문 의도를 파악하여 올바로 대답하였는지 여부를 나타낸다. 튜터링 상태 값은 바이너리 값으로서 'O(이해)' 및 'X(이해하지 못함)'의 두 가지 값을 가진다. 튜터링 상태 값에 따라 튜터는 해당 풀이 단계를 다른 방법으로 계속 설명할지 다음 스텝으로 넘어갈지를 결정하게 된다.

      ### 3.3 데이터셋 통계
      전체 대화는 3,949개 대화로 구성되어 있으며, 각 대화에는 서로 다른 수학 문제가 포함된다. 수학 문제의 수준은 GSM8k 수준이며, 평균적으로 정답 풀이과정은 평균 4.5개의 풀이과정을 갖고 있다. 전체 대화의 평균 대화 길이는 10.1턴이다. 튜터 발화의 평균 문장 길이는 7.2 어절이며, 학생 발화의 평균 문장 길이는 평균 7.4 어휘이다.

      ## 4. 튜터링 상태 예측 실험
      수학 문제와 정답 풀이과정 및 학생 오류 풀이과정이 주어진 상황에서 튜터의 질문에 대한 학생의 응답 발화에 대해서 튜터링 상태를 예측하는 실험을 진행하였다. 실험을 위한 테스트셋은 100대화를 임의로 추출하였으며, 나머지는 학습셋으로 사용하였다. 학습시에는 전체 파라미터를 학습시키지 않고, LoRA(Low Rank Adaptation)를 기반으로 일부 파라미터만 학습시켰다. Llama-2-ko-7b 모델은 Joint Accuracy 19.65%, Accuracy 56.52%를 달성했고, Llama-3-Korean-Bllossom-8b 모델은 Joint Accuracy 42.86%, Accuracy 75.85%를 달성했다.

      ## 5. 결론 및 향후 연구
      본 논문에서는 수학 추론과 수학 튜터링 대화를 목적으로 하는 한국어 수학 튜터링 대화 데이터셋에 대하여 설명하였다. 한국어 수학 튜터링 대화 데이터셋은 최근 관심이 증가하고 있는 AI 튜터링 모델 개발에 많은 도움이 될 것이다. 현재 데이터셋의 난이도 조정을 위한 작업 추진중이며 추가적으로 외부지식 기반 응답 생성을 위한 대화도 추가할 계획이다. 대화 난이도 조절과 보다 현실적인 튜터링 상황을 반영하기 위해 특정 오류 포인트에 대한 튜터와 학생 간의 대화를 2~3턴 정도 늘이는 방향을 고려하였다.
    relevance: |
      - **대화형 데이터셋 구축 방법론**: 두 명의 구축자가 튜터-학생 역할을 나누어 실제 대화를 진행하는 방식은 자연스럽고 현실적인 대화 데이터를 생성하는 효과적인 방법이다. 이러한 역할극 기반 구축 방법은 다른 도메인의 대화 데이터 구축에도 적용 가능하다.
      - **구조화된 주석 체계**: 화행(speech act)과 상태(state) 정보를 체계적으로 부착하는 방법은 대화 모델 학습에 매우 유용하다. 특히 튜터링 상태의 바이너리 값('O'/'X')은 단순하면서도 명확한 학습 신호를 제공한다.
      - **교육 도메인 특화 데이터**: 수학 튜터링이라는 특정 도메인에 초점을 맞춘 데이터셋은 교육 AI 분야에서 매우 가치가 높다. 오류 풀이과정을 포함한 것은 학생의 오개념을 다루는 현실적인 튜터링 시나리오를 반영한다.
      - **멀티태스크 학습 가능성**: 수학 추론 능력과 대화 능력을 동시에 평가할 수 있어, 멀티태스크 학습 연구에 활용 가능하다.
      - **저자원 언어 연구**: 한국어 교육용 대화 데이터는 매우 부족한 상황에서, 이 데이터셋은 한국어 교육 AI 연구의 기반이 된다.
    tips: |
      - **대화 데이터 구축 시 화행 분류의 중요성**: 튜터의 발화를 Probing, Telling, Confirming, Correcting으로 분류하는 것은 튜터링 전략을 명시적으로 모델링하는 데 핵심적이다. 새로운 대화 시스템을 구축할 때도 도메인에 맞는 화행 분류 체계를 먼저 설계하는 것이 중요하다.
      - **상태 추적의 단순화**: 복잡한 상태 공간 대신 바이너리 값('O'/'X')을 사용한 것은 데이터 구축 비용을 줄이면서도 효과적인 학습을 가능하게 한다. 과도한 세분화보다는 명확한 구분이 실용적이다.
      - **오류 데이터의 가치**: 정답 풀이과정뿐만 아니라 오답 풀이과정을 포함한 것은 매우 중요한 설계 선택이다. 실제 교육 현장에서는 학생의 오류를 다루는 것이 핵심이므로, 이러한 데이터는 실용적인 튜터링 시스템 개발에 필수적이다.
      - **역할 기반 구축의 효과**: 구축자에게 명확한 역할(튜터/학생)과 시나리오(튜터는 오류를 알고 있고, 학생은 모르고 있음)를 부여하는 것은 일관성 있는 대화를 생성하는 핵심 전략이다.
      - **LoRA 활용**: 전체 파라미터를 학습하지 않고 LoRA를 사용한 것은 계산 효율성과 성능의 균형을 잘 고려한 선택이다. 7B 이상의 모델을 다룰 때 LoRA는 매우 실용적인 방법이다.
      - **데이터셋 확장 전략**: 난이도 조절, 대화 턴 수 증가, 외부지식 기반 응답 추가 등 향후 계획은 데이터셋의 다양성과 난이도를 체계적으로 높이는 좋은 방향이다. 데이터셋은 한 번에 완성되는 것이 아니라 지속적으로 발전시켜야 한다.
      - **평가 지표의 다양성**: Joint Accuracy와 Accuracy를 함께 제시한 것은 모델의 성능을 다각도로 평가하는 좋은 사례이다. 특히 대화 상태 예측에서는 전체 대화에 대한 정확도(Joint)와 개별 턴에 대한 정확도를 구분하는 것이 중요하다.

  - venue: "KSC 2024"
    title: "한국어 생성문서의 사실성 평가에 대한 연구"
    link: "https://www.dbpia.co.kr/journal/articleDetail?nodeId=NODE12042006"
    keywords: ["사실성 평가", "생성 문서", "LLM", "신뢰성", "FactScore", "환각", "위키백과"]
    md_file: "md-KSC/한국어 생성문서의 사실성 평가에 대한 연구.md"
    abstract: |
      한국어 생성 문서에 대해 사실성 평가를 할 수 있는 프레임워크를 제시한다. 환각을 통한 거짓 콘텐츠 생성의 가능성이 있는 수많은 언어모델들이 공개되고 있는 상황에서 그 중요성이 더해지고 있기 때문이다. 한국어 평가셋과 한국어 문서의 사실성 평가를 위한 소프트웨어를 제시하였다. 사실성 평가 대상과 비대상을 구분할 수 있는 모듈을 포함하여 코어 원소 사실 문장을 선별할 수 있도록 하였다. 실험을 통해 구축된 파이프라인의 효과성을 보였다.
    contents: |
      ## 서론
      사실 검증(fact-checking)은 주어진 주장이 사실인지 거짓인지를 판별하는 과정이다. 사실성 평가는 문서 전체의 사실성 정도를 측정하는 과정으로 볼 수 있다. 최근 생성형 언어모델은 환각(hallucination) 현상을 통해 종종 거짓된 콘텐츠를 양산해 낸다. 영어의 경우 FactScore와 같은 사실성 평가 프레임워크가 존재하지만, 한국어 생성문서에는 적용할 수 없는 상황이다. 왜냐하면 평가용 데이터집합이 영어 문서이며, 원소 사실 추출 방법도 영어에서 가능한 방법을 제시하였고, 지식 DB도 영어 위키백과를 기반으로 개발되었기 때문이다. 본 논문에서는 이러한 제한 사항을 해결하여 한국어 생성 문서의 사실성을 평가할 수 있는 프레임워크를 제시한다.

      ## 시스템 구성
      사실성 평가 시스템은 다음과 같이 구성된다. 생성문서가 입력되면 문장 단위로 분할하고, 각 문장에 대해 사실성 검증 평가 대상 여부를 판단한다. 사실성 검증 비대상 문장 타입은 매우 다양하다: (1) 추가 정보 검색 제안, (2) 정보 요청, (3) 생성 기권, (4) 정형적 답변, (5) 추측성 내용, (6) 답변 거절 등. 이러한 문장들은 필터링되어 평가 대상에서 제외된다.

      다음 단계는 원소 문장 추출 생성이다. 원소 문장이란 주어진 원문장에서 개별 정보를 추출하여 생성한 문장이다. 추출된 원소 문장은 코어 원소 사실 문장 선별 과정을 거친다. 이 과정은 문장안에 사실성 검증 대상과 비대상이 함께 포함될 수 있기 때문에 필요하다.

      각 코어 원소 문장에 대해 사실성 검증을 수행한다. 한국어 위키백과를 외부 지식 DB로 활용하며, BERT 기반 cross-encoder 검색기로 필요한 단락을 검색한다. 검증된 개별 사실성 검증 결과를 취합하여 참(True)으로 판별된 코어 원소 문장의 비율을 백분율로 계산한다. 이 값이 FactScore가 된다.

      ## 사실성 평가 데이터집합
      GPT-4.0-Preview-0125를 활용하여 인물 이력을 생성했다. 위키백과 방문기록 수와 페이지 텍스트 길이를 고려하여 한국인 54명, 외국인 50명을 선정했다.

      ## 실험 결과
      GPT-4를 사용한 각 모듈의 성능: 사실성 검증 비대상 문장 필터링 95.3%, 원소 문장 추출 98.1%, 코어 원소 사실 문장 선별 96.8%. 한국인 대상 문서의 FactScore는 50.5%, 외국인은 73.9%로 언어모델이 영어 문화권에 대한 지식을 더 많이 보유함을 보여준다. 인기도가 낮아질수록 FactScore도 낮아지며, 이 현상은 한국인 대상 문서에서 더욱 두드러진다. 사실판단 정확도는 평균 94%로 안정적이다.

      ## 결론
      한국어 생성문서의 사실성 평가 프레임워크와 평가셋, 평가 소프트웨어(https://github.com/ETRI-XAINLP/KorFactScore)를 제공했다. 향후 증류 모델 개발을 통해 평가 시스템 효율화를 진행할 예정이다.
    relevance: |
      - **다단계 파이프라인 설계**: 비대상 필터링 → 원소 문장 추출 → 코어 문장 선별 → 사실성 검증의 체계적인 다단계 파이프라인은 정교한 평가 시스템의 모범 사례다.
      - **비대상 문장 처리**: 많은 LLM이 생성하는 "정보 부족", "확인 필요" 등의 비사실적 문장을 필터링하는 것은 정확한 평가를 위해 필수적이다.
      - **원소 문장 분해**: 복합 문장을 개별 사실로 분리하여 평가하는 세밀한 접근은 정확한 사실성 측정을 가능하게 한다.
      - **문화권 편향 분석**: 한국인 vs 외국인 인물에 대한 성능 차이를 정량적으로 보여준 것은 LLM의 지식 편향을 명확히 드러낸다.
      - **실용적 검색 시스템**: BERT cross-encoder를 활용한 의미 기반 검색은 관련 정보를 정확히 찾는데 효과적이다.
      - **오픈소스 기여**: 평가 소프트웨어를 GitHub에 공개하여 재현성과 활용도를 높였다.
    tips: |
      - **비대상 필터링의 중요성**: "정보가 부족합니다", "확인이 필요합니다" 같은 문장은 사실 평가 대상이 아니다. 이를 필터링하지 않으면 평가 점수가 왜곡된다.
      - **원소 문장 추출 전략**: "A는 B에서 태어나 C 대학을 졸업했다" 같은 문장은 두 개의 원소 사실로 분리해야 정확한 평가가 가능하다.
      - **지식 베이스 선택**: 한국어는 위키백과가 가장 신뢰할 수 있는 소스다. 도메인 특화 평가에는 해당 도메인의 신뢰할 수 있는 지식 베이스를 사용하라.
      - **검색 시스템 설계**: 단순 키워드 검색보다 BERT 같은 의미 기반 검색이 훨씬 효과적이다. Cross-encoder는 재순위화에 매우 유용하다.
      - **문화권 편향 인식**: GPT-4 같은 모델은 영어권 정보에 편향되어 있다. 한국어 관련 평가 시 이를 고려해야 한다.
      - **지식 증류 계획**: GPT-4의 95% 이상 성능을 작은 모델로 증류하면 비용 효율적 시스템을 만들 수 있다.
      - **FactScore 해석**: 백분율로 표현되어 직관적이다. "이 문서의 70%가 사실이다"처럼 쉽게 해석할 수 있다.
      - **평가 데이터 설계**: 인기도와 페이지 길이를 변수로 두어 다양한 난이도를 포함하는 것이 체계적인 평가 설계다.
      - **논문 작성 팁**: 시스템을 명확한 모듈로 나누어 설명하고, 각 모듈의 성능을 개별 평가하라. 오픈소스 공개는 연구 영향력을 크게 높인다.

  - venue: "KSC 2024"
    title: "세분화된 LLM 피드백을 활용한 요약문 평가 모델 학습"
    link: "https://www.dbpia.co.kr/journal/articleDetail?nodeId=NODE12041959"
    keywords: ["LLM 피드백", "요약 평가", "지식 증류", "FineSurE", "환각", "QLoRA"]
    md_file: "md-KSC/세분화된 LLM 피드백을 활용한 요약문 평가 모델 학습.md"
    abstract: |
      자동 요약문 평가 모델을 학습하기 위해서는 인간이 라벨링한 대량의 데이터가 필요하지만, 고품질의 요약문 라벨을 대량으로 얻는 것은 많은 비용이 든다. 본 연구에서는 이러한 한계를 극복하기 위해 대형 언어 모델(LLM)이 생성한 피드백을 활용하는 방법을 탐구한다. 10개의 LLM으로 다양한 요약문을 생성한 후, Llama-3-70B-Instruct를 사용하여 문장 단위로 추론 근거 및 오류 유형이 포함된 LLM 피드백을 생성한다. 적은 계산 비용을 유지하면서 높은 성능을 이끌어내기 위해, 소형 오픈소스 모델인 Llama-3-8B-Instruct를 학습에 사용한다. 실험 결과, LLM이 생성한 대규모 데이터셋으로 학습한 모델이 인간이 라벨링한 소규모 데이터셋으로 학습한 모델보다 높은 성능을 보였다.
    contents: |
      ## 서론
      최근 LLM의 발전은 텍스트 요약 성능을 크게 향상시켰다. 그러나 요약문 내 환각(Hallucination) 문제는 여전히 발생하고 있으며, 이로 인해 요약문 사실 검증의 중요성이 더욱 부각되고 있다. 요약문의 사실성을 사람이 검증하기 위해서는 많은 시간과 비용이 소모된다. 특히 오류 유형 탐지와 설명 가능한 평가 같은 세분화된 수준의 평가에서는 비용이 더욱 증가하고 재현성 확보도 어렵다. 이러한 비용을 줄이기 위해 LLM이 생성한 라벨을 활용한 지식 증류(Knowledge distillation)가 대안으로 제시되고 있다. 그러나 요약문 평가 모델에 세분화된 LLM 피드백을 적용하여 학습하는 연구는 아직 충분히 탐구되지 않았다.

      ## 방법론
      제안된 파이프라인은 다음 네 단계로 구성된다: (1) 요약문 생성: 10개의 언어 모델(Non-LLM: BART-large-CNN, FLAN-T5-large, Pegasus-Large; 오픈소스 LLM: Phi-2, Llama-2-13B-Chat, Mistral-7B-Instruct, Mixtral-7B-Instruct; 상업용 LLM: Claude-Instant, GPT-3.5-Turbo, GPT-4-Turbo)을 사용하여 다양한 요약문을 생성한다. (2) 피드백 생성: Llama-3-70B-Instruct를 사용하여 문장 단위 사실 검증 라벨 및 오류 유형이 포함된 세분화된 LLM 피드백을 FineSurE 프롬프트를 통해 생성한다. 오류 범주는 "오류 없음(NoE)", "외부 지식 오류(OutE)", "개체 오류(EntE)", "서술 오류(PredE)", "상황 오류(CirE)", "문법 오류(GramE)", "연결 오류(LinkE)", "참조 오류(CorefE)", "기타 오류(OtherE)"의 9가지다. (3) LLM 피드백을 활용한 모델 학습: QLoRA를 사용하여 Llama-3-8B-Instruct를 102,640개의 LLM 피드백으로 미세조정했다. JSON 형식으로 출력하도록 설정했으며, 4개의 NVIDIA H100 GPU, Batch size 32, Iteration 8,000으로 학습했다. (4) 추론: 학습된 모델의 성능을 확인하기 위해 인간 평가와의 일치도를 확인한다.

      ## 실험 결과
      세 가지 평가 지표를 사용했다: (1) bAcc(Balanced-Accuracy): 문장 단위 사실 여부 판단의 클래스 불균형을 고려한 일치도, (2) Pearson Correlation: 요약문 단위 사실 일치도의 피어슨 상관계수, (3) Rank Correlation: 요약문 생성 모델 순위의 스피어만 순위 상관계수.

      Zero-shot 베이스라인은 bAcc 54.7%, Pearson Corr 0.246, Rank Corr 0.663이었다. 5,853개 인간 피드백으로 학습한 모델은 bAcc 69.8%, Pearson Corr 0.534, Rank Corr 0.684였다. 102,640개 LLM 피드백으로 학습한 모델은 bAcc 73.4%, Pearson Corr 0.625, Rank Corr 0.865로 인간 피드백보다 우수했다.

      세분화 수준별 소거 실험 결과: Binary Label만 사용 시 bAcc 73.0%, Pearson Corr 0.628, Rank Corr 0.649. Reasoning 추가 시 bAcc 71.9%, Pearson Corr 0.628, Rank Corr 0.825. Error Localization 추가 시 bAcc 73.4%, Pearson Corr 0.625, Rank Corr 0.865로 가장 높은 성능을 달성했다.

      데이터 규모 효과: 25% 데이터(25,660개)로도 5,853개 인간 피드백보다 높은 성능을 달성했다. 이는 5개의 LLM 피드백이 1개의 인간 피드백에 대응됨을 보여준다.

      ## 결론
      다양한 도메인 문서로부터 대규모 LLM 피드백을 생성하고, 이를 통해 요약문 평가 모델을 효과적으로 미세조정할 수 있음을 보였다. LLM 피드백의 세분화 수준 및 규모를 고려한 다양한 전략을 실험했다. LLM 피드백을 활용한 미세조정이 인간 피드백의 부족 문제를 해결하고, 자동화된 요약 평가 모델 학습에서 인간 피드백보다 적은 비용으로 성능을 향상시킬 수 있음을 보였다.
    relevance: |
      - **지식 증류 패러다임**: 대형 모델(Llama-3-70B)의 능력을 소형 모델(Llama-3-8B)로 증류하는 전략은 비용 효율적인 모델 개발의 핵심이다.
      - **데이터 비용 절감**: 5개의 LLM 피드백이 1개의 인간 피드백에 대응된다는 발견은 데이터 구축 비용을 크게 절감할 수 있는 가능성을 보여준다.
      - **세분화된 피드백의 가치**: 단순 이진 라벨보다 추론 근거와 오류 유형을 포함한 세분화된 피드백이 모델 성능을 크게 향상시킨다.
      - **다양한 소스 활용**: 10개의 서로 다른 모델로 요약문을 생성하여 다양한 오류 패턴을 포함한 학습 데이터를 만든 전략이 효과적이다.
      - **실용적 평가 지표**: bAcc, Pearson Correlation, Rank Correlation을 함께 사용하여 다각도로 성능을 평가한 것이 체계적이다.
    tips: |
      - **Teacher 모델 선택**: Llama-3-70B처럼 충분히 큰 모델을 teacher로 사용해야 고품질 피드백을 얻을 수 있다. 문장 단위 사실 검증에서 92%의 정확도가 기준점이 될 수 있다.
      - **피드백 세분화 전략**: 단순 정답 라벨 → 추론 근거 추가 → 오류 유형 추가 순으로 점진적으로 세분화하라. 각 단계마다 성능 향상을 측정하라.
      - **QLoRA 활용**: 메모리 효율적으로 8B 모델을 학습하려면 QLoRA가 필수다. 4개의 H100으로 10만 개 데이터를 학습할 수 있다.
      - **데이터 다양성**: 단일 모델보다 10개의 다양한 모델(Non-LLM, 오픈소스 LLM, 상업용 LLM)을 사용하면 다양한 오류 패턴을 학습할 수 있다.
      - **JSON 출력 형식**: 구조화된 출력을 위해 JSON 형식을 강제하라. 파싱이 쉽고 후처리가 간편하다.
      - **오류 분류 체계**: 9가지 오류 범주(NoE, OutE, EntE, PredE, CirE, GramE, LinkE, CorefE, OtherE)는 FineSurE의 검증된 분류다. 도메인에 맞게 수정할 수 있다.
      - **비용 효율성 계산**: LLM 피드백 5개 = 인간 피드백 1개라는 비율을 알면 예산 계획을 세울 수 있다.
      - **평가 지표 선택**: bAcc는 불균형 데이터에, Pearson은 연속 값 상관관계에, Rank는 모델 순위 평가에 적합하다. 모두 사용하라.
      - **데이터 규모 실험**: 100%, 50%, 25%, 12.5%로 데이터를 줄여가며 성능을 측정하면 필요한 최소 데이터량을 파악할 수 있다.
      - **논문 작성 팁**: 소거 실험(ablation study)으로 각 구성 요소의 기여도를 명확히 보여라. 인간 피드백과의 비교는 필수다.

  - venue: "KSC 2024"
    title: "생성형 AI의 암묵적 편향 완화를 위한 LLM 기반 학습데이터 자동 구축 방안"
    link: "https://www.dbpia.co.kr/journal/articleDetail?nodeId=NODE12041964"
    keywords: ["암묵적 편향", "CoT", "데이터 증강", "윤리 AI", "KoSBi", "GPT-4o"]
    md_file: "md-KSC/생성형 AI의 암묵적 편향 완화를 위한 LLM 기반 학습데이터 자동 구축 방안.md"
    abstract: |
      생성형 AI는 방대한 말뭉치로부터 학습된 데이터를 기반으로 요청에 대한 응답을 생성하기에 말뭉치 내 존재하는 집단의 편향, 개인의 편견, 잘못된 정보 등 사회, 윤리적으로 편향된 발화를 생성할 수 있다는 문제가 존재하며 이와 같은 문제를 해결하기 위한 범정부적, 기업적인 연구가 활발히 진행되고 있다. 하지만, 여전히 생성형 AI는 표면적으로 드러나지 않는 발화에 잠재되어있는 편향에 대한 대처에 여전히 한계가 존재한다. 본 논문에서는 생성형 AI에서 해소되지 않는 암묵적 편향에 대한 이해, 추론 능력 향상을 위한 학습데이터를 구축하기 위해 공개된 다종의 LLM을 통해 암묵적 편향 문장을 식별하고 CoT 형태의 학습데이터 생성을 통해 암묵적 편향 판단 능력이 24% 향상되었으며, 보편적 편향에 대해서도 20% 향상되었다.
    contents: |
      ## 서론
      생성형 AI는 방대한 학습데이터를 기반의 학습을 통해 다양한 유형의 컨텐츠를 생성하는 인공지능의 분야 중 하나이다. 대표적으로 OpenAI에서 발표한 생성형 AI 서비스인 ChatGPT는 다양한 산업과 업무 영역에서 활발히 활용되고 있으며 개인으로까지 그 영역이 확대되는 등 모든 분야에서 광범위하고 다양하게 사용되고 있다. 하지만, 생성형 AI는 방대한 학습데이터를 기반으로 학습되었기 때문에 학습데이터에 대한 무결성이 보장되지 않으며 이로 인한 다양한 문제들이 존재한다. 이 중 생성형 AI의 생성 결과에서 드러나는 편향에 대한 문제는 특정 방향에 치우치거나 윤리에 어긋나는 사회적으로 분란을 야기할 수 있는 답변을 생성하는 것을 의미하고 정부, 기업 측면에서 이를 해결하기 위한 다양한 연구와 노력이 진행되고 있다.

      편향성 완화를 위해 정부에서는 생성형 AI를 윤리적이고 생산적으로 활용하는 데 참고할 수 있도록 "생성형 AI 윤리 가이드북"을 발간하였으며, 기업에서는 레드티밍(Red Teaming)을 통해 생성형 AI의 취약점을 테스트하고 이를 사전에 완화하여 안전성과 신뢰성을 보장하기 위한 노력을 기울이고 있다. 하지만 여전히, 암묵적으로 잠재된 편향에 대한 생성형 AI의 위험성은 지속적으로 언급되고 있으며, 다양한 심리학 기반 프롬프팅, 다양한 융합 연구들이 제안되고 있다.

      본 논문에서는 생성형 AI에 잠재된 암묵적 편향을 완화하기 위해 다종의 생성형 AI를 통해 잠재편향 데이터를 식별하는 방안을 제안하고 식별된 잠재편향에 대응할 수 있는 학습데이터를 LLM을 기반으로 자동 생성하는 방안을 제안한다.

      ## 관련 연구
      생성형 AI의 사회/윤리적 편향을 완화하기 위한 다양한 연구들이 진행되고 있다. 특히, 생성형 AI 모델의 사회/윤리적 편향 완화를 위한 학습을 위해 인구통계학적 그룹을 반영한 한국 사회적 편견 데이터셋인 KoSBi 데이터셋을 생성형 AI를 활용하여 자동으로 구축하고 데이터셋을 공개하는 연구가 진행되었으며, 소수 집단에 대한 언급이 포함된 텍스트가 유해 텍스트로 탐지되는 허위 상관관계를 해결하기 위한 데이터셋인 ToxiGen 데이터셋을 생성 AI 기반으로 구축한 연구가 진행되었다.

      또한, 텍스트에 담긴 사회/윤리 편향성을 탐지하기 위해 데이터 내부에 존재하는 편향에 대한 특성을 추출하고 제거하는 연구가 진행되었으며, 사전학습된 언어모델의 편향성 완화를 위해 마스킹 프롬프트를 구축하고 빔서치를 통해 변형하여 마스크 위치에 대한 예측을 통해 편향을 탐지한 연구도 진행되었다. 하지만 기존 연구들에서 구축한 편향 판별 데이터와 편향 방법론은 특징에 근거한 단순한 분류 문제에 국한되어 있으며, 편향에 대해 설명 가능한 정보를 이해하고 추론 생성하지 못한다는 문제가 존재한다.

      ## 제안 방안
      본 논문에서는 텍스트의 표면적인 부분에서 나타나지 않지만, 내부 의미에 잠재된 편향이 존재하는 암묵적 편향을 완화할 수 있는 학습데이터를 자동으로 구축하는 방법을 제안한다. 또한, 암묵적 편향뿐만 아니라 보편적인 편향에 대한 일반화 성능 향상을 위해 CoT(Chain-of-Thought) 기반 편향 데이터 자동 증강을 수행하고 효용성을 입증한다.

      ### 암묵적 편향 후보 데이터셋 구축
      암묵적 편향이 내재되어 있는 편향 학습데이터 구축을 위해, 본 논문에서는 공개된 KoSBi 데이터셋을 수집하고 활용한다. KoSBi 데이터셋은 네이버에서 구축한 편향 데이터셋이며 내부에는 편향에 대한 유무(Safety/UnSafety)와 문장, 메타 데이터 등으로 구성되어 있다. 편향이 잠재된 암묵적 편향 데이터셋과 같은 경우 Safety, UnSafety로 레이블링 된 문장에 모두 들어있을 수 있으므로 레이블링 여부에 상관없이 모든 데이터를 활용한다.

      이와 같은 데이터들은 4가지 공개 LLM을 통해 편향 판단 프롬프트를 통해 각 모델 별 편향 판단 결과를 생성하며 판단에 대한 찬반 여부가 반반인 경우, 해당 데이터셋을 암묵적 편향 후보 데이터셋으로 활용한다.

      ### LLM 기반 편향 완화 데이터셋 자동 증강
      암묵적 편향 완화 데이터셋 자동 증강을 위해 선별한 암묵적 편향 후보 데이터셋을 Few-shot으로 활용하고, GPT-4o 모델을 Teacher 모델로 활용하여 암묵적 편향 데이터를 증강한다. Teacher 모델의 판단 결과에 따라 편향 유무에 대한 최종적 판단을 수행한다. 증강된 암묵적 편향 데이터셋은 추론성능 향상을 위해 CoT 형태의 학습데이터로 구축한다. 구축된 프롬프트는 편향 문장에 대한 판별 지시문, 제공된 문장, 문장에 대한 편향 유무 추론 결과 및 편향 판단으로 구성되어 있으며 해당 구조를 통해 인간과 유사한 추론 생성 과정을 거치도록 학습시킬 수 있도록 하며 편향에 대한 이해 및 추론 생성 능력 향상하는데 기여할 수 있다.

      ### 보편적 성능 향상을 위한 데이터 자동 증강
      암묵적 편향을 잘 식별하기 위해서는 보편적인 편향에 대한 이해와 추론 능력이 뒷받침되어야 하며, 이를 위해 본 논문에서는 KoSBi 데이테셋의 Safety, UnSafety 데이터셋에 대해 CoT 형태의 학습데이터로 재생성한다.

      ## 실험 결과
      본 논문에서 제안한 암묵적 편향 학습데이터의 효용성을 입증하기 위해 Qwen2-7B 사전학습 모델을 기반으로 제안방안을 통해 구축한 학습데이터를 통해 학습을 수행하고 공개된 KoSBi 데이터셋과 비교 평가를 수행한다. 학습 데이터는 KoAlpaca (70,775개), KoSBi (54,393개), KoSBi_ours (CoT 기반 54,393개), Implicit_ours (암묵적 편향 10,301개)로 구성되었다.

      평가 결과: Baseline (KoAlpaca + KoSBi)은 Safety 66%, UnSafety 58%, Implicit 49%, 전체 57.67%였다. Ours 1 (KoAlpaca + KoSBi_ours)은 Safety 82%, UnSafety 74%, Implicit 64%, 전체 73.33%였다. Ours 2 (KoAlpaca + KoSBi_ours + Implicit_ours)는 Safety 85%, UnSafety 78%, Implicit 73%, 전체 78.67%를 달성하였다.

      평가 결과에 따르면, CoT로 편향에 대한 근거를 추가하여 구축한 데이터를 활용할 경우, 편향에 대한 전반적인 판단 능력이 향상되었으며, 암묵적 편향에 대한 학습데이터를 추가 학습하였을 때, LLM 모델들이 혼동하기 쉬운 편향에 대해 강건하게 대응하는 것을 확인할 수 있었다. 또한, 프롬프트에 대한 더 구체적인 표현 분석으로 편향 근거를 보다 명확하게 제시하고 있음을 알 수 있다.

      ## 결론
      본 논문에서는 생성형 AI의 사회/윤리적 능력을 향상하여 암묵적 편향에 대해 이해하고 추론할 수 있는 능력을 학습시키기 위한 학습데이터 자동 구축 방안을 제안하고, 공개 사전학습 언어모델의 지도학습 및 편향 평가를 진행하였다. 제안 방안을 통해 구축된 CoT 구조의 편향 학습데이터셋은 생성형 AI가 편향을 이해하고 추론하는 측면에서 Baseline보다 향상된 성능을 보였으며 특히, 구축한 암묵적 편향 데이터셋을 활용하였을 경우에는 다종의 언어모델들이 헷갈리는 편향 문제에 대해 강건하게 대처하는 결과를 보임으로써 제안 방안의 우수성을 입증하였다.
    relevance: |
      - **암묵적 편향의 정의와 중요성**: 표면적으로 드러나지 않는 잠재된 편향을 다루는 연구는 윤리 AI의 핵심 과제다. 명백한 편향보다 암묵적 편향이 더 위험할 수 있다.
      - **다중 모델 합의 방식**: 4개의 LLM이 2:2로 나뉘는 경우를 암묵적 편향 후보로 선정하는 방법은 모델들조차 판단이 어려운 경계 사례를 찾는 효과적인 전략이다.
      - **CoT 기반 데이터 구축**: 단순 라벨이 아닌 추론 과정을 포함하는 CoT 형태의 데이터는 모델이 편향을 이해하는 능력을 크게 향상시킨다.
      - **계층적 학습 전략**: 보편적 편향을 먼저 학습하고 암묵적 편향을 추가로 학습하는 2단계 접근은 효과적인 커리큘럼 학습 방법이다.
      - **실용적 성능 향상**: Implicit에서 24% (49%→73%), 전체 편향에서 20% (57.67%→78.67%) 향상은 실용적으로 의미 있는 수준이다.
    tips: |
      - **암묵적 편향 식별 전략**: 여러 모델의 판단이 엇갈리는 경우(2:2 split)를 찾는 것이 핵심이다. 모델들이 쉽게 판단하는 데이터는 학습 가치가 낮다.
      - **Teacher 모델 선택**: GPT-4o 같은 최고 성능 모델을 teacher로 사용하라. 편향 판단은 미묘한 의미 이해가 필요하므로 성능이 중요하다.
      - **CoT 프롬프트 구조**: "판별 지시문 → 제공된 문장 → 추론 과정 → 최종 판단" 순서로 구성하라. 이 순서가 인간의 사고 과정과 유사하다.
      - **데이터 균형**: KoSBi Safety/UnSafety 데이터(54,393개)로 기본 능력을 먼저 학습하고, 암묵적 편향(10,301개)을 추가하는 순서가 중요하다.
      - **평가 데이터 구축**: 4개 LLM의 2:2 판단 + GPT-4o 최종 판단 + 3명의 작업자 검증으로 고품질 평가셋을 만들라.
      - **모델 크기 선택**: Qwen2-7B는 편향 판단에 적절한 크기다. 너무 작으면(1B~3B) 미묘한 편향을 못 잡고, 너무 크면(70B+) 학습 비용이 과도하다.
      - **레드티밍 연계**: 이 방법으로 구축한 데이터는 레드티밍 과정에서 발견되는 취약점을 보완하는 데 활용할 수 있다.
      - **다양한 편향 유형**: 성별, 인종, 연령, 직업, 지역 등 다양한 편향 유형을 균형있게 포함하라. KoSBi가 좋은 출발점이다.
      - **설명 가능성 강화**: CoT로 "왜 편향인가"를 설명하면 사용자 신뢰도가 높아지고, 모델 개선 방향도 명확해진다.
      - **논문 작성 팁**: Baseline과의 비교를 Safety/UnSafety/Implicit로 세분화하여 제시하라. 각 유형별 성능 향상을 명확히 보여주는 것이 설득력을 높인다.

  - venue: "KSC 2024"
    title: "고품질 인스트럭션 데이터 구축을 위한 피드백 기반 합성데이터 생성 방법"
    link: "https://www.dbpia.co.kr/journal/articleDetail?nodeId=NODE12041957"
    keywords: ["합성 데이터", "인스트럭션 튜닝", "피드백 루프", "SFT", "Llama-3", "RAGEval", "MT-Bench"]
    md_file: "md-KSC/고품질 인스트럭션 데이터 구축을 위한 피드백 기반 합성데이터 생성 방법.md"
    abstract: |
      SFT(Supervised Fine-Tuning)는 대규모 언어 모델(LLM)이 지시사항을 정확하게 이해하고 이를 효과적으로 수행할 수 있도록 능력을 향상시키는 필수적인 과정이다. SFT에 필요한 인스트럭션 데이터셋을 자체 구축하는 것은 막대한 자원과 시간이 소요되기 때문에, 오픈 인스트럭션 데이터셋을 활용하는 경우가 많다. 하지만, 오픈 인스트럭션 데이터셋은 품질이 일관되지 않거나 편향된 데이터를 포함할 수 있기 때문에 모델 성능에 부정적인 영향을 미칠 수 있다. 따라서 본 논문은, 오픈 인스트럭션 데이터셋을 고품질 데이터셋으로 개선하기 위한 프레임워크를 제안한다. 이 프레임워크는 오픈 데이터셋의 컴플리션을 검증하고, 컴플리션을 재생성하는 과정을 포함하며, 특히 검증 단계에서 확보한 피드백을 활용하여 고품질 합성 데이터셋을 생성한다. 실험 결과, 제안한 프레임워크를 통해 구축된 데이터셋으로 학습한 모델이 RAGEval에서 36%, MT-Bench에서 26%의 성능 향상을 보였다.
    contents: |
      ## 서론
      대규모 언어 모델(Large Language Model)은 사용자 의도에 맞는 답변을 생성하기 위해 SFT 학습을 거치며, 다양한 자연어 처리 작업에서 뛰어난 성능을 입증해왔다. 최근 대규모 언어 모델들은 수십억 개의 매개변수를 바탕으로 높은 성능을 보이고 있으나, 이러한 성능은 충분한 인스트럭션 데이터가 뒷받침된다. 새로운 데이터셋 구축에는 상당한 비용과 시간이 소요되기 때문에, 많은 연구에서는 공개된 데이터셋을 활용하고 있다. 그러나 공개된 데이터셋은 낮은 품질의 데이터를 포함할 수 있으며, 예를 들어, Dolly 데이터셋은 오타와 사실적 오류가 존재하여 이를 학습한 모델이 부정확하거나 신뢰할 수 없는 답변을 생성할 가능성이 크다.

      이를 해결하기 위해 최근 합성 데이터(Synthetic data)를 이용하여 데이터 세트를 구축하는 연구가 활발하게 진행되고 있다. Self-instruct에서는 인스트럭션 데이터를 자체적으로 생성하여 수준 높은 인스트럭션 데이터셋을 구축하는 방식을 제시했다. Alpaca는 Self-instruct의 방식으로 52,000여개의 합성 데이터를 생성했다. 또한 GPT-4로 답변을 재생성한 고품질 데이터셋도 제안되었으나, 데이터의 품질과 다양성을 확보하기 위한 추가적인 검증과 자동 평가 시스템 구축이 여전히 필수적이다.

      제안하는 프레임워크는 기존 지시사항에 특정 규칙을 추가하여 고품질의 답변을 생성하고, 최대 3회까지 재생성을 시도한다. 제안된 재생성 프레임워크의 효과를 검증하기 위해 평가 도구인 RAGEval과 MT-Bench를 활용하여 생성 품질을 평가한 결과, 이 방법이 모델 성능과 학습 효율성을 향상시키는 데 효과적임을 확인했다.

      ## 제안 방법

      ### 지시사항 기반 답변 생성
      오픈 인스트럭션 데이터셋을 활용하여 질문에 맞는 고품질 답변을 생성하는 방식이다. 이 데이터셋은 질문과 답변 형식으로 구성되나, 답변에 오타나 오류가 있을 수 있어 프롬프팅 기법을 통해 지시사항을 개선한다. 이는 Consistency(일관성), Relevance(관련성), User-customized response(사용자 맞춤 응답), Accuracy(정확성), Neutrality(중립성) 규칙을 포함한다.

      ### LLM 검증 기반 답변 평가
      LLM 검증 기반 품질 평가는 생성된 답변의 규칙 준수 여부를 평가한다. 규칙을 준수하면 "answer"는 "o"로 표시되고, "reason"은 빈 값이 되어 SFT 학습 데이터로 사용된다. 규칙을 준수하지 않으면 "answer"는 "x", "reason"에는 평가 이유가 포함되며, 이후 피드백 기반 재생성 과정이 진행된다.

      ### 피드백 기반 답변 재생성
      규칙을 따르지 않은 경우에는 평가한 결과를 피드백으로 활용하여 답변을 재생성한다. 답변 재생성을 위한 프롬프트는 5가지 규칙과 함께 질문, 잘못 생성된 답변, 그리고 받은 피드백을 포함한다. 이를 바탕으로 규칙을 충실히 반영한 새로운 답변을 재생성한다.

      ## 실험

      ### 데이터셋
      Dolly 데이터셋은 LLM을 학습하기 위한 15,000개 이상의 데이터로 구성되어 있다. Dolly-Origin은 기존 Dolly 데이터셋을 의미하고, Dolly-Regen는 기존 지시사항과 컨텍스트만을 기반으로 생성한 답변을 활용한 데이터셋을 의미한다. 또한, Dolly-FB-Regen는 본 논문에서 제안한 방법(피드백 기반 재생성)으로 구축한 데이터셋이다.

      ### 모델 학습
      SFT 학습 데이터셋의 품질 차이에 따른 인스트럭션 튜닝 비교검증을 위해 메타에서 공개한 Llama-3.1-8B 모델을 사용한다. 실험에서는 이 모델을 base로 설정하고, Dolly-Origin, Dolly-Regen, Dolly-FB-Regen 데이터셋을 각각 학습했다. 인스트럭션 튜닝에 사용된 하이퍼파라미터는 global batch size 128, learning rate 1e-5이며, NVIDIA H100 80GB GPU 8장을 사용하여 학습을 진행했고, epoch는 2로 설정했다.

      ### 실험 결과 및 분석
      RAGEval과 MT-Bench 평가 도구를 사용해 모델 성능을 분석한다. RAGEval은 문서를 기반으로 질문에 대한 답변 정확성을 평가하며, MT-Bench는 싱글턴 및 멀티턴 대화에서 답변 생성 성능을 측정한다. 평가 결과, Dolly-FB-Regen 모델은 RAGEval에서 Dolly-Origin(0.61)보다 높은 0.83을 기록해 우수한 성능을 보였으며, 특히 IUQ 항목에서 Dolly-Origin(0.14) 대비 0.54로 향상됐다. 이는 문서 내 정답이 없는 경우 할루시네이션 없이 답변을 생성하지 않고 인식하는 능력이 개선되었음을 확인할 수 있다. 또한 MT-Bench 평가에서도 Dolly-FB-Regen은 Dolly-Origin(5.44)보다 높은 6.85를 기록하며 2턴 대화에서 성능 차이를 보였다.

      ## 결론
      본 논문에서는 저품질 인스트럭션 데이터 문제를 해결하기 위해 지시사항 기반 답변 생성, LLM 판단 기반 평가, 피드백 기반 재생성으로 구성된 프레임워크를 제안했으며, 이에 Dolly 데이터셋을 적용해 RAGEval에서 평균 36%, MT-Bench에서 26%의 성능 향상을 확인했다. 개선된 인스트럭션 데이터셋이 모델 성능 향상에 효과적임을 확인했으며, 향후 연구는 사용자 맞춤형 답변 생성에 초점을 맞출 예정이다.
    relevance: |
      - **피드백 루프의 중요성**: 단순 재생성이 아닌 평가 피드백을 활용한 재생성은 데이터 품질을 크게 향상시킨다. 최대 3회 재시도 메커니즘이 효과적이다.
      - **5가지 규칙 체계**: Consistency, Relevance, User-customized response, Accuracy, Neutrality는 고품질 답변의 핵심 요소를 잘 포착한다.
      - **오픈 데이터 정제 전략**: 처음부터 새로 구축하는 것보다 기존 오픈 데이터(Dolly)를 정제하는 것이 효율적이다. 많은 오픈 데이터가 품질 문제를 가지고 있다.
      - **IUQ 성능 향상**: Information Unanswerable Question에서 0.14→0.54로의 큰 향상은 할루시네이션 문제 해결의 핵심이다.
      - **다중 평가 도구**: RAGEval(문서 기반 정확성)과 MT-Bench(대화 능력)를 함께 사용하여 다각도 평가를 수행한 것이 체계적이다.
    tips: |
      - **5가지 규칙 프롬프트**: Consistency, Relevance, User-customized, Accuracy, Neutrality를 명시적으로 프롬프트에 포함하라. 이 5가지가 고품질 답변의 핵심이다.
      - **재생성 횟수**: 최대 3회 재생성을 시도하라. 3회 이상은 비용 대비 효과가 낮고, 1-2회는 충분하지 않을 수 있다.
      - **평가 자동화**: LLM을 판단자로 사용하여 "o"(통과) / "x"(재생성 필요) + "reason"(이유)를 자동 생성하라. 인간 평가보다 빠르고 일관적이다.
      - **데이터 선별**: 원본 Dolly 15,000개 중 정제가 필요한 것만 재생성하라. 이미 좋은 데이터는 그대로 사용하는 것이 효율적이다.
      - **Llama-3.1-8B 선택**: SFT에는 8B 크기가 적절하다. 3B는 너무 작고, 70B는 과도하다. 8B가 성능과 비용의 최적점이다.
      - **GPU 자원**: H100 8장, batch size 128, epoch 2가 표준적인 설정이다. H100이 없으면 A100 16장으로 대체 가능하다.
      - **RAGEval의 IUQ 지표**: 문서에 답이 없을 때 "모르겠다"고 답하는 능력(IUQ)은 할루시네이션 방지의 핵심 지표다. 반드시 측정하라.
      - **MT-Bench의 2턴 평가**: 1턴보다 2턴 대화에서 모델 차이가 더 크게 드러난다. 멀티턴 대화 능력이 실용성의 핵심이다.
      - **피드백 품질**: "reason" 필드의 품질이 재생성 품질을 결정한다. GPT-4 같은 강력한 모델을 평가자로 사용하라.
      - **논문 작성 팁**: CPL(Complete), HAL(Hallucination), IRR(Irrelevant)로 세분화한 RAGEval 결과를 표로 제시하라. 각 오류 유형별 개선을 명확히 보여주는 것이 설득력을 높인다.

  - venue: "KSC 2023"
    title: "한국어 대규모언어모델을 활용한 MMR기반 자가생성 In-Context Learning"
    link: "https://www.dbpia.co.kr/journal/articleDetail?nodeId=NODE11705350"
    keywords: ["ICL", "Self-generated", "MMR", "KULLM", "Zero-shot", "Few-shot"]
    md_file: "md-KSC/한국어 대규모언어모델을 활용한 MMR기반 자가생성 In-Context Learning.md"
    abstract: |
      대규모 언어 모델에서 In-context learning을 활용한 성능 향상이 이루어지고 있으나, 대부분의 사람들의 사용에 있어서 원하는 답과 관련된 예제를 모델에게 입력으로 주면서 사용하는 경우가 적다. 따라서 사용자가 입력만을 주어도 모델이 스스로 입력에 대한 생성을 하여 새로운 예제를 만들고, 이를 MMR 알고리즘 기반으로 입력과의 언어의 다양성이 높은 예제를 선택하여 모델의 성능을 향상하는 MMR 기반 자가 생성 In-context learning을 제안하고 Baseline과 비교하여 성능 향상을 보였다.
    contents: |
      ## 서론
      ChatGPT의 등장 이후 다양한 언어 모델들이 사람들의 일상에서 널리 사용되고 있다. 대다수의 사용자들은 특별한 예제를 제공하지 않고 단순한 입력만으로 결과를 얻기를 원한다. 그러나 대규모 언어 모델은 많은 연구들을 바탕으로 특정 예제들을 입력과 같이 제공하면 성능이 향상된다는 것이 알려져 있지만 그렇게 사용하지는 않는다. 이를 보완하기 위해 모델이 사용자의 입력과 질문을 분석하여 예제를 생성하고 생성된 예제들을 바탕으로 순위 재설정 후 In-context learning을 수행하면, 사용자의 요구에 더욱 정확하게 응답할 수 있을 것이다. 이러한 접근 방식은 모델의 성능을 더욱 향상시킬 수 있는 잠재력을 가지고 있다.

      본 논문에서는 자가 생성 In-context Learning 방식에 MMR(Maximal Marginal Relevance) 알고리즘을 적용하여 샘플을 선택하는 방식을 소개한다. 이 방식은 영어 데이터셋과 모델에 대해 이미 연구가 진행되었지만, 한국어에는 적용되지 않았으며, 모델이 입력을 바탕으로 새로운 내용을 생성하여 In-context learning을 수행하면 편향된 예제 생성 및 많은 생성 예제가 노이즈가 될 수 있다. 본 논문은 이러한 기존 방식의 문제점을 해결하기 위해 MMR을 활용한 순위 재설정 방식을 적용하여 생성 예제 중 입력 예제와 다른 값을 활용하는 방식으로 개선하며, 기존의 Baseline과 비교했을 때 일부 데이터셋에서 성능 향상을 확인할 수 있었다.

      ## 관련 연구

      ### 언어 모델
      자연어 처리 분야에서는 대용량 코퍼스를 활용한 사전학습 방식으로 훈련된 디코더 기반의 생성 모델들이 다양한 작업에서 뛰어난 성능을 보여주고 있다. 이와 같은 언어 모델 연구의 흐름에 따라, 국내에서도 한국어를 대상으로 한 대규모 언어 모델들도 개발되었으며, 이러한 모델들을 기반으로 추가적인 학습 및 연구가 활발히 진행되고 있다. 본 논문에서는 이 중 KULLM v2 모델을 활용하여 실험을 수행하였다.

      ### In-context learning
      In-context learning은 작업에 대한 예제나 시연이 프롬프트와 같이 주어져 미세조정 없이 모델이 새로운 작업을 수행할 수 있는 방법이다. 이에 대해 더 좋은 방법의 In-context learning을 수행하기 위한 여러 방법이 연구가 진행되었다. 각 샘플이 올바른 예측을 도출할 수 있는 예제 구성을 찾아 성능을 극대화 하는 방법에 대해 연구를 수행하였다. 모델이 입력에 대해 새로운 예제를 생성해내어 In-context learning을 수행하는 방법에 대해 연구를 하였다. 자가 생성과 관련된 연구에서는 제로샷보다 나은 성능을 보였다. 본 논문에서는 자가 생성을 통한 예제를 MMR 알고리즘을 사용한 방법을 바탕으로 한국어 모델에 적용 및 자가생성 In-context learning을 적용 및 MMR 알고리즘을 통한 선택 방법을 적용하였다.

      ## 방법

      ### 입력 형태
      제안된 방법에 대해 모델에게 입력에 대한 내용을 각각 분할하여 모델이 생성해낸 예제를 얻는다. Q는 질문, C는 내용이며 각각 Qgen, Cgen, Rgen는 Q, C를 바탕으로 모델이 생성해낸 답변이다.

      ### MMR을 활용한 re-rank 과정
      모델에 의해 생성된 예제들은 입력 값에 매우 가까우며, 그 결과 예제들이 특정한 값에 편향될 수 있다. 이를 보완하기 위해, 우리는 여러 개의 Qgen, Cgen, Rgen 예제를 생성하고, MMR 알고리즘을 활용하여 점수가 높은 예제들을 추출하여 In-context learning으로 사용하였다.

      모델이 제공한 테스트 입력을 기반으로 생성된 예제들은 동일한 원본 값에서 파생되었기 때문에, 이들 사이의 관련성은 자연스럽게 높다. 따라서 MMR 알고리즘을 통해 이러한 예제들 사이의 다양성이 높은 값을 In-context learning에 사용한다. MMR = λ × relevance − (1 − λ) × max similarity 공식으로 계산된다.

      ### 추론 과정
      MMR 알고리즘을 통해서 생성된 예제 간의 다양성이 높은 값을 바탕으로 In-context learning을 하게 된다. 생성된 예제들은 퓨샷 학습과 동일한 방법을 사용하여, 답변은 도출하게 된다.

      ## 실험

      ### 실험 설정
      본 논문에서는 자가 생성 in-context learning을 평가하기 위하여 kobest 데이터셋을 활용하여 한국어 boolq, hellaswag를 사용하였다. 각 데이터셋은 boolq는 주어진 내용과 질문을 바탕으로 질문의 진위여부를 선택하는 데이터셋이며, Hellaswag 데이터셋은 내용을 바탕으로 4가지의 선택지중 가장 적절한 결말을 선택하며 마지막으로 NSMC 감성 분류 평가 데이터셋을 이용하여 주어진 문장에 대한 감성 분류를 하는 실험을 진행하였다.

      언어 모델을 활용하여서 들어온 입력에 대한 예제들을 만들어 낸 뒤 MMR 알고리즘을 기반으로 다양성이 가장 높은 값을 선택해 In-context learning을 수행한다. 실험에서는 각각 3,5개를 생성해낸뒤 MMR 알고리즘으로 1,3개를 선택한다. 이때 MMR의 λ값은 0.5이며, 모든 생성의 temperature는 1.0으로 하여 실험을 진행하였다.

      ### 모델
      본 실험에서 사용이 된 모델은 Polyglot-ko을 기반으로 지시 학습을 한 모델인 Kullm v2(5.8b) 모델을 사용하여 진행하였으며, 실험에 사용된 모델은 공개가 되어 있는 한국어 지시학습이 진행된 모델이다. 본 연구에서는 추가적인 학습을 하지 않은 채 실험을 진행하였다.

      ### Baseline
      본 논문에서의 비교 대상은 제로샷을 이용한 방법과 퓨샷 학습을 사용하였다. 퓨샷을 진행하는데 있어서 예제를 1,3,5개를 주고 실험을 진행하였으며, 기존의 self-icl 방법과 비교를 진행하기 위해 3shot, 5shot을 주어 성능을 비교하였다.

      ### 실험 결과
      nsmc 및 boolq 데이터셋에서 제안 방식을 적용하면, 자가생성 예제를 모두 활용하는 전략과 퓨샷 방식보다 우수한 성능을 보였다. 이 결과는 본 논문의 방식을 통해 자가 생성된 예제가 입력 데이터와의 관련성이 높아, 랜덤하게 선택된 퓨샷 방식보다 좋은 생성을 할 수 있음을 보여준다. 또한, MMR 알고리즘을 활용하여 생성된 예제 중 문장 간 다양성이 높은 예제를 선택하여, 성능 향상을 할 수 있음을 보여준다.

      반면 Hellaswag 데이터셋의 경우 자가생성을 통한 결과가 제로샷 및 퓨샷보다 전반적으로 부족한 성능을 보여준다. 이는 해당 작업이 In-context learning에 대해 약한 모습을 보여주며, 퓨샷에서 예제 수에 따른 성능 추이에서도 알 수 있다. 그럼에도 불구하고 논문이 제안한 MMR알고리즘을 통해 선택한 경우 단순히 자가생성을 이용한 in-context learning을 하는 방법보다 높은 점수를 보여주고 있으며, 이는 자가 생성을 통한 퓨샷을 늘림으로써 성능을 향상하던 기존 방법과 달리 MMR알고리즘을 통한 예제 선택이 모든 예제를 사용할때보다 뛰어남을 보여준다.

      ## 결론
      자가 생성 방식의 In-context learning 방식을 한국어에 적용하여 일부 작업에서 제로샷에 비해 성능이 향상 될 수 있음을 보였으며, MMR알고리즘을 사용하여 예제를 선택함으로써 자가 생성된 예제간 가장 다양성이 높은 형태의 예제를 선택하여 in-context learning을 함으로써 성능이 향상 될 수 있음을 보여준다. 향후 연구는 자가 생성예제를 통한 in-context learning이 제로샷보다 부족한 데이터셋이 존재함에 따라 분석하고 더 나은 예제 생성 및 검색을 통해 in-context learning을 수행하는 방법론을 향후 연구하고자 한다.
    relevance: |
      - **사용자 경험 개선**: 사용자가 예제를 제공하지 않아도 모델이 자동으로 예제를 생성하는 것은 실용성을 크게 높인다. 대부분의 사용자는 적절한 예제를 만들 줄 모른다.
      - **MMR의 다양성 보장**: 자가 생성된 예제는 입력과 유사하여 편향될 수 있는데, MMR로 다양성을 확보하는 전략이 효과적이다. Relevance와 Diversity의 균형이 핵심이다.
      - **한국어 적용**: 영어 연구를 한국어에 적용한 것은 저자원 언어 연구의 좋은 사례다. KULLM v2 같은 한국어 모델 활용이 중요하다.
      - **작업별 성능 차이**: NSMC와 BoolQ에서는 성능 향상이 있지만 Hellaswag에서는 부족한 것은 In-context learning이 모든 작업에 효과적이지 않음을 보여준다.
      - **Zero-cost 성능 향상**: 추가 학습 없이 프롬프팅만으로 성능을 높이는 것은 비용 효율적이다.
    tips: |
      - **MMR 하이퍼파라미터**: λ=0.5를 사용했는데, 이는 relevance와 diversity를 동등하게 고려하는 설정이다. 작업에 따라 λ를 0.3~0.7 범위에서 조정하라.
      - **Temperature 설정**: Temperature=1.0으로 다양한 예제를 생성했다. 너무 낮으면(0.3) 비슷한 예제만 나오고, 너무 높으면(1.5) 무의미한 예제가 나온다.
      - **생성 개수**: 3개 또는 5개를 생성하고 1개 또는 3개를 선택했다. "생성 많이 → MMR로 필터링"이 핵심 전략이다.
      - **모델 선택**: KULLM v2 5.8B는 한국어 지시 학습 모델이다. Polyglot-ko 기반이므로 한국어 이해도가 높다.
      - **예제 분리 생성**: Q(질문), C(내용), R(답변)을 분리하여 생성하는 것이 효과적이다. 한번에 생성하면 일관성이 떨어질 수 있다.
      - **작업 선택**: BoolQ(이진 분류), Hellaswag(다중 선택), NSMC(감성 분류) 같이 다양한 작업에서 테스트하라. 모든 작업에 효과적이지 않을 수 있다.
      - **성능 한계 인식**: Hellaswag처럼 효과가 없는 작업도 있다. 이런 경우 퓨샷을 고집하지 말고 파인튜닝을 고려하라.
      - **KoBEST 데이터셋**: 한국어 평가를 위한 표준 벤치마크다. BoolQ와 Hellaswag은 영어 데이터의 한국어 번역본이다.
      - **MMR 공식 이해**: MMR = λ × relevance − (1 − λ) × max_similarity. 관련성은 높이고, 기존 선택과의 유사도는 낮추는 것이 목표다.
      - **논문 작성 팁**: 데이터셋별 성능 표를 명확히 제시하고, 성공한 작업과 실패한 작업을 모두 보여라. 실패 사례 분석이 연구의 신뢰도를 높인다.

