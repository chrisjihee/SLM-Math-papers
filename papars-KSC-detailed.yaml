    abstract: |
      본 논문에서는 숫자와 영어 단어 발음 변환에 관한 연구를 진행하였다. 숫자 변환에 있어서는 분류 모델을 활용하여 후처리 규칙을 적용, 데이터 조정에 유연하게 대응하여 99.8%의 높은 정확도를 달성하였다. 영어 변환의 경우, 영어 단어와 한국어 발음 데이터를 기반으로 DB를 구축하였고, 해당 DB에 없는 단어에 대해서는 Transformer 모델을 사용하였다. Transformer 모델은 PER 측면에서는 기존의 Seq2Seq 모델보다 더 뛰어난 성능을 보였다. 실생활에 자주 사용되는 문장 데이터를 활용한 평가 역시 숫자와 영어 변환 모두에서 높은 성능을 보였다.
    contents: |
      ## 서론
      음성 합성 시스템(Text-To-Speech: TTS)은 텍스트 정보를 음성으로 변환하는 기술로, 최근 딥러닝 기술의 발전으로 TTS 시스템은 사람과 유사한 수준의 음성을 생성할 수 있게 되었다. 그러나, 음성 합성의 정확성과 자연스러움은 여전히 연구의 주요 과제로 여겨지고 있다. 특히, 다양한 언어와 방언, 그리고 비표준어 처리는 TTS 시스템의 중요한 연구 분야이다.

      G2P(Grapheme-to-Phoneme)는 이러한 문제를 해결하기 위한 기술적 접근 방식 중 하나로, 텍스트의 발음을 정확하게 예측하여 TTS 시스템의 출력 품질을 향상한다. 한국어는 그 구조와 발음 특성상 G2P 전처리가 특히 중요하다. 한국어의 다양한 발음 규칙과 예외 사항을 처리하는 것은 TTS 시스템의 성능을 크게 향상할 수 있다. 또한, 한국어에서는 숫자, 외래어의 발음 처리가 필수적이며, 이는 G2P의 전처리를 통해 비한글을 한글로 바꿔주는 전처리를 통해 해결할 수 있다.

      한국어에서 숫자의 발음은 문맥에 따라 달라진다. 예를 들면, 숫자'10'은 [십, 열, 텐] 등 다양하게 발음될 수 있다. 이를 규칙 기반으로 처리할 경우 동일한 단위명사지만 문맥에 따라 다르게 읽히는 경우 처리하는데 한계를 가진다. 따라서, 머신러닝 기반의 접근 방식을 통해 문맥을 파악하고 적절한 발음을 도출하는 게 효과적이다.

      외래어 발음의 정확한 처리는 또 다른 중요한 과제이다. 특히, 영어는 한국어 발음에 통합되면서 다양한 변화를 겪게 된다. 예를 들어 tomato를 영어 발음대로 읽게 되면 [터메이토우]로 읽히게 되어 실제 한국인 발음과는 달라져 어색하게 들려진다. 영어를 한글 발음에 맞게 [토마토]로 전처리하는 작업이 필요하다. 따라서, 영어 단어를 한글 발음으로 정확히 변환하는 DB 구축이 필요하며, DB에 없는 OOV(Out-Of-Vocabulary) 단어 처리를 위해 딥러닝 모델인 Transformer 모델을 사용한다.

      본 논문에서는 비한글의 문자를 한글로 적절히 전처리 하는 통합 프레임워크를 제안한다.

      ## 관련 연구
      G2P의 비한글 전처리에서 가장 주요한 대상은 숫자와 영어가 대표적이다. 숫자의 발음열 전처리에 대한 접근 방법은 크게 규칙 기반과 딥러닝 기반의 두 가지 방식이 있다. 규칙 기반의 모델은 미리 정의된 규칙에 따라 텍스트를 발음열로 변환한다. 이 방식은 기본적인 규칙을 빠르게 적용할 수 있는 장점이 있지만, 문맥에 따라 변환하는 발음을 정확하게 예측하기 어렵다. 특히 동일한 단위 명사라 할지라도 다양한 문맥에서 다르게 발음될 수 있어 처리의 한계를 보인다. 또한, 규칙과 예외 사항을 처리하기 위해선 언어의 전문적인 지식 또한 필요하다. 반면, 딥러닝을 활용한 방식은 문맥을 파악하여 발음의 중의성 문제를 해결하고 전문적인 언어의 지식이 필수적이지 않다.

      하지만, 딥러닝의 경우 기존 연구에선 RNN으로 텍스트를 전처리할 경우 의미론적 클래스 즉, 숫자, 시간, 날짜 등에서 예측이 잘못되는 경우가 많았다. 특히'381 kg'와 같이 숫자가 입력으로 들어올 경우 '삼백팔십일 킬로그램'으로 예측 되는게 아닌'삼백사십일 킬로그램'처럼 완전히 다른 숫자로 변환되는 경우가 존재한다. 이는 TTS 시스템에 매우 치명적이므로 딥러닝 기반 G2P에선 비한글인 숫자와 영어를 전처리를 통해 한글로 변경할 필요가 있다.

      숫자 변환에서의 딥러닝 방식은 Transformer 모델을 활용하거나, 발음을 분류 문제로 판단하고 처리하는 방식으로 나뉜다. 본 논문에서는 분류 방식을 사용하며, 후처리 과정을 통해 균일성과 성능을 높인다.

      영어 단어를 한글 발음열로 변환하는 방식에는 주로 규칙 기반이 많이 활용되었다. 규칙 기반 방식은 영어 단어의 형성 정보나 구조를 기반으로 한글 발음을 예측한다. 그러나 영어와 한국어의 발음 체계의 차이와 다양한 예외 사항들로 인해 이 방식만으로는 복잡한 발음 변환 문제를 완벽하게 해결하기 어렵다. 그래서, 본 논문에서는 영어와 한글 발음열 데이터에 대해 DB를 구축하여 영어를 한글 발음열로 변환해 준다. 또한, DB에 없는 OOV 단어일 경우 Transformer 모델을 이용하여 영어를 한글 발음열로 변환해 주는 작업을 진행한다. 이렇게 복합적인 방법론을 사용함으로써, 한글 발음 변환의 정확도와 효율성을 높이는 것을 목표로 한다.

      ## 데이터셋
      본 논문에서는 다양한 출처의 데이터셋을 활용하여 딥러닝 모델의 학습 및 검증을 진행하였다. 숫자 데이터에 대해서는 AI-Hub에서 공개된 '숫자가 포함된 패턴 발화 데이터셋'을 활용하였다. 해당 데이터는 기존 논문에서 제시된 레이블링 기준을 바탕으로 재구성하였다. 학습 데이터는 201,348개, 검증 데이터는 25,169개, 테스트 데이터는 25,169개로 이루어진다.

      영어 데이터는 기존에 공개된 데이터가 없어 다양한 출처에서 수집하였다. 우리말샘(21,088개), 부산대 외래어 한글 표기 상호변환기(7,395개), AI-Hub 외래어 발화 데이터(3,934개), 인터넷 공개 데이터(30,868개)로 중복 제외 총 42,418개의 데이터를 우리말샘 DB로 저장하고 해당 데이터로 Transformer 모델을 학습한다.

      데이터가 충분하지 않은 부분을 보완하기 위해, IPA-Dict를 활용하여 영어의 국제 음성 기호(IPA)를 한글 발음으로 변환하는 작업을 진행하였다. 국제 음성 기호를 한글로 변환하는 작업은 영어의 표기 '제3장 표기 세칙'을 적용하여 총 135,006개의 IPA DB를 구축하였다.

      ## 시스템 모델
      비한글 전처리의 전체 시스템의 흐름은 다음과 같다. 입력 문장 전처리: 입력된 문장에서 특수문자 패턴을 인식한다. 특정 패턴에 속하는 문자는 그에 해당하는 규칙에 따라 처리되며, 그 외의 특수문자는 시스템에서 제거한다. 패턴에는 '℃, Å, ...' 등의 단위 혹은 '2023.10.31.' 같은 날짜 패턴들을 한글로 바꿔주거나 삭제한다.

      숫자 발음 예측: 전 처리된 문장은 CNN+BiLSTM 기반의 분류 모델에 입력된다. 이 모델은 문장 내의 숫자에 대한 발음열을 예측하며, 숫자를 해당 한글 발음열로 변환한다. CNN+BiLSTM의 조합은 문장 내의 숫자의 문맥을 파악하며 정확한 발음을 예측하는 데 도움을 준다.

      영어 단어 처리: 문장에 영어 단어가 포함되어 있으면, 먼저 우리말샘과 다양한 출처에서 수집된 데이터를 활용한다. 이 데이터는 DB화되어 있어, 영어 단어를 한글 발음으로 변환하는데 활용된다. 만약 특정 영어 단어가 DB에 존재하지 않을 경우, IPA 변환 기법을 활용하여 만든 IPA-Dict DB 데이터를 이용한다. 마지막으로, 여전히 변화되지 않은 단어 OOV는 Transformer 모델을 통해 처리된다.

      ## 실험 및 결과
      본 논문에서는 숫자와 영어 단어의 발음 변환 성능을 실험하였다.

      숫자 변환 성능: 실험 결과, 숫자 변환의 정확도는 99.25%를 기록하였다. 특히, '개, 건, 봉'과 같은 고유어 발음이 필요한 단위 명사가 포함될 때, 규칙을 적용하여 후처리를 통해 일관성 있는 답을 출력하게 한다. 이는, Sequence-to-Sequence 방식에서는 따로 후처리하기 힘든 예외 사항을 극복하였다. 또한, 한 문장 안에 동일한 단위 명사가 여러 개 들어올 경우, 각 숫자마다 다르게 분류되는 경우가 존재했다. 이를 위해, 동일한 단위 명사가 들어오면 이전에 처음 예측한 레이블로 분류되게 하여, 일관성 있는 출력이 나오게 후처리 하였다.

      영어 변환 성능: WER(Word Error Rate)과 PER(Phoneme Error Rate)를 기준으로 Transformer와 Sequence-to-Sequence 모델을 비교하였다. WER은 단어 단위의 에러율을 의미하며, 본 실험에서는 모든 입력이 단어이므로 단어의 정확도를 평가할 수 있다. PER은 음소 단위의 에러율을 의미한다. Transformer의 파라미터는 기존 논문을 참고하였다. 결과로 보아, Transformer 모델은 WER 면에서는 Seq2Seq 모델과 유사한 성능을 보이지만, PER에서는 Transformer의 성능이 훨씬 우수하다는 것을 확인할 수 있다. (Transformer: WER 39.81%, PER 15.20%; Seq2Seq: WER 39.91%, PER 23.16%)

      최종 모델의 성능 평가는 일상에서 많이 쓰이는 데이터를 바탕으로 진행하였다. KT 인공지능 스피커에서 수집한 텍스트와 그에 상응하는 발음열로 구성되어 있으며, 이 중에서도 숫자나 영어가 포함된 데이터로 성능 평가를 진행하였다. 먼저, 숫자가 포함된 문장 300개를 분석한 결과, 이 중 514개의 숫자가 포함되어 있다. 그중 숫자 변환 과정에서 오류가 발생한 경우는 단 1회뿐이었다. 이에 따라, 숫자 변환의 정확도는 대략 99.8%로 이전에 측정된 숫자 변환 분류 성능보다 소폭 상승하였다.

      영어가 포함된 문장 300개에서는 총 359개의 영어 단어가 발견되었으며, 그중 9개의 단어에서 변환 오류가 발생하였다. 이에 따라, 영어 변환의 정확도는 97.49%의 성능을 가진다. 영어 변환 모델이 어떠한 원천 데이터를 바탕으로 변환되는지를 나타낸 결과, 우리말샘 DB를 기반으로 한 변환 비율이 84%로 가장 높게 나타났으며, 그다음으로는 Transformer 모델(13.58%)이 차지하였다. IPA-Dict DB(2.3%)는 주로 영어 단어 위주로 구성되어 있어, 일반적인 한국어 문장에서는 그 활용도가 상대적으로 낮게 나타났다.

      변환 과정에서 발생한 영어 단어의 오류 원인을 분석한 결과, 대부분은 고유 명사나 'WHO(더블유에이치오, 후)'와 같이 대문자로 구성되면서 동시에 일반 영어단어로도 인식될 수 있는 단어들이었다. 그 외의 경우에는 띄어쓰기나 맞춤법 오류로 인한 변환 실패가 주된 원인이었다.

      ## 결론
      본 논문에서는 숫자와 영어 단어의 발음 변환 성능에 관해 탐구하였다. 숫자 변환 성능을 측정한 결과, 분류 방식에 후처리 한 모델은 99.8%의 높은 성능을 달성하였다. 복잡한 고유어 발음 규칙을 성공적으로 극복하였으며 기존 분류 방식보다 성능을 소폭 향상한 것을 알 수 있다. 영어 변환 성능도 우수한 결과를 보여주었다. Transformer 모델은 WER에서는 Sequence-to-Sequence 모델과 큰 차이가 없었지만, PER에서는 더 뛰어난 성능을 보였다. 이는 Transformer 모델이 단어의 구조와 음소를 더욱 정밀하게 고려한다는 것을 시사한다. 또한, 실생활에서 흔히 접할 수 있는 데이터를 활용한 성능 평가에서도 높은 정확도를 보였다. 특히, 영어 변환에서 발생한 오류의 주요 원인은 고유 명사나 대문자로 구성된 단어의 변환 문제였다. 마지막으로, 영어 모델이 어떤 원천 데이터가 주로 활용되는지를 분석하였고, 우리말샘 DB와 Transformer 모델이 주요 변화 원천으로 활용된다는 것을 확인하였다. 이러한 결과는 제안된 시스템이 한글 발음 변환 작업에서 효과적이라는 것을 입증한다.
    relevance: |
      - **TTS 전처리의 중요성**: 숫자와 영어의 정확한 한글 발음 변환은 TTS 시스템의 자연스러움을 결정한다. 전처리 품질이 최종 음성 품질을 좌우한다.
      - **분류 + 후처리 전략**: 딥러닝 분류 모델에 규칙 기반 후처리를 결합한 하이브리드 접근이 효과적이다. 각각의 장점을 활용할 수 있다.
      - **다단계 폴백 메커니즘**: 우리말샘 DB → IPA-Dict DB → Transformer 모델로 순차적으로 시도하는 폴백 전략이 OOV 문제를 효과적으로 해결한다.
      - **PER vs WER**: PER(음소 오류율)이 WER(단어 오류율)보다 TTS에서 더 중요한 지표다. 완전히 틀린 것보다 부분적으로 유사한 것이 낫다.
      - **실제 데이터 평가**: KT 스피커 데이터로 실생활 성능을 평가한 것이 실용적이다. 벤치마크 데이터만으로는 실제 성능을 알 수 없다.
    tips: |
      - **CNN+BiLSTM 구조**: 숫자 문맥 파악에는 CNN(로컬 패턴)과 BiLSTM(시퀀스 관계)의 조합이 효과적이다. Attention은 과도할 수 있다.
      - **후처리 규칙**: "개, 건, 봉" 같은 고유어 단위명사는 규칙으로 처리하라. 같은 문장 내 동일 단위명사는 일관되게 처리해야 한다.
      - **우리말샘 우선**: 42,418개의 우리말샘 DB가 84%를 커버한다. 가장 먼저 시도하고, 없으면 다음 단계로 넘어가라.
      - **IPA-Dict 활용**: 135,006개의 IPA 기반 DB는 희귀 영어 단어용이다. 일상 대화에서는 2.3%만 사용되지만, 특수 도메인(의학, 화학)에서 유용하다.
      - **Transformer 파라미터**: 영어 G2P에 검증된 파라미터를 사용하라. 처음부터 튜닝하지 말고 기존 연구를 참고하라.
      - **특수문자 전처리**: '℃, Å, 2023.10.31.' 같은 패턴은 규칙으로 먼저 처리하라. 딥러닝 모델에 넘기기 전에 정제하는 것이 효율적이다.
      - **고유명사 문제**: 'WHO'가 "후"인지 "더블유에이치오"인지는 문맥이 필요하다. 대문자 판별 규칙을 추가하거나, 도메인별 사전을 구축하라.
      - **99.8% vs 97.49%**: 숫자(99.8%)가 영어(97.49%)보다 높은 것은 숫자가 문맥 의존적이지만 패턴이 제한적이기 때문이다. 영어는 예외가 많다.
      - **PER 15.20% vs 23.16%**: Transformer가 Seq2Seq보다 PER에서 8%p 낮다. TTS에서는 이 차이가 크게 들린다. Transformer를 우선 사용하라.
      - **논문 작성 팁**: WER과 PER을 모두 제시하고, 실제 사용 데이터(KT 스피커)로 평가한 결과를 강조하라. 실용성을 입증하는 것이 중요하다.

