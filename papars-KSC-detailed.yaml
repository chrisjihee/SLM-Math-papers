    abstract: |
      ARC 문제는 예제를 이용하여 문제 입출력 간의 논리적 관계를 추론하는 문제이고, 각 ARC 문제는 각기 다른 논리적 관계를 가지고 있다. 따라서 인공지능이 ARC 문제 해결을 위해서는 입출력 간의 논리적 관계를 이해할 수 있어야 한다. 예제의 양이 적은 상황 속에서, 많은 인공지능 모델은 논리적 관계를 추론하는 것에 어려움을 겪고 있다. 그러므로 논리적 관계 추론의 바탕이 되는 예제를 추가로 생성할 필요가 있다. 본 연구에서는 예제를 추가적으로 생성하기 위해 대형 언어 모델이 가진 추론 능력을 활용하고자 하며, 데이터 증강을 위한 방법으로 「문제 분류 및 입력 예측」을 제안하고 그 결과를 제시한다.
    contents: |
      ## 서론
      2020년에 공개된 ARC(Abstraction and Reasoning Corpus) 데이터셋은 인공지능의 일반화된 지능을 평가하기 위한 것이다. 이 데이터셋은 객체 추론, 기하학적 능력을 측정하기 위한 문제들로 구성되어 있다. 각 문제는 3개 내외의 예제와 시험 문제로 이루어져 있으며, 예제 문제를 이용하여 ARC 문제의 논리적 관계를 파악하고, 시험 문제의 출력을 예측하는 문제이다. 하지만 예제의 양이 적어 논리적 관계를 추론하는 것에 어려움을 겪고 있다. 따라서 본 연구에서는 논리적 관계 추론의 바탕이 되는 예제를 추가로 생성하는 효율적인 방법에 대해서 논하고자 한다.

      선행 연구에 따르면, GPT-4.0 모델과 같은 대형 언어 모델은 ARC 문제의 논리적 관계를 추론에 어려움을 겪고 있다. 이러한 상황을 고려하면, 대형 언어 모델이 ARC 문제를 해결하는 것을 기대하기는 어렵다. 또한, 복잡한 추론을 이해하고 정확한 연산을 요구하는 상황에서, 트랜스포머 기반의 대형 언어 모델(LLM)의 성능이 급격하게 감소한다고 알려졌다. 하지만 프롬프팅 기법을 적절하게 활용한다면, ARC 문제의 답과 유사한 결과를 얻을 수 있음을 확인할 수 있었다. 또한, 유사한 답도 정답으로 인정할 수 있는 관대한 평가 기준을 적용한다면, 대형 언어 모델을 유용하게 활용할 수 있다는 연구 결과가 있다. 따라서 본 연구에서는 대형 언어 모델을 통한 ARC 예제 증강 가능성에 관해서 확인하고자 한다.

      ## ARC 문제 데이터 증강

      ### ARC 유형 분류 필요성
      본 연구에서는 각 ARC 문제별로 주어지는 퓨샷 예제 데이터를 추가적으로 생성하기 위해서 대형 언어 모델을 활용하였다. 데이터 생성을 위해서는 대형 언어 모델의 추론을 도울 수 있는 적절한 프롬프트를 작성해야 한다. 더욱 정확한 프롬프트를 작성하기 위해서 ARC 문제를 유형별로 분류한 후, 유형에 따라 프롬프트를 작성하였다. 유용한 프롬프트를 작성하기 위해서는 먼저 합리적인 기준을 통해서 문제 유형을 분류해야 했다. 하지만 각 문제는 서로 다른 논리적 관계를 가지고 있기에 명확한 분류 기준을 찾는 것은 어려웠다. 따라서 본 연구에서는 이미 분류 체계가 확립된 ConceptARC 데이터셋으로 기존의 ARC 문제를 대체하여 실험을 진행하였다. ConceptARC는 분류 체계에 맞추어 새롭게 생성된 ARC 문제들로 이루어져 있으며, 총 16가지 유형이 존재한다. 이렇게 분류된 유형을 바탕으로 프롬프트를 작성하여 ARC 예제 데이터를 증강하였다.

      ### ARC 예제 증강 방법
      ARC 입출력의 다대일 대응 관계: ARC 예제 증강을 하기에 앞서, ARC 문제의 특성을 파악해야 한다. 많은 ARC 문제는 여러 개의 입력과 한 개의 출력이 대응되는 다대일 대응 관계가 성립한다. 따라서 출력을 통해 입력을 예측하는 것은 입출력 쌍을 추가적으로 생성하는 것을 가능하게 하며, 다양한 답변이 가능하므로 관대한 평가 기준을 적용할 수 있다.

      논리적 관계 추론을 돕기 위한 프롬프트: 우리는 대형 언어 모델 중 하나인 GPT 계열의 모델을 활용하였다. 현재 GPT 계열의 모델은 ARC 문제의 논리적 관계를 추론함에 있어서 어려움을 겪고 있다. 따라서 대형 언어 모델이 논리적 관계를 유추할 수 있도록 추가적인 프롬프트를 작성해 주어야 했다. ConceptARC 유형에 따라 프롬프트를 다르게 작성해 주었다. 프롬프트는 출력에서 입력을 예측하는 것에 도움을 줄 수 있는 프롬프트(역변환 방법, 출력 → 입력)를 작성했다. 예를 들어, Above and Below 유형은 "수평 기준선의 위아래를 주의 깊게 살핀 후, 그 변화 방법을 적용해 보아라.", Center 유형은 "가운데에 있는 것을 움직이거나 제거됐는지를 확인하라. 예시를 통해서 확인할 수 있다."와 같은 방법으로 역변환 방법에 대한 프롬프트를 영문으로 제공했다.

      예제 증강 과정: 예제 증강 과정에서는 Above and Below 문제의 예제를 증강하는 과정을 보여준다. 우리는 문제의 입출력을 2차원 배열로 대형 언어 모델에 전달해 주었다. 두 번째 예제는 출력만 보여주었고, 나머지 예제(이 경우에는 첫 번째와 세 번째 예제)는 입출력 쌍을 보여주었다. ARC 문제의 논리적 관계를 추론하기 위한 역변환 프롬프트는 Above and Below 유형에 해당하는 "수평 기준선의 위아래를 주의 깊게 살핀 후, 그 변화 방법을 적용해 보아라."를 사용했다. 이 정보들을 토대로 두 번째 예제의 입력을 추론토록 하여 새로운 입출력 쌍을 생성하였고, 이 과정을 나머지 예제(이 경우에는 첫 번째 예제와 세 번째 예제)에도 반복하였다.

      ### 증강된 예제 정의
      특정 ARC 문제를 T라고 하자. T는 n개의 예제로 구성되어 있다. 각 예제 d는 입력 x와 출력 y로 구성되어 있다. T에 속하는 모든 예제 d는 유일한 해결법 f가 존재한다. 문제 T에 대해 제안된 방법으로 생성된 예제 d̃의 집합을 TG라 하자. TG의 원소 d̃가 f에 의해 해결된다면, d̃는 유효하게 증강된 예제이다.

      ## 실험

      ### 실험 결과
      실험은 GPT-4.0 32k (temperature 1.0)를 사용하여 증강하였다. 적절하게 증강한 경우도 있었지만, 509개의 데이터를 증강했고 87개가 유효한 데이터였다. 하지만 입력을 정확하게 예측하지 못하는 경우도 빈번하게 발생하였다. 실험을 통하여 생성되는 데이터 대비 약 17.1%의 비율로 유효한 데이터가 증강됨을 확인할 수 있었다. LLM에 몇 개의 데이터를 요구하느냐에 따라 증강되는 데이터의 수는 변화될 수 있으므로 이러한 성질을 잘 활용한다면, 원하는 양의 데이터를 증강할 수 있으리라 생각한다.

      ### 실험 결과 분석
      같은 Complete Shape 유형의 문제임에도, 입출력 쌍의 문제 해결법은 모두 상이함을 알 수 있다. 상이한 프롬프트를 보편적으로 설명할 수 있는 하나의 프롬프트를 작성하니 프롬프트가 추상화되어 역변환 방법을 적절하게 설명할 수 없었다.

      결과 1. 예시 입력을 이용한 추론 결과: 예시를 그대로 가져오는 현상을 방지하기 위해 네거티브 프롬프팅 기법을 적용했음에도, 예시의 입출력 쌍의 입력을 변형하여 출력하는 사례도 다수 확인할 수 있었다.

      결과 2. 대형 언어 모델의 잘못된 추론 결과: 기존의 d를 해결하는 방법인 f를 통해서 문제를 해결할 수 없는 경우도 찾을 수 있었다. 이러한 경우는 f로 증강된 예제 d̃를 해결할 수 있는지 확인하는 모델이 등장하기 전까지는 사람이 직접 개입하여 선택할 수밖에 없다.

      결과 3. 일대일 대응으로 인한 증강 불가: 우리는 데이터 증강을 위해 입출력 쌍의 다대일 관계를 활용했다. 하지만 문항에 따라서 입출력 관계가 일대일 대응인 경우에는 본 연구에서 제안한 방법을 통하여 예제를 증강하는 것이 불가능하다.

      ## 결론
      본 연구는 입출력이 다대일 대응에 해당하는 ARC 문제는 대형 언어 모델을 통해서 데이터 증강이 가능함을 확인하였다. 프롬프트와 대형 언어 모델을 활용한 본 증강 방법을 추가로 개선한다면, 더욱 다양한 데이터를 얻을 수 있으리라 생각한다. 추후에는 ConceptARC을 벗어나, 모든 ARC의 예제를 증강하고자 하며, 이를 위해서는 아래와 같이 세 부분에서 개선이 필요하다. 먼저 이 연구에서는 생성된 데이터의 사용 가능성 유무를 사람이 직접 수행하는 방법을 사용했다. 그러나 이러한 수작업은 분류하는 사람에 따라서 주관적으로 선택될 우려가 있다. 따라서 향후 연구에서는 대형 언어 모델이 잘못 추론한 결과를 명확한 기준을 통해서 식별할 필요가 있으며, 수작업을 줄이기 위해서 자동으로 필터링할 수 있는 모델을 설계할 필요가 있다. 다음으로는, 명확한 분류 체계가 갖추어져 있지 않은 ARC 문제에 제안한 방법을 적용하기 위해서는 ARC 문제의 분류 체계를 확립해야 한다. 따라서 ARC 문제 분류를 위한 연구가 추가적으로 필요하다. 마지막으로, 현재 연구는 각 문항에 대한 출력이 고정된 상태로 증강된다는 한계점을 가지고 있다. 향후 연구에서는 새로운 출력을 생성할 수 있는 방법에 관해 연구할 필요가 있다.
    relevance: |
      - **퓨샷 데이터 증강의 필요성**: ARC는 예제가 3개 정도로 매우 적은데, 이를 증강하는 것은 추론 문제 해결의 핵심이다. 퓨샷 학습 상황에서 데이터 증강은 보편적 과제다.
      - **다대일 대응 활용**: 여러 입력이 하나의 출력에 대응되는 특성을 역으로 활용(출력→입력 예측)하여 데이터를 증강하는 아이디어가 창의적이다.
      - **ConceptARC의 활용**: 분류 체계가 없는 원본 ARC 대신 16가지 유형으로 분류된 ConceptARC를 사용한 것은 실용적 선택이다. 분류 없이 프롬프트를 작성하기 어렵다.
      - **역변환 프롬프트**: "출력 → 입력"으로 추론하도록 유형별 맞춤 프롬프트를 작성한 것이 효과적이다. Above and Below는 "수평 기준선 확인", Center는 "가운데 변화 확인" 등.
      - **17.1% 유효 비율**: 증강된 데이터의 17.1%만 유효하다는 것은 낮아 보이지만, 대형 모델로 대량 생성이 가능하므로 실용적이다. 100개 생성하면 17개 획득.
      - **한계 인식**: 네거티브 프롬프팅을 해도 예시를 복사하는 문제, 잘못된 추론, 일대일 대응 문제 등 한계를 명확히 인식하고 제시한 것이 연구의 신뢰도를 높인다.
    tips: |
      - **ConceptARC 우선 사용**: 원본 ARC는 분류가 없어 프롬프트 작성이 어렵다. ConceptARC의 16가지 분류(Above and Below, Center, Complete Shape 등)를 활용하라.
      - **역변환 프롬프트 작성**: "정변환(입력→출력)"이 어렵다면 "역변환(출력→입력)"을 시도하라. 다대일 관계에서는 역변환이 더 쉬울 수 있다.
      - **유형별 맞춤 프롬프트**: 모든 문제에 범용 프롬프트를 쓰면 추상적이 되어 효과가 낮다. 유형별로 구체적인 힌트를 주는 것이 핵심이다.
      - **Temperature=1.0**: 다양한 입력을 생성하려면 높은 temperature가 필요하다. 0.7 이하면 비슷한 결과만 나온다.
      - **네거티브 프롬프팅**: "예시를 그대로 복사하지 마시오"처럼 명시적으로 금지사항을 프롬프트에 포함하라. 그래도 일부는 복사할 수 있다.
      - **수작업 검증**: 17.1% 유효율이면 수작업 필터링이 필수다. 자동 필터링 모델(문제 f로 d̃ 검증)을 개발하는 것이 향후 과제다.
      - **GPT-4 활용**: GPT-3.5는 ARC 추론이 약하다. GPT-4 이상을 사용하라. Claude나 Gemini도 대안이 될 수 있다.
      - **2D 배열 표현**: ARC는 2D 색상 그리드인데, JSON 배열 형식으로 전달하면 LLM이 이해할 수 있다. [[0,1,2], [3,4,5]] 형식 사용.
      - **일대일 문제 인식**: 일대일 대응 문제는 이 방법으로 증강 불가다. 사전에 다대일인지 확인하거나, 다른 증강 전략(회전, 반전 등)을 사용하라.
      - **논문 작성 팁**: 유효 데이터 비율(17.1%), 실패 사례(예시 복사, 잘못된 추론, 일대일 문제)를 모두 제시하라. 실패 분석이 향후 연구 방향을 명확히 해준다.

